<script type="application/json" data-owlpark-manifest>
  {
    "id": "weather-widget",
    "name": "Park Weather Widget",
    "description": "Fun mocked \"park weather\" badge encouraging visits on nice days.",
    "category": "visual",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-weather-widget-style">
  .owlpark-feat-weather-widget {
    position: fixed;
    top: 5.4rem;
    right: 1.2rem;
    z-index: 30;
    background: white;
    border: 1px solid var(--cove-border, #e4ddca);
    border-radius: var(--radius-md, 10px);
    box-shadow: var(--shadow-card, 0 6px 20px rgba(0, 0, 0, 0.12));
    padding: 0.55rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--cove-teal-dark, #0a4d55);
    max-width: 240px;
  }

  .owlpark-feat-weather-widget .ww-icon {
    font-size: 1.15rem;
  }

  @media (max-width: 700px) {
    .owlpark-feat-weather-widget {
      top: auto;
      /* Bottom-anchored on phones, so it has to clear the home indicator. */
      bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
      right: calc(1rem + env(safe-area-inset-right, 0px));
      left: calc(1rem + env(safe-area-inset-left, 0px));
      max-width: none;
      justify-content: center;
    }
  }
</style>

<div class="owlpark-feat-weather-widget">
  <span class="ww-icon">☀️</span>
  <span class="ww-text">72°F and sunny — perfect park weather!</span>
</div>

<script>
  (function () {
    var FEATURE_ID = "weather-widget";
    var FORECASTS = [
      { icon: "☀️", text: "72°F and sunny — perfect park weather!" },
      { icon: "⛅", text: "68°F with light clouds — great day to visit!" },
      { icon: "🌤️", text: "75°F, mild breeze — the owls approve." },
      {
        icon: "🌈",
        text: "70°F after a morning shower — rainbows over the aviary!",
      },
    ];

    var intervalId = null;
    var watchdogId = null;
    var rootEl = null;

    // The badge is position:fixed, so its on-screen spot never depends on where
    // it sits in the DOM. Lift it to be a direct child of <body> so a store that
    // reveals or re-renders its own content wrapper (e.g. the zoo store's #page)
    // after load can't take the badge down with it; re-attach if it ever does.
    function ensureMounted() {
      if (rootEl && !(rootEl.isConnected && rootEl.parentElement === document.body)) {
        document.body.appendChild(rootEl);
      }
      // The badge's own <style> is part of the pasted snippet; if it was dropped
      // inside a region the host re-renders, keep it alive in <head> so the badge
      // never loses its border/shadow/colour along with that region.
      var styleEl = document.getElementById("owlpark-weather-widget-style");
      if (styleEl && styleEl.parentElement !== document.head) {
        document.head.appendChild(styleEl);
      }
    }

    function activate() {
      rootEl = document.querySelector(".owlpark-feat-weather-widget");
      if (!rootEl) return;
      ensureMounted();
      var iconEl = rootEl.querySelector(".ww-icon");
      var textEl = rootEl.querySelector(".ww-text");

      function applyRandomForecast() {
        var pick = FORECASTS[Math.floor(Math.random() * FORECASTS.length)];
        if (iconEl) iconEl.textContent = pick.icon;
        if (textEl) textEl.textContent = pick.text;
      }

      applyRandomForecast();
      intervalId = setInterval(applyRandomForecast, 10000);
      watchdogId = setInterval(ensureMounted, 1000);
    }

    function deactivate() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      if (watchdogId) {
        clearInterval(watchdogId);
        watchdogId = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
