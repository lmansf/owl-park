<script type="application/json" data-owlpark-manifest>
  {
    "id": "weather-widget",
    "name": "Park Weather Widget",
    "description": "Live local weather for the park from Open-Meteo, with a graceful offline fallback.",
    "category": "visual",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-weather-widget-style">
  /* Full-width banner strip that sits in the document flow just below the host's
     header (see the script), rather than a floating corner badge. */
  .owlpark-feat-weather-widget {
    box-sizing: border-box;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.65rem;
    padding: 0.72rem 1.1rem;
    /* A full-bleed strip, so keep the text clear of landscape notches. */
    padding-left: calc(1.1rem + env(safe-area-inset-left, 0px));
    padding-right: calc(1.1rem + env(safe-area-inset-right, 0px));
    background: linear-gradient(120deg, #0e6b76 0%, #1f97a8 55%, #46b39c 100%);
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.2px;
    line-height: 1.3;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.16);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
    position: relative;
    z-index: 25;
  }

  .owlpark-feat-weather-widget .ww-icon {
    font-size: 1.45rem;
    line-height: 1;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.2));
  }

  .owlpark-feat-weather-widget .ww-text {
    text-align: center;
  }

  @media (max-width: 560px) {
    .owlpark-feat-weather-widget {
      font-size: 0.85rem;
      padding-top: 0.6rem;
      padding-bottom: 0.6rem;
      gap: 0.5rem;
    }
    .owlpark-feat-weather-widget .ww-icon {
      font-size: 1.25rem;
    }
  }
</style>

<div class="owlpark-feat-weather-widget" role="status" aria-live="polite">
  <span class="ww-icon" aria-hidden="true">🌤️</span>
  <span class="ww-text">Loading local weather…</span>
</div>

<script>
  (function () {
    var FEATURE_ID = "weather-widget";
    // ZooTampa at Lowry Park (Tampa, FL). Live current conditions come from
    // Open-Meteo — a free, no-key, CORS-enabled API — so this works pasted into
    // any store's page. If the request fails (offline, or the host store's CSP
    // blocks it), the badge shows a neutral message, never a fake temperature.
    var LAT = 28.0106;
    var LON = -82.4667;
    var WEATHER_API =
      "https://api.open-meteo.com/v1/forecast?latitude=" +
      LAT +
      "&longitude=" +
      LON +
      "&current=temperature_2m,weather_code,is_day" +
      "&temperature_unit=fahrenheit&timezone=auto";
    var REFRESH_MS = 15 * 60 * 1000;

    var iconEl = null;
    var textEl = null;
    var rootEl = null;
    var refreshId = null;
    var watchdogId = null;

    // WMO weather codes (open-meteo `weather_code`) -> a friendly icon + phrase.
    function describeWeather(code, isDay) {
      var clear = isDay ? "☀️" : "🌙";
      if (code === 0) return { icon: clear, label: "clear" };
      if (code === 1 || code === 2)
        return { icon: isDay ? "🌤️" : "☁️", label: "partly cloudy" };
      if (code === 3) return { icon: "☁️", label: "overcast" };
      if (code === 45 || code === 48) return { icon: "🌫️", label: "foggy" };
      if (code >= 51 && code <= 57) return { icon: "🌦️", label: "drizzly" };
      if (code >= 61 && code <= 67) return { icon: "🌧️", label: "rainy" };
      if (code >= 71 && code <= 77) return { icon: "🌨️", label: "snowy" };
      if (code >= 80 && code <= 82) return { icon: "🌦️", label: "passing showers" };
      if (code >= 85 && code <= 86) return { icon: "🌨️", label: "snow showers" };
      if (code >= 95) return { icon: "⛈️", label: "stormy" };
      return { icon: clear, label: "mild" };
    }

    function paint(icon, text) {
      if (iconEl) iconEl.textContent = icon;
      if (textEl) textEl.textContent = text;
    }

    function loadWeather() {
      fetch(WEATHER_API, { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (data) {
          var cur = data && data.current;
          if (!cur || typeof cur.temperature_2m !== "number")
            throw new Error("no current weather");
          var d = describeWeather(cur.weather_code, cur.is_day);
          paint(
            d.icon,
            Math.round(cur.temperature_2m) + "°F and " + d.label + " at the park",
          );
        })
        .catch(function () {
          paint("🦉", "Check today's forecast before your visit!");
        });
    }

    // Place the banner in the document flow just below the host's header, full
    // width, so it reads as a masthead strip rather than a floating badge. The
    // header region is full-width on each host, so `width:100%` fills the screen
    // without a full-bleed hack (which would add horizontal scroll).
    function resolveHeaderInsertion() {
      var zooHeader = document.getElementById("Header"); // zoo masthead (full-width)
      if (zooHeader) return { ref: zooHeader, pos: "afterend" };
      var owlHeader = document.querySelector(".site-header"); // Owl Park header
      if (owlHeader) return { ref: owlHeader, pos: "afterend" };
      return { ref: document.body, pos: "afterbegin" }; // generic: top of the page
    }

    function placedCorrectly(target) {
      if (!rootEl.isConnected) return false;
      return target.pos === "afterend"
        ? target.ref.nextElementSibling === rootEl
        : target.ref.firstElementChild === rootEl;
    }

    // Keep the banner (and its <style>) alive and in place: a store that reveals
    // or re-renders its own chrome after load can drop or displace anything we
    // inserted, so re-place it from the watchdog if it drifts.
    function ensurePlaced() {
      if (!rootEl) return;
      var target = resolveHeaderInsertion();
      if (!placedCorrectly(target)) {
        target.ref.insertAdjacentElement(target.pos, rootEl);
      }
      var styleEl = document.getElementById("owlpark-weather-widget-style");
      if (styleEl && styleEl.parentElement !== document.head) {
        document.head.appendChild(styleEl);
      }
    }

    function activate() {
      rootEl = document.querySelector(".owlpark-feat-weather-widget");
      if (!rootEl) return;
      ensurePlaced();
      iconEl = rootEl.querySelector(".ww-icon");
      textEl = rootEl.querySelector(".ww-text");

      loadWeather();
      refreshId = setInterval(loadWeather, REFRESH_MS);
      watchdogId = setInterval(ensurePlaced, 1000);
    }

    function deactivate() {
      if (refreshId) {
        clearInterval(refreshId);
        refreshId = null;
      }
      if (watchdogId) {
        clearInterval(watchdogId);
        watchdogId = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
