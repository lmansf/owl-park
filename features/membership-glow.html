<script type="application/json" data-owlpark-manifest>
  {
    "id": "membership-glow",
    "name": "Membership Glow",
    "description": "Glowing highlight and ribbon on the recommended membership tier.",
    "category": "visual",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-membership-glow-style">
  /* Restrained emphasis on the recommended membership row: a soft teal wash,
     a hairline teal border, a 3px inset teal left-edge and a soft shadow —
     premium and quiet, no neon pulse. Self-contained literals (features can't
     use the storefront CSS vars). */
  .owlpark-feat-membership-glow-highlight {
    position: relative;
    background: rgba(15, 111, 122, 0.09) !important;
    border-color: rgba(15, 111, 122, 0.3) !important;
    box-shadow:
      inset 3px 0 0 0 #0f6f7a,
      0 6px 20px rgba(20, 40, 40, 0.08) !important;
  }

  /* Small, quiet chip pinned to the row (teal status dot + label). Owl Park
     cards get it in the top-left corner (absolute); zoo PLU <tr>s get the
     inline variant. */
  .owlpark-feat-membership-glow-ribbon {
    position: absolute;
    top: -0.55rem;
    left: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 0.32rem;
    padding: 0.24rem 0.6rem;
    background: rgba(255, 255, 255, 0.9);
    -webkit-backdrop-filter: blur(8px) saturate(1.3);
    backdrop-filter: blur(8px) saturate(1.3);
    color: #0f6f7a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.66rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.2;
    white-space: nowrap;
    border: 1px solid rgba(15, 111, 122, 0.24);
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(20, 40, 40, 0.06);
    animation: owlpark-membership-glow-chip-in var(--mg-enter, 240ms)
      cubic-bezier(0.2, 0.6, 0.2, 1) both;
  }
  .owlpark-feat-membership-glow-ribbon::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 999px;
    background: #0f6f7a;
    flex-shrink: 0;
  }

  @keyframes owlpark-membership-glow-chip-in {
    from {
      opacity: 0;
      transform: translateY(-4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Zoo PLU rows are <tr>; absolute children misbehave in a table, so the
     ribbon rides inline next to the product name instead. */
  .owlpark-feat-membership-glow-ribbon.owlpark-feat-membership-glow-ribbon--inline {
    position: static;
    display: inline-flex;
    vertical-align: middle;
    margin-left: 0.5rem;
    top: auto;
    left: auto;
  }

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-membership-glow-highlight {
      background: rgba(15, 111, 122, 0.18) !important;
      border-color: rgba(91, 199, 207, 0.34) !important;
      box-shadow:
        inset 3px 0 0 0 #5bc7cf,
        0 6px 20px rgba(0, 0, 0, 0.35) !important;
    }
    .owlpark-feat-membership-glow-ribbon {
      background: rgba(18, 24, 26, 0.82);
      color: #5bc7cf;
      border-color: rgba(91, 199, 207, 0.34);
    }
    .owlpark-feat-membership-glow-ribbon::before {
      background: #5bc7cf;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-membership-glow-ribbon {
      animation: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Membership Glow  ·  visual
     * -------------------------------------------------------------------------
     * WHAT   A restrained emphasis on the recommended membership row — a soft
     *        teal wash, a hairline teal border, a 3px inset teal left-edge and a
     *        small frosted "Recommended" chip — quiet and premium, no neon pulse.
     * HOW    Finds the first live product row whose name matches CONFIG.nameMatch
     *        (read straight off the row via owlHost(); no products.json), tags it
     *        with the highlight class and appends the chip. A MutationObserver on
     *        the product grid re-applies after the host re-renders, guarded by an
     *        idempotency check so it never double-decorates.
     * HOSTS  Zoo PLU <tr>s get the chip inline in the name cell; Owl Park cards
     *        get it pinned to the corner. No membership row (e.g. single-day
     *        admission) -> no-op. Only self-created nodes are tagged/cleaned.
     * ===================================================================== */

    var FEATURE_ID = "membership-glow";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      // Target rule: highlight the FIRST product row whose name matches this
      // (case-insensitive). Store-agnostic; identifies the membership tier.
      nameMatch: /member/i,
      // Copy for the small emphasis chip pinned to that row.
      label: "Recommended",
      // Chip entrance (fade + rise) duration, ms. The wash/edge/hairline are
      // static; this is the only motion, and it's calmed under reduced-motion.
      entranceMs: 240,
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        // Where header/utility buttons dock (zoo sub-header -> Owl Park header -> float).
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        // Product list container to observe for re-renders.
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        // Live product rows (skips Angular {{template}} rows on the zoo page).
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        // Inline anchor to hang a small decoration next to the product name.
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        // Block anchor under the product's descriptive text.
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();
    var HIGHLIGHT_CLASS = "owlpark-feat-membership-glow-highlight";
    var observer = null;

    // Store-agnostic selection: the first product row whose name matches
    // CONFIG.nameMatch. No products.json dependency — everything comes off the
    // row via H. On a page with no membership rows (e.g. single-day admission)
    // this returns null and the feature no-ops cleanly.
    function findMembershipRow() {
      var rows = H.rows();
      for (var i = 0; i < rows.length; i++) {
        if (CONFIG.nameMatch.test(H.rowName(rows[i]))) return rows[i];
      }
      return null;
    }

    function applyHighlight() {
      var row = findMembershipRow();
      if (!row) return;
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]'))
        return;

      // Intentionally NOT tagging the pre-existing row with data-owlpark-feature —
      // the loader's belt-and-suspenders cleanup removes any tagged element
      // wholesale, which would delete this row instead of just un-highlighting it.
      // Only elements we create ourselves get tagged.
      row.classList.add(HIGHLIGHT_CLASS);

      var ribbon = document.createElement("span");
      ribbon.className = "owlpark-feat-membership-glow-ribbon";
      ribbon.setAttribute("data-owlpark-feature", FEATURE_ID);
      ribbon.style.setProperty("--mg-enter", CONFIG.entranceMs + "ms");
      ribbon.textContent = CONFIG.label;

      if (H.isPlu(row)) {
        // Table row: hang the ribbon inline in the name cell (static position).
        ribbon.classList.add("owlpark-feat-membership-glow-ribbon--inline");
        var cell = H.rowNameCell(row) || row;
        cell.appendChild(ribbon);
      } else {
        // Owl Park card: keep the original absolute placement on the row.
        row.appendChild(ribbon);
      }
    }

    function activate() {
      applyHighlight();

      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyHighlight();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document.querySelectorAll("." + HIGHLIGHT_CLASS).forEach(function (row) {
        row.classList.remove(HIGHLIGHT_CLASS);
      });
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
