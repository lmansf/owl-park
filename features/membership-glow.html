<script type="application/json" data-owlpark-manifest>
{
  "id": "membership-glow",
  "name": "Membership Glow",
  "description": "Glowing highlight and ribbon on the recommended membership tier.",
  "category": "visual",
  "enabledByDefault": false,
  "requiresReload": false
}
</script>

<style>
.owlpark-feat-membership-glow-highlight {
  position: relative;
  border-color: var(--cove-orange) !important;
  animation: owlpark-membership-glow-pulse 2.2s ease-in-out infinite;
}

@keyframes owlpark-membership-glow-pulse {
  0%,
  100% {
    box-shadow:
      0 0 0 0 rgba(226, 102, 45, 0.45),
      var(--shadow-card);
  }
  50% {
    box-shadow:
      0 0 0 10px rgba(226, 102, 45, 0),
      var(--shadow-card);
  }
}

.owlpark-feat-membership-glow-ribbon {
  position: absolute;
  top: -0.6rem;
  left: 1.1rem;
  background: var(--cove-orange);
  color: white;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 0.28rem 0.65rem;
  border-radius: 999px;
  box-shadow: 0 3px 8px rgba(226, 102, 45, 0.45);
}
</style>

<script>
(function () {
  var FEATURE_ID = "membership-glow";
  var HIGHLIGHT_CLASS = "owlpark-feat-membership-glow-highlight";
  var featuredProduct = null;
  var observer = null;

  function applyHighlight() {
    if (!featuredProduct) return;

    var row = document.querySelector(
      '.product-row[data-product-id="' + featuredProduct.id + '"]',
    );
    if (!row) return;
    if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]')) return;

    // Intentionally NOT tagging the pre-existing row with data-owlpark-feature —
    // the loader's belt-and-suspenders cleanup removes any tagged element
    // wholesale, which would delete this row instead of just un-highlighting it.
    // Only elements we create ourselves get tagged.
    row.classList.add(HIGHLIGHT_CLASS);

    var ribbon = document.createElement("span");
    ribbon.className = "owlpark-feat-membership-glow-ribbon";
    ribbon.setAttribute("data-owlpark-feature", FEATURE_ID);
    ribbon.textContent = "Recommended";
    row.appendChild(ribbon);
  }

  function activate() {
    fetch("data/products.json")
      .then(function (res) {
        return res.json();
      })
      .then(function (products) {
        featuredProduct = products.find(function (p) {
          return p.category === "membership" && p.featured;
        });
        if (!featuredProduct) return;

        applyHighlight();

        var grid = document.getElementById("catalog-grid");
        if (grid) {
          observer = new MutationObserver(function () {
            applyHighlight();
          });
          observer.observe(grid, { childList: true });
        }
      });
  }

  function deactivate() {
    if (observer) {
      observer.disconnect();
      observer = null;
    }
    document.querySelectorAll("." + HIGHLIGHT_CLASS).forEach(function (row) {
      row.classList.remove(HIGHLIGHT_CLASS);
    });
    document
      .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
      .forEach(function (el) {
        el.remove();
      });
    featuredProduct = null;
  }

  activate();

  window.__owlParkFeatures = window.__owlParkFeatures || {};
  window.__owlParkFeatures[FEATURE_ID] = { activate: activate, deactivate: deactivate };
})();
</script>
