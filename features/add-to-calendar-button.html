<script type="application/json" data-owlpark-manifest>
  {
    "id": "add-to-calendar-button",
    "name": "Add to Calendar Button",
    "description": "Downloads an .ics calendar file for your visit from the checkout confirmation.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-add-to-calendar-button {
    width: 100%;
    margin-top: 0.6rem;
    background: white;
    color: var(--cove-teal-dark, #0a4d55);
    border: 2px solid var(--cove-teal, #0f6f7a);
    padding: 0.6rem;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    min-height: 44px;
  }
  .owlpark-feat-add-to-calendar-button:hover {
    background: var(--cove-sand, #faf3e6);
  }
</style>

<script>
  (function () {
    var FEATURE_ID = "add-to-calendar-button";
    var buttonEl = null;

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function icsDate(d) {
      return (
        d.getUTCFullYear() +
        pad(d.getUTCMonth() + 1) +
        pad(d.getUTCDate()) +
        "T" +
        pad(d.getUTCHours()) +
        pad(d.getUTCMinutes()) +
        pad(d.getUTCSeconds()) +
        "Z"
      );
    }

    function downloadCalendar() {
      var orderIdEl = document.getElementById("order-id");
      var orderId = orderIdEl ? orderIdEl.textContent : "Owl Park visit";

      var start = new Date();
      start.setDate(start.getDate() + 7);
      start.setHours(10, 0, 0, 0);
      var end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

      var ics =
        "BEGIN:VCALENDAR\r\n" +
        "VERSION:2.0\r\n" +
        "PRODID:-//Owl Park//Storefront//EN\r\n" +
        "BEGIN:VEVENT\r\n" +
        "UID:" +
        Date.now() +
        "@owlpark.example\r\n" +
        "DTSTAMP:" +
        icsDate(new Date()) +
        "\r\n" +
        "DTSTART:" +
        icsDate(start) +
        "\r\n" +
        "DTEND:" +
        icsDate(end) +
        "\r\n" +
        "SUMMARY:Owl Park Visit\r\n" +
        "DESCRIPTION:" +
        orderId +
        "\r\n" +
        "LOCATION:Owl Park\r\n" +
        "END:VEVENT\r\n" +
        "END:VCALENDAR\r\n";

      var blob = new Blob([ics], { type: "text/calendar" });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a");
      link.href = url;
      link.download = "owl-park-visit.ics";
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 1000);
    }

    function activate() {
      var closeBtn = document.getElementById("close-modal-btn");
      if (!closeBtn || !closeBtn.parentElement) return;

      buttonEl = document.createElement("button");
      buttonEl.type = "button";
      buttonEl.className = "owlpark-feat-add-to-calendar-button";
      buttonEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      buttonEl.textContent = "📅 Add to Calendar";
      buttonEl.addEventListener("click", downloadCalendar);

      closeBtn.parentElement.insertBefore(buttonEl, closeBtn);
    }

    function deactivate() {
      if (buttonEl) {
        buttonEl.removeEventListener("click", downloadCalendar);
        buttonEl.remove();
        buttonEl = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
