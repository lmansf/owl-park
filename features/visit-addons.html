    "enabledByDefault": false,
    "requiresReload": false

<script>
  (function () {
    /* =========================================================================
     * Visit Add-Ons  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A quiet rail of visit add-ons (parking, fast-track, keeper
     *        experience, souvenir cup) that appears inside the cart once a
     *        ticket is in it; one tap drops an add-on in as an ordinary line.
     * HOW    Mounts a panel into the SCROLLING #cart-items region (never the
     *        fixed footer, so Total/Checkout stay reachable on a phone) and
     *        re-appends it after every renderCart() via a MutationObserver.
     *        Add-on names/prices/taglines come live from data/products.json
     *        (category "addon"). Cart state is read from localStorage
     *        ("owl-park-cart"), polled every CONFIG.pollMs and on the
     *        owl-park-cart-changed event; adding writes that key and dispatches
     *        owl-park-cart-changed so the storefront re-renders.
     * HOSTS  Owl Park storefront only — the rail shows when the cart holds a
     *        ticket AND the catalog exposes addon-category products, both being
     *        Owl-Park concepts. It stays hidden (a no-op) on other hosts and
     *        whenever the catalog fetch fails (no stale prices ever shown).
     * ===================================================================== */

    var FEATURE_ID = "visit-addons";
    var CART_KEY = "owl-park-cart"; // shared cart contract key (not a preference)

    // ----- Configuration --------------------------------------------------
    // Tunable copy + timing. The add-on PRODUCTS themselves (name, price,
    // tagline, emoji) are NOT configured here — they come live from the catalog
    // (data/products.json, category "addon"); see the fetch() in activate().
    var CONFIG = {
      heading: "Make a day of it", // quiet section heading above the rail
      addLabel: "Add", // add control when the add-on is not yet in the cart
      addAnotherLabel: "Add another", // add control when it is already in the cart
      inCartPrefix: "✓ ", // wraps the quantity in the "in cart" note …
      inCartSuffix: " in cart", // … e.g. "✓ 2 in cart"
      pollMs: 700, // how often the cart is re-checked for changes
    };

    var products = null;
    var panelEl = null;
    var pollId = null;
    // Bumped on every activate and deactivate: an in-flight catalog fetch whose generation no longer
    // matches belongs to an activation that has since been torn down, and must touch nothing.
    var generation = 0;
    var itemsObserver = null;
    var lastSerialized = null;

    function readCart() {
      try {
        var raw = localStorage.getItem(CART_KEY);
        var lines = raw ? JSON.parse(raw) : [];
        return Array.isArray(lines) ? lines : [];
      } catch (err) {
        return [];
      }
    }

    function writeCart(lines) {
      localStorage.setItem(CART_KEY, JSON.stringify(lines));
      window.dispatchEvent(new CustomEvent("owl-park-cart-changed"));
    }

    function money(n) {
      return "$" + n.toFixed(2);
    }

    function byCategory(category) {
      return products.filter(function (p) {
        return p.category === category;
      });
    }

    function cartHasTicket() {
      var tickets = byCategory("ticket").map(function (p) {
        return p.id;
      });
      return readCart().some(function (line) {
        return tickets.indexOf(line.id) !== -1;
      });
    }

    function qtyInCart(productId) {
      return readCart().reduce(function (sum, line) {
        return line.id === productId ? sum + line.qty : sum;
      }, 0);
    }

    /** One tap: an add-on joins the cart as an ordinary catalog line. No modal, no interstitial. */
    function addAddon(productId) {
      var lines = readCart();
      var existing = null;
      for (var i = 0; i < lines.length; i++) {
        if ((lines[i].key || lines[i].id) === productId) existing = lines[i];
      }
      if (existing) {
        existing.qty += 1;
      } else {
        lines.push({ id: productId, qty: 1 });
      }
      writeCart(lines);
    }

    function addonCard(product) {
      var inCart = qtyInCart(product.id);

      var card = document.createElement("div");
      card.className = "vao-card" + (inCart ? " vao-in-cart" : "");

      var head = document.createElement("div");
      head.className = "vao-head";

      var emoji = document.createElement("span");
      emoji.className = "vao-emoji";
      emoji.setAttribute("aria-hidden", "true");
      emoji.textContent = product.emoji;

      var name = document.createElement("span");
      name.className = "vao-name";
      name.textContent = product.name;

      // Price is aligned as its own element (top-right), not buried in the button.
      var price = document.createElement("span");
      price.className = "vao-price";
      price.textContent = money(product.price);

      head.append(emoji, name, price);

      var tagline = document.createElement("div");
      tagline.className = "vao-tagline";
      tagline.textContent = product.tagline;

      card.append(head, tagline);

      if (inCart) {
        var note = document.createElement("div");
        note.className = "vao-in-cart-note";
        note.textContent = CONFIG.inCartPrefix + inCart + CONFIG.inCartSuffix;
        card.appendChild(note);
      }

      var actionWord = inCart ? CONFIG.addAnotherLabel : CONFIG.addLabel;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "vao-add-btn";
      btn.textContent = actionWord;
      // Full context for screen readers ("Add" alone repeats across every card).
      btn.setAttribute(
        "aria-label",
        actionWord + " " + product.name + ", " + money(product.price),
      );
      btn.setAttribute("data-addon-id", product.id);
      btn.addEventListener("click", function () {
        addAddon(product.id);
      });
      card.appendChild(btn);

      return card;
    }

    function render() {
      if (!panelEl || !products) return;
      panelEl.innerHTML = "";

      var addons = byCategory("addon");
      if (!addons.length || !cartHasTicket()) {
        panelEl.hidden = true;
        return;
      }
      panelEl.hidden = false;

      var title = document.createElement("div");
      title.className = "vao-title";
      title.textContent = CONFIG.heading;
      panelEl.appendChild(title);

      var rail = document.createElement("div");
      rail.className = "vao-rail";
      addons.forEach(function (product) {
        rail.appendChild(addonCard(product));
      });
      panelEl.appendChild(rail);
    }

    function sync() {
      var serialized = localStorage.getItem(CART_KEY);
      if (serialized === lastSerialized) return;
      lastSerialized = serialized;
      render();
    }

    /**
     * The rail lives in the scrolling #cart-items region, not the fixed footer, so the total and the
     * checkout button stay reachable on a phone. `renderCart()` replaces that region's innerHTML on
     * every cart change, so the rail is re-appended after each render.
     */
    function mount() {
      var items = document.getElementById("cart-items");
      if (!items || !panelEl) return;
      if (!items.contains(panelEl)) items.appendChild(panelEl);
    }

    function activate() {
      var items = document.getElementById("cart-items");
      if (!items) return;
      var gen = ++generation;

      panelEl = document.createElement("div");
      panelEl.className = "owlpark-feat-visit-addons";
      panelEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      panelEl.setAttribute("role", "group");
      panelEl.setAttribute("aria-label", CONFIG.heading);
      panelEl.hidden = true;
      mount();

      itemsObserver = new MutationObserver(mount);
      itemsObserver.observe(items, { childList: true });

      // Add-on names and prices come from the catalog; show nothing rather than a stale price.
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("products.json: " + res.status);
          return res.json();
        })
        .then(function (data) {
          if (gen !== generation) return;
          products = data;
          lastSerialized = null;
          sync();
        })
        .catch(function (err) {
          console.warn(
            "[" + FEATURE_ID + "] no catalog, add-on rail stays hidden.",
            err,
          );
        });

      pollId = setInterval(sync, CONFIG.pollMs);
      window.addEventListener("owl-park-cart-changed", sync);
    }

    function deactivate() {
      generation++;
      if (pollId) {
        clearInterval(pollId);
        pollId = null;
      }
      if (itemsObserver) {
        itemsObserver.disconnect();
        itemsObserver = null;
      }
      window.removeEventListener("owl-park-cart-changed", sync);
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
      panelEl = null;
      products = null;
      lastSerialized = null;
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
