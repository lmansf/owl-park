    </div>

<script>
  (function () {
    /* =========================================================================
     * Feeding Time Countdown  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A slim frosted card, pinned top-left (a bottom strip on phones),
     *        that counts down to an upcoming park event as clean DD:HH:MM:SS
     *        digit groups with small unit labels and a subtle per-second tick.
     * HOW    Reads only the clock — no store data or host DOM. Counts to
     *        CONFIG.targetDate while that is a future date; otherwise it falls
     *        back to the existing recurring next-feeding slot (the half-hour
     *        boundary math in nextSlot), so an unset or already-passed event
     *        date rolls straight into the live feeding countdown. Ticks once a
     *        second on a setInterval; all copy/labels come from CONFIG.
     * HOSTS  Renders on every host (self-contained; needs no store data).
     * ===================================================================== */

    var FEATURE_ID = "event-countdown";

    // ----- Configuration --------------------------------------------------
    var CONFIG = {
      icon: "🦉", // leading glyph in the header
      eventName: "Owl Feeding", // headline of the upcoming event
      caption: "Starts in", // small lead-in above the digits
      // Explicit target date/time for the event (any Date-parseable string, or
      // null). While this is a future moment the widget counts down to it; once
      // null or already past it falls back to the recurring next-feeding slot
      // below, so the countdown never stalls.
      targetDate: "2026-07-18T18:30:00",
      // Recurring fallback: minutes between keeper feedings (existing half-hour
      // slot logic — the countdown rolls to the next boundary each time).
      recurringSlotMinutes: 30,
      // Unit labels shown under each digit group.
      labels: { days: "Days", hours: "Hrs", minutes: "Min", seconds: "Sec" },
      // Subtle scale pulse on the seconds each tick (auto-off under
      // prefers-reduced-motion).
      tickAnimation: true,
    };

    var rootEl = null;
    var numEls = {};
    var secNumEl = null;
    var target = null;
    var intervalId = null;

    // Existing date logic: the next recurring feeding boundary.
    function nextSlot(from) {
      var next = new Date(from);
      next.setSeconds(0, 0);
      var interval = CONFIG.recurringSlotMinutes || 30;
      var minutes = next.getMinutes();
      var rem = minutes % interval;
      var addMinutes = rem === 0 ? interval : interval - rem;
      next.setMinutes(minutes + addMinutes);
      return next;
    }

    // Prefer a configured future event; else fall back to the recurring slot.
    function resolveTarget() {
      if (CONFIG.targetDate) {
        var d = new Date(CONFIG.targetDate);
        if (!isNaN(d.getTime()) && d.getTime() > Date.now()) return d;
      }
      return nextSlot(new Date());
    }

    function parts(ms) {
      var total = Math.max(0, Math.floor(ms / 1000));
      var days = Math.floor(total / 86400);
      total -= days * 86400;
      var hours = Math.floor(total / 3600);
      total -= hours * 3600;
      var minutes = Math.floor(total / 60);
      var seconds = total - minutes * 60;
      return { days: days, hours: hours, minutes: minutes, seconds: seconds };
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function pulseSeconds() {
      if (!CONFIG.tickAnimation || !secNumEl) return;
      secNumEl.classList.remove("ec-ticking");
      void secNumEl.offsetWidth; // reflow so the keyframe restarts each second
      secNumEl.classList.add("ec-ticking");
    }

    function render(ms) {
      var p = parts(ms);
      if (numEls.days) numEls.days.textContent = pad(p.days);
      if (numEls.hours) numEls.hours.textContent = pad(p.hours);
      if (numEls.minutes) numEls.minutes.textContent = pad(p.minutes);
      if (numEls.seconds) numEls.seconds.textContent = pad(p.seconds);
      if (rootEl) {
        rootEl.setAttribute(
          "aria-label",
          CONFIG.eventName +
            " " +
            CONFIG.caption.toLowerCase() +
            " " +
            p.days +
            " days, " +
            p.hours +
            " hours, " +
            p.minutes +
            " minutes, " +
            p.seconds +
            " seconds",
        );
      }
      pulseSeconds();
    }

    function tick() {
      var now = Date.now();
      var remaining = target.getTime() - now;
      if (remaining <= 0) {
        target = resolveTarget();
        remaining = Math.max(0, target.getTime() - now);
      }
      render(remaining);
    }

    function applyCopy() {
      var iconEl = rootEl.querySelector(".ec-icon");
      if (iconEl) iconEl.textContent = CONFIG.icon;
      var nameEl = rootEl.querySelector(".ec-name");
      if (nameEl) nameEl.textContent = CONFIG.eventName;
      var capEl = rootEl.querySelector(".ec-caption");
      if (capEl) capEl.textContent = CONFIG.caption;
      Object.keys(CONFIG.labels).forEach(function (unit) {
        var el = rootEl.querySelector('[data-unit="' + unit + '"]');
        if (el) el.textContent = CONFIG.labels[unit];
      });
    }

    function activate() {
      rootEl = document.querySelector(".owlpark-feat-event-countdown");
      if (!rootEl) return;
      numEls = {
        days: rootEl.querySelector('[data-ec="days"]'),
        hours: rootEl.querySelector('[data-ec="hours"]'),
        minutes: rootEl.querySelector('[data-ec="minutes"]'),
        seconds: rootEl.querySelector('[data-ec="seconds"]'),
      };
      secNumEl = numEls.seconds;

      applyCopy();
      target = resolveTarget();

      tick();
      intervalId = setInterval(tick, 1000);
    }

    function deactivate() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
