    "id": "keyboard-shortcuts-helper",
    "name": "Keyboard Shortcuts Helper",
    "description": "Floating shortcuts cheat-sheet plus working keyboard shortcuts.",
    "category": "utility",

  .owlpark-feat-keyboard-shortcuts-helper-overlay {

  .owlpark-feat-keyboard-shortcuts-helper-overlay.is-open

  .owlpark-feat-keyboard-shortcuts-helper-card h3 {

    .owlpark-feat-keyboard-shortcuts-helper-kbd {

    .owlpark-feat-keyboard-shortcuts-helper-close,
    .owlpark-feat-keyboard-shortcuts-helper-x {
      transition: none;
    }
    .owlpark-feat-keyboard-shortcuts-helper-card {
      transform: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Keyboard Shortcuts Helper  ·  utility
     * -------------------------------------------------------------------------
     * WHAT   A floating "?" launcher that opens an accessible cheat-sheet modal
     *        of the storefront's keyboard shortcuts, plus the live global key
     *        handler that actually runs those shortcuts.
     * HOW    Appends a fixed launcher button and (on demand) a dialog overlay to
     *        <body>. The cheat-sheet rows AND the working key handler both derive
     *        from CONFIG.shortcuts, so they can never drift. The dialog fades /
     *        scales in, traps focus, closes on Esc / scrim / x / Close, and
     *        restores focus to the launcher.
     * HOSTS  Self-contained; the launcher renders on every host. Each shortcut
     *        action targets Owl Park controls by id/selector and is a safe no-op
     *        where those controls are absent (e.g. the zoo ViewItems store).
     * ===================================================================== */

    var FEATURE_ID = "keyboard-shortcuts-helper";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      // Title shown atop the cheat-sheet dialog (also its accessible name).
      title: "Keyboard Shortcuts",
      // Glyph on the floating launcher button that opens the cheat-sheet.
      triggerKey: "?",
      // Accessible name for the icon-only launcher button.
      buttonLabel: "Show keyboard shortcuts",
      // The shortcuts. `key`: the chip shown AND the key that fires it (matched
      // case-insensitively; "Esc" matches the Escape key). `label`: the row
      // description. `action`: the id dispatched to runAction() when pressed.
      shortcuts: [
        { key: "c", label: "Open cart", action: "cart" },
        { key: "t", label: "Tickets tab", action: "tab:ticket" },
        { key: "m", label: "Memberships tab", action: "tab:membership" },
        { key: "a", label: "All tab", action: "tab:all" },
        { key: "Esc", label: "Close cart / modal", action: "escape" },
      ],
    };

    // Id linking the dialog to its title via aria-labelledby.
    var TITLE_ID = "owlpark-keyboard-shortcuts-helper-title";

    var helpBtn = null;
    var overlayEl = null;
    var keydownHandler = null; // global shortcut handler (on while active)
    var keyHandler = null; // modal focus-trap / Esc handler (only while open)
    var lastFocus = null;

    // ----- Shortcut actions (unchanged storefront behavior) ---------------
    function clickTab(filter) {
      var btn = document.querySelector('.tab-btn[data-filter="' + filter + '"]');
      if (btn) btn.click();
    }

    function runAction(action) {
      switch (action) {
        case "cart": {
          var cartBtn = document.getElementById("open-cart-btn");
          if (cartBtn) cartBtn.click();
          break;
        }
        case "tab:ticket":
          clickTab("ticket");
          break;
        case "tab:membership":
          clickTab("membership");
          break;
        case "tab:all":
          clickTab("all");
          break;
        case "escape": {
          var drawer = document.getElementById("cart-drawer");
          if (drawer && drawer.classList.contains("open")) {
            var closeBtn = document.getElementById("close-cart-btn");
            if (closeBtn) closeBtn.click();
          }
          var modal = document.getElementById("checkout-modal");
          if (modal && !modal.classList.contains("hidden")) {
            var closeModalBtn = document.getElementById("close-modal-btn");
            if (closeModalBtn) closeModalBtn.click();
          }
          break;
        }
        default:
          break;
      }
    }

    function isTypingTarget(target) {
      if (!target) return false;
      var tag = target.tagName;
      return tag === "INPUT" || tag === "TEXTAREA" || target.isContentEditable;
    }

    function keyMatches(eventKey, shortcutKey) {
      if (shortcutKey === "Esc") {
        return eventKey === "Escape" || eventKey === "Esc";
      }
      return eventKey.toLowerCase() === shortcutKey.toLowerCase();
    }

    function onKeydown(event) {
      if (isTypingTarget(event.target)) return;
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      for (var i = 0; i < CONFIG.shortcuts.length; i++) {
        if (keyMatches(event.key, CONFIG.shortcuts[i].key)) {
          runAction(CONFIG.shortcuts[i].action);
          return;
        }
      }
    }

    // ----- Cheat-sheet dialog ---------------------------------------------
    function buildRows() {
      var html = "";
      CONFIG.shortcuts.forEach(function (sc) {
        html +=
          '<div class="owlpark-feat-keyboard-shortcuts-helper-row">' +
          '<span class="owlpark-feat-keyboard-shortcuts-helper-label">' +
          sc.label +
          "</span>" +
          '<kbd class="owlpark-feat-keyboard-shortcuts-helper-kbd">' +
          sc.key +
          "</kbd>" +
          "</div>";
      });
      return html;
    }

    function focusable() {
      if (!overlayEl) return [];
      return [].slice.call(
        overlayEl.querySelectorAll(
          'button, [href], input, [tabindex]:not([tabindex="-1"])',
        ),
      );
    }

    function onKey(e) {
      if (e.key === "Escape" || e.key === "Esc") {
        e.preventDefault();
        closeSheet();
        return;
      }
      if (e.key === "Tab") {
        var f = focusable();
        if (!f.length) return;
        var first = f[0];
        var last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function openSheet() {
      if (overlayEl) return;
      lastFocus = document.activeElement;
      overlayEl = document.createElement("div");
      overlayEl.className = "owlpark-feat-keyboard-shortcuts-helper-overlay";
      overlayEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlayEl.setAttribute("role", "dialog");
      overlayEl.setAttribute("aria-modal", "true");
      overlayEl.setAttribute("aria-labelledby", TITLE_ID);
      overlayEl.innerHTML =
        '<div class="owlpark-feat-keyboard-shortcuts-helper-card">' +
        '<button type="button" class="owlpark-feat-keyboard-shortcuts-helper-x" aria-label="Close">&times;</button>' +
        '<h3 id="' +
        TITLE_ID +
        '">' +
        CONFIG.title +
        "</h3>" +
        '<div class="owlpark-feat-keyboard-shortcuts-helper-list">' +
        buildRows() +
        "</div>" +
        '<div><button type="button" class="owlpark-feat-keyboard-shortcuts-helper-close">Close</button></div>' +
        "</div>";
      document.body.appendChild(overlayEl);

      overlayEl
        .querySelector(".owlpark-feat-keyboard-shortcuts-helper-close")
        .addEventListener("click", closeSheet);
      overlayEl
        .querySelector(".owlpark-feat-keyboard-shortcuts-helper-x")
        .addEventListener("click", closeSheet);
      overlayEl.addEventListener("click", function (e) {
        if (e.target === overlayEl) closeSheet();
      });
      keyHandler = onKey;
      document.addEventListener("keydown", keyHandler);

      requestAnimationFrame(function () {
        if (overlayEl) overlayEl.classList.add("is-open");
        var x =
          overlayEl &&
          overlayEl.querySelector(".owlpark-feat-keyboard-shortcuts-helper-x");
        if (x) x.focus();
      });
    }

    function closeSheet() {
      if (!overlayEl) return;
      var el = overlayEl;
      overlayEl = null;
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      el.classList.remove("is-open");
      setTimeout(function () {
        el.remove();
      }, 180);
      if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      lastFocus = null;
    }

    function activate() {
      helpBtn = document.createElement("button");
      helpBtn.type = "button";
      helpBtn.className = "owlpark-feat-keyboard-shortcuts-helper-btn";
      helpBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
      helpBtn.setAttribute("aria-label", CONFIG.buttonLabel);
      helpBtn.setAttribute("aria-haspopup", "dialog");
      helpBtn.textContent = CONFIG.triggerKey;
      helpBtn.addEventListener("click", openSheet);
      document.body.appendChild(helpBtn);

      keydownHandler = onKeydown;
      document.addEventListener("keydown", keydownHandler);
    }

    function deactivate() {
      if (keydownHandler) {
        document.removeEventListener("keydown", keydownHandler);
        keydownHandler = null;
      }
      closeSheet();
      if (helpBtn) {
        helpBtn.removeEventListener("click", openSheet);
        helpBtn.remove();
        helpBtn = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
