<script type="application/json" data-owlpark-manifest>
  {
    "id": "seasonal-banner",
    "name": "Seasonal Banner",
    "description": "Rotating seasonal promo banner (Summer Nights, Winter Roost) across the top of the storefront.",
    "category": "visual",
    "enabledByDefault": true,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-seasonal-banner {
    background: linear-gradient(90deg, #e2662d, #f0a02f);
    color: white;
    text-align: center;
    padding: 0.55rem 1rem;
    font-size: 0.9rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .owlpark-feat-seasonal-banner .sb-icon {
    font-size: 1.05rem;
  }
</style>

<div class="owlpark-feat-seasonal-banner">
  <span class="sb-icon">🦉</span>
  <span class="sb-text"
    >Summer Nights are here — extended evening hours through August!</span
  >
</div>

<script>
  (function () {
    var MESSAGES = [
      "Summer Nights are here — extended evening hours through August!",
      "Weekend Roost Nights — keeper talks under the stars, Fri & Sat.",
      "Members save 15% on Twilight Explorer tickets this month.",
    ];

    var intervalId = null;

    function activate() {
      var el = document.querySelector(".owlpark-feat-seasonal-banner .sb-text");
      if (!el) return;

      // On a store that isn't Owl Park (e.g. the zoo web store), lift the banner
      // to the top of the page content so it reads as a banner instead of
      // trailing the end of the body where the loader first dropped it.
      var banner = document.querySelector(".owlpark-feat-seasonal-banner");
      var anchor =
        document.getElementById("sub-header") ||
        document.getElementById("ContentHeading");
      if (banner && anchor && anchor.parentNode) {
        anchor.parentNode.insertBefore(banner, anchor);
      }

      var i = 0;
      intervalId = setInterval(function () {
        i = (i + 1) % MESSAGES.length;
        el.textContent = MESSAGES[i];
      }, 4000);
    }

    function deactivate() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["seasonal-banner"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
