<script type="application/json" data-owlpark-manifest>
  {

    "name": "Seasonal Banner",
    "description": "Rotating seasonal promo banner (Summer Nights, Winter Roost) across the top of the storefront.",
    "category": "visual",
    "enabledByDefault": true,
    "requiresReload": false
  }
</script>

<style id="owlpark-seasonal-banner-style">
  .owlpark-feat-seasonal-banner {

    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;

    padding: 0.72rem 1.25rem;

    padding-right: calc(2.75rem + env(safe-area-inset-right, 0px));
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid rgba(17, 33, 31, 0.1);
    color: #17211f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,

    font-size: 0.9rem;

    line-height: 1.45;

  .owlpark-feat-seasonal-banner .sb-inner {

    min-width: 0;

      opacity 0.2s ease,

  .owlpark-feat-seasonal-banner.sb-swapping .sb-inner {
    opacity: 0;
    transform: translateY(-4px);
  }
  .owlpark-feat-seasonal-banner .sb-icon {

<div class="owlpark-feat-seasonal-banner" role="status" aria-live="polite">
  <div class="sb-inner">
    <span class="sb-icon" aria-hidden="true">🌙</span>
    <span class="sb-text">Summer Nights are here — extended evening hours through August!</span>
  </div>
  <div class="sb-dots" aria-hidden="true"></div>
  <button type="button" class="sb-close" aria-label="Dismiss announcement">&times;</button>
</div>

<script>
  (function () {
    /* =========================================================================
     * Seasonal Banner  ·  visual
     * -------------------------------------------------------------------------
     * WHAT   A slim, frosted announcement strip below the header that crossfades
     *        through seasonal messages, with minimal progress dots, pause-on-hover
     *        and a quiet dismiss control.
     * HOW    Injects its own markup; relocates the full-width strip to sit right
     *        below the host header (zoo #Header / Owl Park .site-header / top of
     *        body) and keeps it (and its <style>) there via a 1s watchdog, so a
     *        store that re-renders its chrome after load can't drop it. Rotation
     *        is a fade-out → swap → fade-in cycle on a timer.
     * HOSTS  Renders on every host. Dismissal is remembered for the browser
     *        session (sessionStorage) so it does not nag on every page.
     * ===================================================================== */

    var FEATURE_ID = "seasonal-banner";

    // ----- Configuration --------------------------------------------------
    var CONFIG = {
      rotateMs: 6000, // dwell time per announcement
      pauseOnHover: true, // freeze rotation while the pointer is over the strip
      rememberDismissal: true, // hide for the rest of the browser session once closed
      messages: [
        { icon: "🌙", text: "Summer Nights are here — extended evening hours through August!" },
        { icon: "⭐", text: "Weekend Roost Nights — keeper talks under the stars, Fri & Sat." },
        { icon: "🦉", text: "Members save 15% on Twilight Explorer tickets this month." },
      ],
    };

    var DISMISS_KEY = "owl-park-seasonal-dismissed";
    var rootEl = null;
    var iconEl = null;
    var textEl = null;
    var dotsEl = null;
    var index = 0;
    var timerId = null;
    var watchdogId = null;
    var paused = false;

    function render(i) {
      var m = CONFIG.messages[i];
      if (!m) return;
      if (iconEl) iconEl.textContent = m.icon;
      if (textEl) textEl.textContent = m.text;
      if (dotsEl) {
        [].forEach.call(dotsEl.children, function (dot, di) {
          dot.classList.toggle("is-active", di === i);
        });
      }
    }

    function goTo(i, animate) {
      index = (i + CONFIG.messages.length) % CONFIG.messages.length;
      if (animate === false || !rootEl) {
        render(index);
        return;
      }
      rootEl.classList.add("sb-swapping");
      setTimeout(function () {
        render(index);
        rootEl.classList.remove("sb-swapping");
      }, 200);
    }

    function tick() {
      if (!paused) goTo(index + 1, true);
    }

    function buildDots() {
      if (!dotsEl) return;
      dotsEl.innerHTML = "";
      CONFIG.messages.forEach(function (m, di) {
        var dot = document.createElement("button");
        dot.type = "button";
        dot.className = "sb-dot" + (di === 0 ? " is-active" : "");
        dot.setAttribute("aria-label", "Show announcement " + (di + 1));
        dot.addEventListener("click", function () {
          goTo(di, true);
          restartTimer();
        });
        dotsEl.appendChild(dot);
      });
    }

    function restartTimer() {
      if (timerId) clearInterval(timerId);
      timerId = setInterval(tick, CONFIG.rotateMs);
    }

    function resolveHeaderInsertion() {
      var zoo = document.getElementById("Header");
      if (zoo) return { ref: zoo, pos: "afterend" };
      var owl = document.querySelector(".site-header");
      if (owl) return { ref: owl, pos: "afterend" };
      return { ref: document.body, pos: "afterbegin" };
    }
    function placed(t) {
      if (!rootEl.isConnected) return false;
      return t.pos === "afterend"
        ? t.ref.nextElementSibling === rootEl
        : t.ref.firstElementChild === rootEl;
    }
    function ensurePlaced() {
      if (!rootEl) return;
      var t = resolveHeaderInsertion();
      if (!placed(t)) t.ref.insertAdjacentElement(t.pos, rootEl);
      var st = document.getElementById("owlpark-seasonal-banner-style");
      if (st && st.parentElement !== document.head) document.head.appendChild(st);
    }

    function isDismissed() {
      try {
        return CONFIG.rememberDismissal && sessionStorage.getItem(DISMISS_KEY) === "1";
      } catch (e) {
        return false;
      }
    }
    function dismiss() {
      try {
        if (CONFIG.rememberDismissal) sessionStorage.setItem(DISMISS_KEY, "1");
      } catch (e) {
        /* private mode — dismiss for this activation only */
      }
      teardownTimers();
      if (rootEl) rootEl.hidden = true;
    }

    function teardownTimers() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      if (watchdogId) {
        clearInterval(watchdogId);
        watchdogId = null;
      }
    }

    function activate() {
      rootEl = document.querySelector(".owlpark-feat-seasonal-banner");
      if (!rootEl) return;
      iconEl = rootEl.querySelector(".sb-icon");
      textEl = rootEl.querySelector(".sb-text");
      dotsEl = rootEl.querySelector(".sb-dots");

      if (isDismissed()) {
        rootEl.hidden = true;
        return;
      }

      ensurePlaced();
      buildDots();
      goTo(0, false);

      var closeBtn = rootEl.querySelector(".sb-close");
      if (closeBtn) closeBtn.addEventListener("click", dismiss);

      if (CONFIG.pauseOnHover) {
        rootEl.addEventListener("mouseenter", function () {
          paused = true;
        });
        rootEl.addEventListener("mouseleave", function () {
          paused = false;
        });
      }

      restartTimer();
      watchdogId = setInterval(ensurePlaced, 1000);
    }

    function deactivate() {
      teardownTimers();
      paused = false;
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
