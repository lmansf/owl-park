<script type="application/json" data-owlpark-manifest>
  {
    "id": "product-badges",
    "name": "Product Badges",
    "description": "\"Popular\" / \"Best Value\" / \"Members' Pick\" ribbon badges on product rows.",
    "category": "visual",
    "enabledByDefault": true,
    "requiresReload": false
  }
</script>

<style id="owlpark-product-badges-style">
  /* Refined product chip: a quiet corner chip on Owl Park .product-row
     (absolute) and a compact inline chip in the zoo ticket-name cell. Frosted,
     hairline-bordered, near-monochrome — ONE teal accent, used in two
     intensities so the three badges stay distinguishable without shouting. */
  .owlpark-feat-product-badges {
    position: absolute;
    top: -0.5rem;
    left: 0.9rem;
    z-index: 3;
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    pointer-events: none;
    padding: 0.22rem 0.55rem;
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.64rem;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #17211f;
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(8px) saturate(1.3);
    backdrop-filter: blur(8px) saturate(1.3);
    border: 1px solid rgba(17, 33, 31, 0.1);
    box-shadow: 0 2px 6px rgba(20, 40, 40, 0.05);
    animation: owlpark-pb-in 0.2s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  /* Zoo PLU rows are table rows — hang a compact chip inline by the ticket name. */
  .owlpark-feat-product-badges.owlpark-badge-inline {
    position: static;
    top: auto;
    left: auto;
    vertical-align: middle;
    margin-left: 0.5rem;
    padding: 0.12rem 0.45rem;
    font-size: 0.6rem;
    box-shadow: none;
  }
  /* Best Value — the strongest signal: soft-filled teal accent chip. */
  .owlpark-feat-product-badges.best-value {
    color: #0f6f7a;
    background: rgba(15, 111, 122, 0.09);
    border-color: rgba(15, 111, 122, 0.2);
  }
  /* Members' Pick — a quieter teal, hairline outline only. */
  .owlpark-feat-product-badges.members-pick {
    border-color: rgba(15, 111, 122, 0.3);
  }
  /* Popular — the neutral base chip (no override needed). */

  @keyframes owlpark-pb-in {
    from {
      opacity: 0;
      transform: translateY(-3px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-product-badges {
      color: #e9edec;
      background: rgba(26, 34, 36, 0.78);
      border-color: rgba(255, 255, 255, 0.11);
    }
    .owlpark-feat-product-badges.best-value {
      color: #5bc7cf;
      background: rgba(91, 199, 207, 0.12);
      border-color: rgba(91, 199, 207, 0.28);
    }
    .owlpark-feat-product-badges.members-pick {
      border-color: rgba(91, 199, 207, 0.34);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-product-badges {
      animation: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Product Badges  ·  visual
     * -------------------------------------------------------------------------
     * WHAT   Small "Popular" / "Best Value" / "Members' Pick" chips tucked onto
     *        product rows so shoppers can scan the standouts at a glance.
     * HOW    Reads the store's OWN live rows (no product feed). One badge per
     *        row: Owl Park keys three product ids directly; any other store
     *        derives the SAME set from live data — priciest row = Popular,
     *        cheapest = Best Value, a membership-named row = Members' Pick. A
     *        MutationObserver on the grid re-applies badges (guarded by an
     *        idempotency check) after the host re-renders its list, e.g. Owl
     *        Park's renderCatalog() wiping #catalog-grid on every tab switch.
     * HOSTS  Zoo PLU rows (tr.pluRow[data-plu]) get a compact chip inline in the
     *        ticket-name cell via H.isPlu(row); Owl Park rows (.product-row) get
     *        a quiet absolute corner chip. No-ops on an unkeyed row when there's
     *        no price spread (fewer than 2 rows, or every price equal).
     * ===================================================================== */

    var FEATURE_ID = "product-badges";

    // ----- Configuration --------------------------------------------------
    // Badge definitions (label + CSS class) and the rules that assign them.
    var CONFIG = {
      popular: { label: "Popular", cls: "popular" }, // priciest row / keyed hero
      bestValue: { label: "Best Value", cls: "best-value" }, // cheapest row
      membersPick: { label: "Members' Pick", cls: "members-pick" }, // membership row
      // Product ids Owl Park badges directly; every other store falls back to
      // the price/name heuristic in badgeFor() to reach the SAME three badges.
      keyed: {
        "prod-ga-ticket": "popular",
        "prod-family-day-pass": "bestValue",
        "prod-household-membership": "membersPick",
      },
      // A row whose name matches this is always a Members' Pick, on any host.
      membershipPattern: /member/i,
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------

    var H = owlHost();
    var observer = null;

    // Owl Park keys specific product ids (CONFIG.keyed); on any other store we
    // derive the same three badges from the live rows: priciest = Popular,
    // cheapest = Best Value, any membership row = Members' Pick.
    function badgeFor(row, rows) {
      var id = H.rowId(row);
      if (CONFIG.keyed[id]) return CONFIG[CONFIG.keyed[id]];
      if (CONFIG.membershipPattern.test(H.rowName(row))) return CONFIG.membersPick;
      if (rows.length < 2) return null;
      var prices = rows.map(H.rowPrice);
      var max = Math.max.apply(null, prices);
      var min = Math.min.apply(null, prices);
      if (max === min) return null;
      var price = H.rowPrice(row);
      if (price === max) return CONFIG.popular;
      if (price === min) return CONFIG.bestValue;
      return null;
    }

    function injectInto(row, rows) {
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]')) return;
      var badge = badgeFor(row, rows);
      if (!badge) return;

      var chip = document.createElement("span");
      chip.className = "owlpark-feat-product-badges " + badge.cls;
      chip.setAttribute("data-owlpark-feature", FEATURE_ID);
      chip.textContent = badge.label;

      if (H.isPlu(row)) {
        chip.classList.add("owlpark-badge-inline");
        var cell = H.rowNameCell(row) || row;
        cell.appendChild(chip);
      } else {
        row.appendChild(chip);
      }
    }

    function applyToRows() {
      var rows = H.rows();
      rows.forEach(function (row) {
        injectInto(row, rows);
      });
    }

    function activate() {
      applyToRows();
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
