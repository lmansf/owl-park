<script type="application/json" data-owlpark-manifest>
  {
    "id": "cart-reminder-toast",
    "name": "Cart Reminder Toast",
    "description": "Gentle toast reminder if items sit in the cart without checking out.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-cart-reminder-toast-style">
  .owlpark-feat-cart-reminder-toast {
    position: fixed;
    bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
    right: calc(1.25rem + env(safe-area-inset-right, 0px));
    box-sizing: border-box;
    max-width: min(360px, calc(100vw - 1.5rem));
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.5rem 0.4rem 1rem;
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(17, 33, 31, 0.1);
    border-radius: 20px;
    box-shadow: 0 6px 24px rgba(20, 40, 40, 0.09);
    color: #17211f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.45;
    letter-spacing: -0.005em;
    z-index: 2147483000;
    opacity: 0;
    transform: translateY(6px);
    transition:
      opacity 0.2s cubic-bezier(0.2, 0.6, 0.2, 1),
      transform 0.2s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  .owlpark-feat-cart-reminder-toast.crt-in {
    opacity: 1;
    transform: translateY(0);
  }
  .owlpark-feat-cart-reminder-toast .crt-icon {
    flex-shrink: 0;
    font-size: 1rem;
    line-height: 1;
  }
  .owlpark-feat-cart-reminder-toast .crt-msg {
    flex: 1 1 auto;
    min-width: 0;
  }
  .owlpark-feat-cart-reminder-toast .crt-view {
    flex-shrink: 0;
    display: inline-flex;

  .owlpark-feat-cart-reminder-toast .crt-view:hover {
    background: #0c5f69;

    justify-content: center;

    border-radius: 999px;

  .owlpark-feat-cart-reminder-toast .crt-dismiss:hover {

  .owlpark-feat-cart-reminder-toast :focus-visible {

  @media (max-width: 560px) {

      left: calc(0.75rem + env(safe-area-inset-left, 0px));
      right: calc(0.75rem + env(safe-area-inset-right, 0px));
      bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
      max-width: none;

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-cart-reminder-toast {
      background: rgba(18, 24, 26, 0.8);

      color: #e9edec;
    }
    .owlpark-feat-cart-reminder-toast .crt-dismiss {

    .owlpark-feat-cart-reminder-toast .crt-dismiss:hover {

  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-cart-reminder-toast {
      transform: none;
      transition: none;

    .owlpark-feat-cart-reminder-toast .crt-view,
    .owlpark-feat-cart-reminder-toast .crt-dismiss {
      transition: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Cart Reminder Toast  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A quiet, frosted toast pinned to the bottom corner that gently
     *        nudges a shopper who left items sitting in their cart to come back,
     *        with a teal "View cart" action and a ghost dismiss.
     * HOW    After an idle delay it reads the cart from localStorage
     *        ("owl-park-cart"); if the cart holds lines and the cart drawer
     *        isn't already open, it builds the toast as a direct <body> child
     *        (its id'd <style> is relocated to <head> so a host chrome re-render
     *        can't drop it). Entrance is a fade+rise; it auto-dismisses on a
     *        timer but stays dismissible, and "View cart" opens Owl Park's cart
     *        drawer via #open-cart-btn. Trigger/read logic is unchanged.
     * HOSTS  Effectively Owl Park only: the nudge keys off the "owl-park-cart"
     *        storage the zoo store never writes, so it stays a no-op on the zoo
     *        ViewItems page and any generic host.
     * ===================================================================== */

    var FEATURE_ID = "cart-reminder-toast";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      message: "Your cart is waiting — ready to check out?", // toast copy
      ctaLabel: "View cart", // primary action label (opens the cart drawer)
      idleDelayMs: 20000, // wait this long after activation before nudging
      autoDismissMs: 6000, // auto-hide the toast this long after it appears
    };

    var CART_STORAGE_KEY = "owl-park-cart"; // cart location — do not change
    var STYLE_ID = "owlpark-cart-reminder-toast-style";

    var reminderTimeoutId = null;
    var dismissTimeoutId = null;
    var toastEl = null;

    function readCartLines() {
      try {
        var raw = localStorage.getItem(CART_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    // Keep the feature's <style> in <head> so a host that re-renders its
    // chrome after load can't drop the toast's styling.
    function ensureStyleInHead() {
      var st = document.getElementById(STYLE_ID);
      if (st && st.parentElement !== document.head) document.head.appendChild(st);
    }

    function remove() {
      if (toastEl) {
        toastEl.remove();
        toastEl = null;
      }
      if (dismissTimeoutId) {
        clearTimeout(dismissTimeoutId);
        dismissTimeoutId = null;
      }
    }

    function openCart() {
      // Owl Park reveals its cart drawer via the header cart button.
      var opener = document.getElementById("open-cart-btn");
      if (opener) opener.click();
      remove();
    }

    function showToast() {
      if (toastEl) return;

      ensureStyleInHead();

      toastEl = document.createElement("div");
      toastEl.className = "owlpark-feat-cart-reminder-toast";
      toastEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      toastEl.setAttribute("role", "status");
      toastEl.setAttribute("aria-live", "polite");
      toastEl.innerHTML =
        '<span class="crt-icon" aria-hidden="true">🛒</span>' +
        '<span class="crt-msg"></span>' +
        '<button class="crt-view" type="button"></button>' +
        '<button class="crt-dismiss" type="button" aria-label="Dismiss reminder">&times;</button>';
      toastEl.querySelector(".crt-msg").textContent = CONFIG.message;
      toastEl.querySelector(".crt-view").textContent = CONFIG.ctaLabel;
      document.body.appendChild(toastEl);

      toastEl.querySelector(".crt-dismiss").addEventListener("click", remove);
      toastEl.querySelector(".crt-view").addEventListener("click", openCart);

      // Entrance: fade + rise on the next frame.
      requestAnimationFrame(function () {
        if (toastEl) toastEl.classList.add("crt-in");
      });

      dismissTimeoutId = setTimeout(remove, CONFIG.autoDismissMs);
    }

    function activate() {
      ensureStyleInHead();
      reminderTimeoutId = setTimeout(function () {
        var drawer = document.getElementById("cart-drawer");
        var cartOpen = drawer && drawer.classList.contains("open");
        if (readCartLines().length > 0 && !cartOpen) {
          showToast();
        }
      }, CONFIG.idleDelayMs);
    }

    function deactivate() {
      if (reminderTimeoutId) {
        clearTimeout(reminderTimeoutId);
        reminderTimeoutId = null;
      }
      if (dismissTimeoutId) {
        clearTimeout(dismissTimeoutId);
        dismissTimeoutId = null;
      }
      if (toastEl) {
        toastEl.remove();
        toastEl = null;
      }
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
