<script type="application/json" data-owlpark-manifest>
  {
    "id": "urgency-stock-indicator",
    "name": "Urgency Stock Indicator",
    "description": "Real per-ticket sold-out availability where the store publishes it; a demo scarcity nudge otherwise.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-urgency-stock-indicator-style">
  /* Small status chip mounted under a ticket row. Two quiet tones, both
     hairline and restrained — never a flashing red alarm:
       · caution (default)  — the simulated "Only N left" scarcity nudge
       · muted   (.owlpark-soldout) — the REAL, factual "Sold out" state */
  .owlpark-feat-urgency-stock-indicator {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    box-sizing: border-box;
    width: fit-content;
    max-width: 100%;
    margin-top: 0.4rem;
    padding: 0.24rem 0.55rem;
    border: 1px solid rgba(184, 121, 31, 0.22);
    border-radius: 10px;
    background: rgba(184, 121, 31, 0.12);
    color: #b8791f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: 0.01em;
    animation: owlpark-usi-in 0.2s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  .owlpark-feat-urgency-stock-indicator .usi-dot {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: currentColor;
    opacity: 0.85;
  }
  .owlpark-feat-urgency-stock-indicator .usi-text {
    min-width: 0;
  }
  /* Real sold-out state (read from the store's live availability) reads as a
     neutral, muted fact rather than the amber scarcity caution. */
  .owlpark-feat-urgency-stock-indicator.owlpark-soldout {
    color: #67736f;
    background: rgba(17, 33, 31, 0.06);
    border-color: rgba(17, 33, 31, 0.12);
  }
  @keyframes owlpark-usi-in {
    from {
      opacity: 0;
      transform: translateY(3px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @media (prefers-color-scheme: dark) {
    .owlpark-feat-urgency-stock-indicator {
      color: #e2ab5c;
      background: rgba(214, 158, 74, 0.15);
      border-color: rgba(214, 158, 74, 0.32);
    }
    .owlpark-feat-urgency-stock-indicator.owlpark-soldout {
      color: #98a4a1;
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.14);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-urgency-stock-indicator {
      animation: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Urgency Stock Indicator  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A small status chip beneath a ticket row: a quiet amber "Only N
     *        left for today's date" scarcity nudge, or a muted, factual
     *        "Sold out for this date".
     * HOW    Decorates selected product rows through the shared owlHost()
     *        adapter and re-applies via a MutationObserver on the catalog grid
     *        (idempotency-guarded, so tab re-renders don't duplicate chips).
     *        Every injected node is tagged data-owlpark-feature so deactivate()
     *        removes it cleanly.
     * HOSTS  ZOO store — reads the REAL per-PLU availability from
     *        input[id$="PluNotAvailableHidden"] and shows "Sold out" ONLY when
     *        genuinely sold out (no chip when available); never fabricates a
     *        count. Owl Park has no availability feed, so it shows the
     *        SIMULATED "Only N left" nudge on its target rows instead.
     * ===================================================================== */

    var FEATURE_ID = "urgency-stock-indicator";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. The zoo store's REAL sold-out read below is
    // never affected by these — only the Owl Park demo nudge is.
    var CONFIG = {
      // Simulated remaining-count range (inclusive) for the Owl Park demo nudge.
      simulatedMin: 3, // lowest "left" count the nudge will show
      simulatedMax: 9, // highest "left" count the nudge will show
      // Only surface the demo nudge when the simulated count is below this
      // threshold. simulatedMax (9) sits under 10, so the nudge always shows by
      // default; lower it to reveal the nudge only for tighter simulated stock.
      lowStockThreshold: 10,
      // Copy. "{n}" in lowStockText is replaced by the simulated count.
      // soldOutText is shown ONLY from the store's REAL feed — never faked.
      lowStockText: "Only {n} left for today's date",
      soldOutText: "Sold out for this date",
      // Owl Park product ids that carry the demo nudge first (see selectRows).
      targetProductIds: ["prod-family-day-pass", "prod-twilight-ticket"],
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        // Where header/utility buttons dock (zoo sub-header -> Owl Park header -> float).
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        // Product list container to observe for re-renders.
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        // Live product rows (skips Angular {{template}} rows on the zoo page).
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        // Inline anchor to hang a small decoration next to the product name.
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        // Block anchor under the product's descriptive text.
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();

    // Store-agnostic name test used when the Owl Park ids aren't present.
    var NAME_RE = /twilight|family|vip|event|premium|combo|child/i;
    var observer = null;

    function randomCount() {
      var lo = CONFIG.simulatedMin;
      var hi = CONFIG.simulatedMax;
      return Math.floor(Math.random() * (hi - lo + 1)) + lo; // inclusive lo..hi
    }

    // Build a sleek status chip: a tone-coloured dot + label. `variant` adds a
    // state class (e.g. "owlpark-soldout"). Always tagged for clean teardown.
    function makeChip(text, variant) {
      var chip = document.createElement("div");
      chip.className =
        "owlpark-feat-urgency-stock-indicator" + (variant ? " " + variant : "");
      chip.setAttribute("data-owlpark-feature", FEATURE_ID);
      chip.setAttribute("role", "status");
      var dot = document.createElement("span");
      dot.className = "usi-dot";
      dot.setAttribute("aria-hidden", "true");
      var label = document.createElement("span");
      label.className = "usi-text";
      label.textContent = text;
      chip.appendChild(dot);
      chip.appendChild(label);
      return chip;
    }

    // Choose the subset of rows to decorate:
    //   1) Owl Park ids first (prod-family-day-pass / prod-twilight-ticket),
    //   2) else rows whose name matches NAME_RE,
    //   3) else just the single highest-priced row. Never every row.
    function selectRows() {
      var rows = H.rows();
      var byId = rows.filter(function (row) {
        return CONFIG.targetProductIds.indexOf(H.rowId(row)) !== -1;
      });
      if (byId.length) return byId;
      var byName = rows.filter(function (row) {
        return NAME_RE.test(H.rowName(row));
      });
      if (byName.length) return byName;
      var top = null;
      var topPrice = -Infinity;
      rows.forEach(function (row) {
        var p = H.rowPrice(row);
        if (p > topPrice) {
          topPrice = p;
          top = row;
        }
      });
      return top ? [top] : [];
    }

    // The zoo store publishes real per-PLU availability in a hidden field, so on
    // that store we show a TRUTHFUL sold-out badge from live data instead of a
    // fabricated "only N left" count. Owl Park has no such feed, so it keeps the
    // demo nudge — there is no real stock signal to read there.
    function isSoldOut(row) {
      var f = row.querySelector('input[id$="PluNotAvailableHidden"]');
      return !!f && String(f.value).toLowerCase() === "true";
    }

    function injectReal(row) {
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]'))
        return;
      if (!isSoldOut(row)) return; // available — do not invent scarcity
      H.rowInfoCell(row).appendChild(makeChip(CONFIG.soldOutText, "owlpark-soldout"));
    }

    function injectMock(row) {
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]'))
        return;
      var n = randomCount();
      if (n >= CONFIG.lowStockThreshold) return; // above the low-stock cutoff
      H.rowInfoCell(row).appendChild(
        makeChip(CONFIG.lowStockText.replace("{n}", n))
      );
    }

    function applyToRows() {
      // Real availability on the zoo store; the demo nudge everywhere else.
      if (H.isZoo()) {
        H.rows().forEach(injectReal);
      } else {
        selectRows().forEach(injectMock);
      }
    }

    function activate() {
      applyToRows();
      // The catalog list re-renders on tab switches, so watch for new rows
      // and re-apply the urgency line whenever a target row reappears.
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["urgency-stock-indicator"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
