<script type="application/json" data-owlpark-manifest>
  {
    "id": "ambient-park-sounds",
    "name": "Ambient Park Sounds",
    "description": "Toggle a synthesized looping ambient park soundscape.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-ambient-park-sounds-style">
  /* Standard docked-utility button: a quiet glass pill that reads on the dark
     floating bar and on Owl Park's header alike. */
  .owlpark-feat-ambient-park-sounds-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    min-height: 44px;
    box-sizing: border-box;
    padding: 0 0.9rem;
    background: rgba(255, 255, 255, 0.12) !important;
    color: #ffffff !important;
    border: 1px solid rgba(255, 255, 255, 0.22) !important;
    border-radius: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1px;
    text-decoration: none;
    cursor: pointer;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    transition:
      transform 0.16s cubic-bezier(0.2, 0.6, 0.2, 1),
      background 0.16s ease;
  }
  .owlpark-feat-ambient-park-sounds-btn:hover {
    background: rgba(255, 255, 255, 0.2) !important;
    transform: translateY(-1px);
  }
  .owlpark-feat-ambient-park-sounds-btn:active {
    transform: translateY(0);
  }
  .owlpark-feat-ambient-park-sounds-btn:focus-visible {
    outline: 2px solid rgba(255, 255, 255, 0.85);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-ambient-park-sounds-btn {
      transition: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Ambient Park Sounds  ·  utility
     * -------------------------------------------------------------------------
     * WHAT   A docked toggle that plays a soft, synthesized park soundscape — a
     *        low "breeze" drone under randomly pitched bird chirps — and mutes
     *        it again. A speaker / muted-speaker glyph reflects the on/off state.
     * HOW    Audio is generated live with the Web Audio API (oscillators + gain,
     *        no external asset) and only ever starts from the user's click — the
     *        gesture browsers require for audio. Docks the button into Owl Park's
     *        .header-actions, else a self-owned frosted floating bar on <body>,
     *        kept alive through host re-renders by a 1s watchdog.
     * HOSTS  Renders on every host (self-contained; needs no store data). No-ops
     *        where the Web Audio API is unavailable.
     * ===================================================================== */

    var FEATURE_ID = "ambient-park-sounds";

    // ----- Configuration --------------------------------------------------
    var CONFIG = {
      // Dock button copy. The glyph reflects the CURRENT on/off state; the
      // label carries the action and aria-pressed carries state for AT.
      glyphOff: "🔇", // muted speaker — ambience is stopped
      labelOff: "Park Sounds", // button text while stopped
      ariaLabelOff: "Play ambient park sounds", // accessible name while stopped
      glyphOn: "🔊", // speaker — ambience is playing
      labelOn: "Stop Ambience", // button text while playing
      ariaLabelOn: "Stop ambient park sounds", // accessible name while playing

      // Audio synthesis (Web Audio API — no external asset). Tunable, safe to edit.
      breezeHz: 110, // low sine "breeze" drone frequency (Hz)
      breezeGain: 0.02, // breeze loudness — a very quiet bed
      chirpEveryMs: 1500, // gap between random bird chirps
      chirpBaseHz: 900, // chirp base pitch (Hz)…
      chirpRangeHz: 500, // …plus up to this much random detune
      chirpPeakGain: 0.05, // chirp peak loudness
      chirpAttackS: 0.05, // chirp fade-in time (seconds)
      chirpDurationS: 0.3, // chirp total length (seconds)
    };

    var buttonEl = null;
    var audioCtx = null;
    var nodes = [];
    var chirpIntervalId = null;
    var playing = false;
    var watchdogId = null;

    // Host-agnostic mount point. Prefer the storefront's own header, but fall
    // back to a shared floating bar on <body> so this snippet still shows its
    // control when pasted anywhere in ANY page's body (not just Owl Park's).
    function owlparkFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (bar) return bar;
      bar = document.createElement("div");
      bar.id = "owlpark-fallback-actions";
      bar.setAttribute("data-owlpark-fallback", "actions");
      bar.style.cssText =
        "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
        "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
        "top:calc(10px + env(safe-area-inset-top, 0px));" +
        "right:calc(10px + env(safe-area-inset-right, 0px));" +
        "padding:8px;background:rgba(18,26,28,0.72);border-radius:16px;" +
        "border:1px solid rgba(255,255,255,0.12);" +
        "-webkit-backdrop-filter:blur(14px) saturate(1.3);backdrop-filter:blur(14px) saturate(1.3);" +
        "box-shadow:0 8px 30px rgba(8,20,22,0.28);";
      var barStyle = document.createElement("style");
      barStyle.id = "owlpark-fallback-actions-style";
      barStyle.setAttribute("data-owlpark-fallback", "actions");
      barStyle.textContent =
        "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
        "{min-height:44px;box-sizing:border-box;}";
      document.head.appendChild(barStyle);
      document.body.appendChild(bar);
      return bar;
    }
    function owlparkPruneFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (!bar || bar.children.length) return;
      bar.remove();
      var barStyle = document.getElementById("owlpark-fallback-actions-style");
      if (barStyle) barStyle.remove();
    }

    function updateLabel() {
      if (!buttonEl) return;
      buttonEl.textContent = playing
        ? CONFIG.glyphOn + " " + CONFIG.labelOn
        : CONFIG.glyphOff + " " + CONFIG.labelOff;
      buttonEl.setAttribute("aria-pressed", playing ? "true" : "false");
      buttonEl.setAttribute(
        "aria-label",
        playing ? CONFIG.ariaLabelOn : CONFIG.ariaLabelOff,
      );
    }

    function scheduleChirp() {
      if (!audioCtx) return;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = CONFIG.chirpBaseHz + Math.random() * CONFIG.chirpRangeHz;
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(
        CONFIG.chirpPeakGain,
        audioCtx.currentTime + CONFIG.chirpAttackS,
      );
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + CONFIG.chirpDurationS);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + CONFIG.chirpDurationS);
    }

    function startAmbience() {
      if (playing) return;
      var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) return;
      audioCtx = new AudioContextCtor();

      var breeze = audioCtx.createOscillator();
      var breezeGain = audioCtx.createGain();
      breeze.type = "sine";
      breeze.frequency.value = CONFIG.breezeHz;
      breezeGain.gain.value = CONFIG.breezeGain;
      breeze.connect(breezeGain).connect(audioCtx.destination);
      breeze.start();
      nodes.push(breeze, breezeGain);

      chirpIntervalId = setInterval(scheduleChirp, CONFIG.chirpEveryMs);
      playing = true;
      updateLabel();
    }

    function stopAmbience() {
      if (chirpIntervalId) {
        clearInterval(chirpIntervalId);
        chirpIntervalId = null;
      }
      nodes.forEach(function (node) {
        if (typeof node.stop === "function") {
          try {
            node.stop();
          } catch (e) {
            /* already stopped */
          }
        }
        if (typeof node.disconnect === "function") node.disconnect();
      });
      nodes = [];
      if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
      }
      playing = false;
      updateLabel();
    }

    // Audio may only begin from a user gesture, so start/stop is click-driven.
    function onClick() {
      if (playing) {
        stopAmbience();
      } else {
        startAmbience();
      }
    }

    // Owl Park's header is stable, so dock there. On any OTHER store the header
    // chrome may be hidden before the host reveals its body, re-rendered from a
    // template after load, or styled unpredictably — so use the self-owned
    // floating bar, which is a direct child of <body> (a sibling of the host's
    // own content wrapper) and therefore survives the host re-rendering itself.
    function resolveDock() {
      return document.querySelector(".header-actions") || owlparkFallbackBar();
    }

    function ensureButton() {
      if (buttonEl && buttonEl.isConnected) {
        updateLabel();
        return;
      }
      buttonEl = document.createElement("button");
      buttonEl.type = "button";
      buttonEl.className = "owlpark-feat-ambient-park-sounds-btn";
      buttonEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      buttonEl.addEventListener("click", onClick);
      resolveDock().prepend(buttonEl);
      updateLabel();
    }

    function activate() {
      playing = false;
      ensureButton();
      // Re-assert the control if the host removes or replaces it after load
      // (body reveal, template re-render); cheap isConnected check.
      watchdogId = setInterval(ensureButton, 1000);
    }

    function deactivate() {
      if (watchdogId) {
        clearInterval(watchdogId);
        watchdogId = null;
      }
      stopAmbience();
      if (buttonEl) {
        buttonEl.removeEventListener("click", onClick);
        buttonEl.remove();
        buttonEl = null;
      }
      owlparkPruneFallbackBar();
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
