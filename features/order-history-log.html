<script>
  (function () {
    /* =========================================================================
     * Order History Log  ·  utility
     * -------------------------------------------------------------------------
     * WHAT   A "My Orders" button in the header that opens a clean dialog
     *        listing past mock orders (order id, its date, and the total),
     *        newest first.
     * HOW    Records each checkout by observing #checkout-modal: when the
     *        confirmation modal is shown it reads the freshly-written #order-id
     *        and the total parsed from #order-summary, then unshifts
     *        { orderText, total } into a localStorage log (CONFIG.storageKey,
     *        capped at CONFIG.maxEntries), de-duped by the last recorded order
     *        id so the same order is never logged twice. The dialog fades/scales
     *        in, traps focus, and closes on Esc / scrim / × / Close.
     * HOSTS  Owl Park only: the button mounts into .header-actions and the
     *        recorder attaches to #checkout-modal — both absent on the zoo
     *        ViewItems ticket page, so the feature is a no-op there (no button,
     *        nothing recorded).
     * ===================================================================== */

    var FEATURE_ID = "order-history-log";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      // localStorage key holding the log: an array of { orderText, total }.
      storageKey: "owl-park-order-history",
      // Cap on stored entries; newest are kept, oldest fall off the end.
      maxEntries: 25,
      // Header button label + dialog heading copy.
      buttonLabel: "🧾 My Orders",
      title: "🧾 My Orders",
      // Shown when the log is empty.
      emptyText: "No orders yet — complete a checkout to see it here.",
      // js/main.js writes #order-id as "Order OP-###### · M/D/YYYY"; for display
      // only, the stored text is split on this token into an ink order id + a
      // muted date. The full string is what gets stored (format unchanged).
      dateSeparator: " · ",
    };

    var historyBtn = null;
    var overlayEl = null;
    var checkoutObserver = null;
    var lastOrderId = "";
    var lastFocus = null;
    var keyHandler = null;

    // ----- Storage --------------------------------------------------------
    function readHistory() {
      try {
        var raw = localStorage.getItem(CONFIG.storageKey);
        var parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(function (e) {
          return e && typeof e === "object" && !Array.isArray(e);
        });
      } catch (e) {
        return [];
      }
    }

    function writeHistory(entries) {
      localStorage.setItem(
        CONFIG.storageKey,
        JSON.stringify(entries.slice(0, CONFIG.maxEntries)),
      );
    }

    function parseTotal(summaryEl) {
      if (!summaryEl) return "";
      var matches = summaryEl.textContent.match(/\$[\d,]+\.\d{2}/g);
      return matches && matches.length ? matches[matches.length - 1] : "";
    }

    // ----- Recording (observes the checkout confirmation) -----------------
    function recordOrder() {
      var orderIdEl = document.getElementById("order-id");
      var summaryEl = document.getElementById("order-summary");
      var orderText = orderIdEl ? orderIdEl.textContent : "";
      if (!orderText || orderText === lastOrderId) return;
      lastOrderId = orderText;

      var entries = readHistory();
      entries.unshift({ orderText: orderText, total: parseTotal(summaryEl) });
      writeHistory(entries);
    }

    // ----- Dialog ---------------------------------------------------------
    function removeOverlay() {
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      if (overlayEl) {
        overlayEl.remove();
        overlayEl = null;
      }
      if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      lastFocus = null;
    }

    function splitOrderText(text) {
      var t = String(text || "");
      var i = t.indexOf(CONFIG.dateSeparator);
      if (i === -1) return { id: t, date: "" };
      return { id: t.slice(0, i), date: t.slice(i + CONFIG.dateSeparator.length) };
    }

    function buildEntry(e) {
      var parts = splitOrderText(e.orderText);
      var row = document.createElement("div");
      row.className = "ohl-entry";
      row.setAttribute("role", "listitem");

      var main = document.createElement("div");
      main.className = "ohl-main";
      var idEl = document.createElement("span");
      idEl.className = "ohl-id";
      idEl.textContent = parts.id || e.orderText || "";
      main.appendChild(idEl);
      if (parts.date) {
        var metaEl = document.createElement("span");
        metaEl.className = "ohl-meta";
        metaEl.textContent = parts.date;
        main.appendChild(metaEl);
      }

      var totalEl = document.createElement("span");
      totalEl.className = "ohl-total";
      totalEl.textContent = e.total || "";

      row.appendChild(main);
      row.appendChild(totalEl);
      return row;
    }

    function focusable() {
      if (!overlayEl) return [];
      return [].slice.call(
        overlayEl.querySelectorAll(
          'button, [href], input, [tabindex]:not([tabindex="-1"])',
        ),
      );
    }

    function onKey(e) {
      if (e.key === "Escape" || e.key === "Esc") {
        e.preventDefault();
        removeOverlay();
        return;
      }
      if (e.key === "Tab") {
        var f = focusable();
        if (!f.length) return;
        var first = f[0];
        var last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function openHistory() {
      if (overlayEl) return;
      lastFocus = document.activeElement;
      var entries = readHistory();

      overlayEl = document.createElement("div");
      overlayEl.className = "owlpark-feat-order-history-log-overlay";
      overlayEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlayEl.setAttribute("role", "dialog");
      overlayEl.setAttribute("aria-modal", "true");
      overlayEl.setAttribute("aria-label", CONFIG.title);
      overlayEl.innerHTML =
        '<div class="owlpark-feat-order-history-log-card">' +
        '<button type="button" class="owlpark-feat-order-history-log-x" aria-label="Close">&times;</button>' +
        "<h3></h3>" +
        '<div class="ohl-list"></div>' +
        '<button type="button" class="owlpark-feat-order-history-log-close">Close</button>' +
        "</div>";

      var heading = overlayEl.querySelector("h3");
      heading.textContent = CONFIG.title;
      var list = overlayEl.querySelector(".ohl-list");
      var closeBtn = overlayEl.querySelector(
        ".owlpark-feat-order-history-log-close",
      );
      var xBtn = overlayEl.querySelector(".owlpark-feat-order-history-log-x");

      if (entries.length) {
        list.setAttribute("role", "list");
        entries.forEach(function (e) {
          list.appendChild(buildEntry(e));
        });
      } else {
        var empty = document.createElement("div");
        empty.className = "ohl-empty";
        empty.textContent = CONFIG.emptyText;
        list.appendChild(empty);
      }

      document.body.appendChild(overlayEl);

      closeBtn.addEventListener("click", removeOverlay);
      xBtn.addEventListener("click", removeOverlay);
      overlayEl.addEventListener("click", function (e) {
        if (e.target === overlayEl) removeOverlay();
      });
      keyHandler = onKey;
      document.addEventListener("keydown", keyHandler);

      requestAnimationFrame(function () {
        if (overlayEl) overlayEl.classList.add("is-open");
        if (xBtn) xBtn.focus();
      });
    }

    // ----- Lifecycle ------------------------------------------------------
    function activate() {
      var actions = document.querySelector(".header-actions");
      if (actions) {
        historyBtn = document.createElement("button");
        historyBtn.type = "button";
        historyBtn.className = "owlpark-feat-order-history-log-btn";
        historyBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
        historyBtn.setAttribute("aria-haspopup", "dialog");
        historyBtn.textContent = CONFIG.buttonLabel;
        historyBtn.addEventListener("click", openHistory);
        actions.prepend(historyBtn);
      }

      var modal = document.getElementById("checkout-modal");
      if (modal) {
        checkoutObserver = new MutationObserver(function (mutations) {
          for (var i = 0; i < mutations.length; i++) {
            if (
              mutations[i].attributeName === "class" &&
              !modal.classList.contains("hidden")
            ) {
              recordOrder();
            }
          }
        });
        checkoutObserver.observe(modal, {
          attributes: true,
          attributeFilter: ["class"],
        });
      }
    }

    function deactivate() {
      if (checkoutObserver) {
        checkoutObserver.disconnect();
        checkoutObserver = null;
      }
      removeOverlay();
      if (historyBtn) {
        historyBtn.removeEventListener("click", openHistory);
        historyBtn.remove();
        historyBtn = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
