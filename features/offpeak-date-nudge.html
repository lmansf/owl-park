<script>
  (function () {
    /* =========================================================================
     * Off-Peak Date Nudge  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A quiet, frosted callout on each ticket row that nudges shoppers
     *        toward cheaper off-peak (quiet) visit dates and lets them pick any
     *        upcoming date from a demand-labelled picker. Quiet days carry a real
     *        off-peak discount onto the cart line.
     * HOW    Decorates Owl Park catalog ticket rows (#catalog-grid .product-row),
     *        re-applied after every catalog re-render via a MutationObserver with
     *        an idempotency guard. Prices/savings come from data/products.json
     *        minus a discount computed by window.OwlPark.discountOf(price, rate).
     *        Applying a date pushes (or bumps) a cart line keyed by ticket+date; a
     *        quiet day stores custom.discountRate (a basis re-applied to the live
     *        catalog price on every render, NEVER a frozen amount), writes the
     *        owl-park-cart key, then dispatches owl-park-cart-changed. The discount
     *        is recomputed from a live API read at click time.
     * HOSTS  Owl Park only (keys off #catalog-grid .product-row + the ticket
     *        category). No-ops with no catalog fetch, no ticket rows, or no
     *        window.OwlPark pricing API.
     * ===================================================================== */

    var FEATURE_ID = "offpeak-date-nudge";
    var CART_KEY = "owl-park-cart";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. The off-peak discount MECHANISM (a rate stored
    // on the cart line as custom.discountRate and re-applied to the live catalog
    // price on every render) must NOT change — only the rate itself.
    var CONFIG = {
      daysAhead: 14, // how many upcoming dates the picker offers
      // A quiet day is discounted by this share of the ticket's catalog price. The
      // saving shown on the callout/chip and the price the line is actually added
      // at both derive from this one number; it is stored on the line as
      // custom.discountRate (a basis), never a discounted absolute amount.
      offpeakDiscountRate: 0.12,
      // MOCK DEMAND DATA — demo storefront, no capacity service behind it. Demand
      // is a deterministic function of the date itself (a hash of the ISO string,
      // plus a weekend bias), so a given date always shows the same level, on every
      // device, forever. It is never presented as live availability.
      // `discounted: true` marks the off-peak tier.
      demandLevels: [
        { key: "quiet", label: "quiet", discounted: true },
        { key: "steady", label: "steady", discounted: false },
        { key: "busy", label: "busy", discounted: false },
        { key: "full", label: "nearly full", discounted: false },
      ],
      copy: {
        glyph: "📅", // decorative calendar glyph on the callout (aria-hidden)
        title: "Quiet days cost less", // callout headline
        savePrefix: "Save ", // savings line, wraps the emphasized figure
        saveSuffix: " on quiet days",
        saveNeutral: "Quiet days are discounted", // shown if no live price yet
        openLabel: "Pick a visit date", // primary teal pill
        dismissLabel: "Dismiss", // quiet ghost
        savePer: "save ", // per-chip saving prefix ("· save $X")
        fine:
          "Quiet days cost less because they cost us less. Demand shown is demo data generated from the date — this storefront has no live capacity feed.",
      },
    };

    var products = null;
    var gridObserver = null;
    // Bumped on every activate and deactivate: an in-flight catalog fetch whose
    // generation no longer matches belongs to an activation that has since been
    // torn down, and must touch nothing.
    var generation = 0;

    function readCart() {
      try {
        var raw = localStorage.getItem(CART_KEY);
        var lines = raw ? JSON.parse(raw) : [];
        return Array.isArray(lines) ? lines : [];
      } catch (err) {
        return [];
      }
    }

    function writeCart(lines) {
      localStorage.setItem(CART_KEY, JSON.stringify(lines));
      window.dispatchEvent(new CustomEvent("owl-park-cart-changed"));
    }

    function money(n) {
      return "$" + n.toFixed(2);
    }

    function isoOf(date) {
      var m = String(date.getMonth() + 1).padStart(2, "0");
      var d = String(date.getDate()).padStart(2, "0");
      return date.getFullYear() + "-" + m + "-" + d;
    }

    function demandFor(date) {
      var iso = isoOf(date);
      var hash = 0;
      for (var i = 0; i < iso.length; i++) {
        hash = (hash * 31 + iso.charCodeAt(i)) >>> 0;
      }
      var day = date.getDay();
      var weekendBias = day === 0 || day === 6 ? 2 : 0; // weekends run hot at the park
      var index = Math.min((hash % 3) + weekendBias, CONFIG.demandLevels.length - 1);
      return CONFIG.demandLevels[index];
    }

    /**
     * The real discount for a date: 0 unless the date is quiet, and always whole
     * dollars. The callout figure, the chip label, the cart note and the price the
     * line is charged at all come from this one number, which is core's own
     * rounding (js/products.js), so the advertised saving is exactly what is charged.
     */
    function discountFor(product, demand) {
      if (!demand.discounted) return 0;
      var api = window.OwlPark;
      if (!api || typeof api.discountOf !== "function") return 0;
      return api.discountOf(product.price, CONFIG.offpeakDiscountRate);
    }

    function upcomingDates() {
      var dates = [];
      var start = new Date();
      start.setHours(0, 0, 0, 0);
      for (var i = 0; i < CONFIG.daysAhead; i++) {
        var date = new Date(start.getTime());
        date.setDate(start.getDate() + i);
        dates.push(date);
      }
      return dates;
    }

    function shortDay(date) {
      return date.toLocaleDateString(undefined, {
        weekday: "short",
        day: "numeric",
      });
    }

    function longDay(date) {
      return date.toLocaleDateString(undefined, {
        weekday: "short",
        day: "numeric",
        month: "short",
      });
    }

    function addDatedTicket(product, date, demand) {
      var discount = discountFor(product, demand);
      // The note is stored, and a stored cart outlives the catalog it was priced
      // against, so it carries no amount: the off-peak price itself is re-resolved
      // from the live catalog on render.
      var note =
        "📅 Visit " +
        longDay(date) +
        " · " +
        demand.label +
        (discount > 0 ? " · off-peak rate" : "");

      var line = {
        id: product.id,
        key: product.id + "#visit-" + isoOf(date),
        qty: 1,
        meta: {
          visit: { date: isoOf(date), demand: demand.key, note: note },
        },
      };
      if (discount > 0) line.custom = { discountRate: CONFIG.offpeakDiscountRate };

      // Same ticket, same date => same line: bump its quantity instead of stacking
      // a duplicate.
      var lines = readCart();
      for (var i = 0; i < lines.length; i++) {
        if ((lines[i].key || lines[i].id) === line.key) {
          lines[i].qty += 1;
          writeCart(lines);
          return;
        }
      }
      lines.push(line);
      writeCart(lines);
    }

    function dayButton(product, date) {
      var demand = demandFor(date);
      var discount = discountFor(product, demand);
      var price = product.price - discount;

      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "odn-day odn-" + demand.key;
      btn.setAttribute("data-visit-date", isoOf(date));

      var dateEl = document.createElement("span");
      dateEl.className = "odn-day-date";
      dateEl.textContent = shortDay(date);

      var demandEl = document.createElement("span");
      demandEl.className = "odn-day-demand";
      demandEl.textContent =
        demand.label + (discount > 0 ? " · " + CONFIG.copy.savePer + money(discount) : "");

      var priceEl = document.createElement("span");
      priceEl.className = "odn-day-price";
      priceEl.textContent = money(price);

      btn.append(dateEl, demandEl, priceEl);
      btn.setAttribute(
        "aria-label",
        "Add " +
          longDay(date) +
          " visit, " +
          demand.label +
          (discount > 0 ? ", save " + money(discount) : "") +
          ", " +
          money(price),
      );
      // Recompute the discount from a live API read at click time, then apply.
      btn.addEventListener("click", function () {
        addDatedTicket(product, date, demand);
      });
      return btn;
    }

    function buildDateBlock(row, product) {
      var block = document.createElement("div");
      block.className = "owlpark-feat-offpeak-date-nudge";
      block.setAttribute("data-owlpark-feature", FEATURE_ID);

      // --- Callout: glyph + headline + emphasized savings figure ---
      var callout = document.createElement("div");
      callout.className = "odn-callout";

      var glyph = document.createElement("span");
      glyph.className = "odn-glyph";
      glyph.setAttribute("aria-hidden", "true");
      glyph.textContent = CONFIG.copy.glyph;

      var copy = document.createElement("div");
      copy.className = "odn-copy";

      var title = document.createElement("span");
      title.className = "odn-title";
      title.textContent = CONFIG.copy.title;

      var save = document.createElement("span");
      save.className = "odn-save";
      save.setAttribute("role", "status");
      save.setAttribute("aria-live", "polite");

      var quiet = CONFIG.demandLevels.filter(function (d) {
        return d.discounted;
      })[0];
      var best = quiet ? discountFor(product, quiet) : 0;
      if (best > 0) {
        save.appendChild(document.createTextNode(CONFIG.copy.savePrefix));
        var amt = document.createElement("b");
        amt.className = "odn-save-amt";
        amt.textContent = money(best);
        save.appendChild(amt);
        save.appendChild(document.createTextNode(CONFIG.copy.saveSuffix));
      } else {
        // No live price yet: nudge without inventing a figure.
        save.textContent = CONFIG.copy.saveNeutral;
      }

      copy.append(title, save);
      callout.append(glyph, copy);

      // --- Actions: single primary pill + quiet ghost dismiss ---
      var panelId = "odn-panel-" + product.id;

      var actions = document.createElement("div");
      actions.className = "odn-actions";

      var openBtn = document.createElement("button");
      openBtn.type = "button";
      openBtn.className = "odn-open";
      openBtn.textContent = CONFIG.copy.openLabel;
      openBtn.setAttribute("aria-expanded", "false");
      openBtn.setAttribute("aria-controls", panelId);

      var dismissBtn = document.createElement("button");
      dismissBtn.type = "button";
      dismissBtn.className = "odn-dismiss";
      dismissBtn.textContent = CONFIG.copy.dismissLabel;

      actions.append(openBtn, dismissBtn);

      // --- Panel: demand-labelled date rail + fine print ---
      var panel = document.createElement("div");
      panel.className = "odn-panel";
      panel.id = panelId;
      panel.hidden = true;

      var rail = document.createElement("div");
      rail.className = "odn-rail";
      rail.setAttribute("role", "group");
      rail.setAttribute("aria-label", "Upcoming visit dates");
      upcomingDates().forEach(function (date) {
        rail.appendChild(dayButton(product, date));
      });

      var fine = document.createElement("p");
      fine.className = "odn-fine";
      fine.textContent = CONFIG.copy.fine;

      panel.append(rail, fine);

      openBtn.addEventListener("click", function () {
        panel.hidden = !panel.hidden;
        openBtn.setAttribute("aria-expanded", String(!panel.hidden));
      });
      dismissBtn.addEventListener("click", function () {
        block.remove();
      });

      block.append(callout, actions, panel);
      row.appendChild(block);
    }

    /**
     * `renderCatalog()` replaces #catalog-grid's innerHTML on every tab switch, so
     * the date block is re-applied after each render, guarded so a row that already
     * has one is left alone.
     */
    function decorateRows() {
      if (!products) return;
      var rows = document.querySelectorAll(
        "#catalog-grid .product-row[data-product-id]",
      );
      rows.forEach(function (row) {
        if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]')) {
          return;
        }
        var id = row.getAttribute("data-product-id");
        var product = products.filter(function (p) {
          return p.id === id;
        })[0];
        if (!product || product.category !== "ticket") return;
        buildDateBlock(row, product);
      });
    }

    function activate() {
      var gen = ++generation;
      // Every price and saving on a date chip is the catalog price minus a computed
      // discount, so nothing renders until the catalog is in hand.
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("products.json: " + res.status);
          return res.json();
        })
        .then(function (data) {
          if (gen !== generation) return;
          products = data;
          decorateRows();
        })
        .catch(function (err) {
          console.warn(
            "[" + FEATURE_ID + "] no catalog prices, date picker stays off.",
            err,
          );
        });

      var grid = document.getElementById("catalog-grid");
      if (grid) {
        gridObserver = new MutationObserver(decorateRows);
        gridObserver.observe(grid, { childList: true });
      }
    }

    function deactivate() {
      generation++;
      if (gridObserver) {
        gridObserver.disconnect();
        gridObserver = null;
      }
      products = null;
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
