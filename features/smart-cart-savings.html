</script>

<script>
  (function () {
    /* =========================================================================
     * Smart Cart Savings  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   Two quiet cart-side callouts — a membership break-even and a
     *        better-value ticket swap — each surfacing one emphasised figure and
     *        a one-tap "swap" action, shown ONLY when the arithmetic genuinely
     *        favours the shopper.
     * HOW    Mounts a panel into the storefront cart region (#cart-items) and
     *        re-appends itself (idempotent contains() guard) after main.js
     *        rewrites that region, via a MutationObserver. Reads the cart from
     *        localStorage (CONFIG.cartKey), polls every CONFIG.pollMs and also
     *        listens for owl-park-cart-changed. Every line is priced through
     *        core's window.OwlPark arithmetic (resolveLine / discountOf) — never
     *        product.price × qty — so all totals agree; with no such API or no
     *        catalog it renders nothing rather than guess. Offers are recomputed
     *        from a FRESH cart read at click time and declined if the live cart
     *        no longer supports them.
     * HOSTS  Owl Park storefront only. No-op on the zoo ViewItems page and any
     *        host without #cart-items or window.OwlPark (no in-page cart /
     *        pricing to key off).
     * ===================================================================== */

    var FEATURE_ID = "smart-cart-savings";

    // ----- Configuration --------------------------------------------------
    // Thresholds + copy live here. The offers themselves (which membership,
    // which ticket) are derived live from the catalog and the cart, so there are
    // no static bundle definitions to configure — only the knobs below.
    var CONFIG = {
      cartKey: "owl-park-cart", // localStorage key the storefront cart is stored under
      pollMs: 700, // how often (ms) to re-read the cart when no change event fires

      // A membership that only pays for itself after MORE than this many visits
      // is not a claim worth making, so the feature stays silent instead of
      // making a weak one.
      maxPlausibleBreakEven: 4,

      // Membership break-even callout
      membership: {
        icon: "🪶", // eyebrow glyph
        eyebrow: "Membership break-even", // small uppercase category label
        coverageTail: "unlimited visits for 12 months.", // tail of the coverage line
        buttonPrefix: "Swap my tickets for the membership", // price appended in ()
      },

      // Better-value ticket-swap callout
      swap: {
        icon: "🪺", // eyebrow glyph
        eyebrow: "Cheaper for the same group",
        savingIcon: "↓", // sits before the emphasised saving figure
        savingCaption: "saved on the same group", // caption under the saving figure
        buttonPrefix: "Swap and save", // saving amount appended
      },
    };

    var products = null;
    var panelEl = null;
    var pollId = null;
    // Bumped on every activate and deactivate: an in-flight catalog fetch whose generation no longer
    // matches belongs to an activation that has since been torn down, and must touch nothing.
    var generation = 0;
    var itemsObserver = null;
    var lastSerialized = null;

    function readCart() {
      try {
        var raw = localStorage.getItem(CONFIG.cartKey);
        var lines = raw ? JSON.parse(raw) : [];
        return Array.isArray(lines) ? lines : [];
      } catch (err) {
        return [];
      }
    }

    function writeCart(lines) {
      localStorage.setItem(CONFIG.cartKey, JSON.stringify(lines));
      window.dispatchEvent(new CustomEvent("owl-park-cart-changed"));
    }

    function money(n) {
      return "$" + n.toFixed(2);
    }

    function ordinal(n) {
      var rem100 = n % 100;
      if (rem100 >= 11 && rem100 <= 13) return n + "th";
      var suffix = { 1: "st", 2: "nd", 3: "rd" }[n % 10] || "th";
      return n + suffix;
    }

    function article(name) {
      return /^[aeiou]/i.test(name) ? "An " : "A ";
    }

    function productFor(line) {
      for (var i = 0; i < products.length; i++) {
        if (products[i].id === line.id) return products[i];
      }
      return null;
    }

    /**
     * Core's cart arithmetic (js/products.js), or null on a page that does not publish it. Every
     * number here is priced through it, so without it the feature shows nothing rather than guessing.
     */
    function pricing() {
      var api = window.OwlPark;
      if (!api) return null;
      if (typeof api.resolveLine !== "function") return null;
      if (typeof api.discountOf !== "function") return null;
      return api;
    }

    /** A line's effective price, straight from core's cart arithmetic (window.OwlPark, js/products.js). */
    function linePrice(line, product) {
      var api = pricing();
      var resolved = api ? api.resolveLine(line, products) : null;
      return resolved ? resolved.price : product.price;
    }

    /** A membership bought for someone else does not make the shopper a member. */
    function isGift(line) {
      return !!(line.meta && line.meta.gift);
    }

    /**
     * Who a product admits, or null when the catalog does not say. A missing — or all-zero — capacity
     * is unknown, not a party of nobody: counting it as zero people would make every coverage check
     * below vacuously true and offer a membership that does not admit the visitor whose ticket is in
     * the cart.
     */
    function capacityOf(product) {
      var cap = product.capacity;
      if (!cap || typeof cap !== "object") return null;
      var adults = typeof cap.adults === "number" ? cap.adults : 0;
      var kids = typeof cap.kids === "number" ? cap.kids : 0;
      if (adults < 0 || kids < 0) return null;
      if (adults + kids <= 0) return null;
      return { adults: adults, kids: kids };
    }

    /**
     * Coverage is per-dimension, never a head count: adults must cover adults AND kids must cover
     * kids. Summing them would offer a party of three adults a pass that admits two, leaving someone
     * at the gate — a "saving" that is not one.
     */
    function covers(product, basket) {
      var cap = capacityOf(product);
      if (!cap) return false;
      return cap.adults >= basket.adults && cap.kids >= basket.kids;
    }

    /** The smallest number of `product` that admits the whole basket, or null if no number ever does. */
    function qtyToCover(product, basket) {
      var cap = capacityOf(product);
      if (!cap) return null;
      var qty = 0;
      if (basket.adults > 0) {
        if (cap.adults <= 0) return null;
        qty = Math.max(qty, Math.ceil(basket.adults / cap.adults));
      }
      if (basket.kids > 0) {
        if (cap.kids <= 0) return null;
        qty = Math.max(qty, Math.ceil(basket.kids / cap.kids));
      }
      return qty > 0 ? qty : null;
    }

    /** What a ticket line carries beyond its id: the shopper's visit date and its off-peak basis. */
    function carryOf(line) {
      var custom = line.custom || {};
      return {
        visit: (line.meta && line.meta.visit) || null,
        discountRate:
          typeof custom.discountRate === "number" ? custom.discountRate : null,
      };
    }

    /** Everything the offers are computed from: the cart's ticket lines, priced as they'll be charged. */
    function readTicketBasket() {
      var lines = readCart();
      var subtotal = 0;
      var adults = 0;
      var kids = 0;
      var count = 0;
      var hasMembership = false;
      var ticketKeys = [];
      var carry = null;
      var mixedCarry = false;
      var dated = false;
      var discounted = false;
      var unknownParty = false;

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var product = productFor(line);
        if (!product) continue;
        if (product.category === "membership" && !isGift(line)) {
          hasMembership = true;
        }
        if (product.category !== "ticket") continue;
        var cap = capacityOf(product);
        subtotal += linePrice(line, product) * line.qty;
        if (!cap) {
          // The catalog does not say who this ticket admits, so the party in the cart is unknown and
          // no offer below can honestly claim to cover it.
          unknownParty = true;
          cap = { adults: 0, kids: 0 };
        }
        adults += cap.adults * line.qty;
        kids += cap.kids * line.qty;
        count += line.qty;
        ticketKeys.push(line.key || line.id);

        var lineCarry = carryOf(line);
        if (lineCarry.visit) dated = true;
        if (lineCarry.discountRate !== null) discounted = true;
        if (carry === null) {
          carry = lineCarry;
        } else if (JSON.stringify(carry) !== JSON.stringify(lineCarry)) {
          mixedCarry = true;
        }
      }
      return {
        subtotal: subtotal,
        adults: adults,
        kids: kids,
        count: count,
        hasMembership: hasMembership,
        ticketKeys: ticketKeys,
        carry: carry || { visit: null, discountRate: null },
        mixedCarry: mixedCarry,
        dated: dated,
        discounted: discounted,
        unknownParty: unknownParty,
      };
    }

    function coverageText(product) {
      var cap = capacityOf(product) || { adults: 0, kids: 0 };
      var parts = [];
      if (cap.adults > 0) {
        parts.push(cap.adults + (cap.adults === 1 ? " adult" : " adults"));
      }
      if (cap.kids > 0) {
        parts.push("up to " + cap.kids + (cap.kids === 1 ? " kid" : " kids"));
      }
      return parts.join(" + ");
    }

    /**
     * The cheapest membership that admits everyone the cart's tickets admit, and pays for itself
     * within a plausible number of visits at what the shopper is about to spend today.
     */
    function membershipOffer(basket) {
      if (basket.subtotal <= 0 || basket.hasMembership) return null;
      if (basket.unknownParty) return null;
      if (basket.adults + basket.kids <= 0) return null;

      var best = null;
      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        if (p.category !== "membership") continue;
        if (!covers(p, basket)) continue; // would leave someone in the cart at the gate
        var breakEven = Math.ceil(p.price / basket.subtotal);
        if (breakEven > CONFIG.maxPlausibleBreakEven) continue;
        if (!best || p.price < best.product.price) {
          best = { product: p, breakEven: breakEven };
        }
      }
      return best;
    }

    /**
     * A single ticket product that admits everyone in the cart for strictly less than the cart's
     * ticket subtotal. Only multi-person passes are considered — swapping one per-person ticket for
     * a different per-person ticket is a different day out, not a better price for the same one.
     * The replacement carries the shopper's visit date and off-peak basis, so the cost quoted here
     * is the cost they are actually charged; with tickets on more than one date there is one line to
     * carry two answers, so no swap is offered rather than one that quietly drops a date.
     */
    function swapOffer(basket) {
      if (basket.subtotal <= 0) return null;
      if (basket.unknownParty) return null;
      if (basket.adults + basket.kids <= 0) return null;
      if (basket.mixedCarry) return null;

      var rate = basket.carry.discountRate;
      var best = null;
      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        if (p.category !== "ticket") continue;
        var cap = capacityOf(p);
        if (!cap) continue; // the catalog does not say who it admits, so it can cover no one
        if (cap.adults + cap.kids <= 1) continue;
        var qty = qtyToCover(p, basket);
        if (!qty) continue;
        var cost = qty * offpeakPrice(p, rate);
        var saving = basket.subtotal - cost;
        if (saving < 0.01) continue; // only when the math genuinely favours the shopper
        if (!best || saving > best.saving) {
          best = { product: p, qty: qty, cost: cost, saving: saving };
        }
      }
      return best;
    }

    /** A product's price under a carried off-peak basis, rounded by core so it matches what is charged. */
    function offpeakPrice(product, rate) {
      var api = pricing();
      if (rate === null || !api) return product.price;
      return Math.max(0, product.price - api.discountOf(product.price, rate));
    }

    /**
     * Replace every ticket line with `qty` of `productId`, leaving add-ons and donations alone.
     * `carry` is the visit date and off-peak basis to move onto the replacement — null when the
     * replacement is a membership, which admits any open day and so has no date to keep.
     */
    function swapTicketsFor(productId, qty, carry) {
      var basket = readTicketBasket();
      var keep = readCart().filter(function (line) {
        return basket.ticketKeys.indexOf(line.key || line.id) === -1;
      });

      var replacement = { id: productId, qty: qty };
      if (carry && carry.visit) {
        replacement.key = productId + "#visit-" + carry.visit.date;
        replacement.meta = { visit: carry.visit };
      }
      if (carry && carry.discountRate !== null) {
        replacement.custom = { discountRate: carry.discountRate };
      }

      var key = replacement.key || replacement.id;
      var existing = null;
      for (var i = 0; i < keep.length; i++) {
        if ((keep[i].key || keep[i].id) === key) existing = keep[i];
      }
      if (existing) {
        existing.qty += qty;
      } else {
        keep.push(replacement);
      }
      writeCart(keep);
    }

    // ----- DOM builders ---------------------------------------------------
    function el(tag, className, text) {
      var e = document.createElement(tag);
      if (className) e.className = className;
      if (text != null) e.textContent = text;
      return e;
    }

    function textLine(className, text) {
      return el("div", className, text);
    }

    /** The small uppercase category label above an offer. */
    function eyebrow(cfg) {
      var row = el("div", "scs-eyebrow");
      var ic = el("span", "scs-eyebrow-icon", cfg.icon);
      ic.setAttribute("aria-hidden", "true");
      row.appendChild(ic);
      row.appendChild(el("span", "scs-eyebrow-label", cfg.eyebrow));
      return row;
    }

    /** The one emphasised figure: optional icon + hero amount + caption. */
    function figure(variant, amountText, captionText, iconText) {
      var wrap = el("div", "scs-figure scs-figure--" + variant);
      var lead = el("span", "scs-figure-lead");
      if (iconText) {
        var ic = el("span", "scs-figure-icon", iconText);
        ic.setAttribute("aria-hidden", "true");
        lead.appendChild(ic);
      }
      lead.appendChild(el("span", "scs-figure-amount", amountText));
      wrap.appendChild(lead);
      if (captionText) {
        wrap.appendChild(el("span", "scs-figure-caption", captionText));
      }
      return wrap;
    }

    function actionButton(label, onClick) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "scs-btn";
      btn.setAttribute("data-owlpark-feature", FEATURE_ID);
      btn.textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function buildMembershipCard(basket, membership) {
      var cfg = CONFIG.membership;
      var p = membership.product;
      var cardEl = el("div", "scs-card scs-card--membership");
      cardEl.setAttribute("data-owlpark-feature", FEATURE_ID);

      cardEl.appendChild(eyebrow(cfg));
      cardEl.appendChild(
        figure(
          "membership",
          money(p.price),
          "the " +
            p.name +
            " — pays for itself on your " +
            ordinal(membership.breakEven) +
            " visit at this price",
          null,
        ),
      );
      cardEl.appendChild(
        textLine(
          "scs-body",
          "Your day out is " +
            money(basket.subtotal) +
            ". Covers " +
            coverageText(p) +
            ", " +
            cfg.coverageTail,
        ),
      );

      if (basket.dated) {
        cardEl.appendChild(
          textLine(
            "scs-fine",
            "Swapping replaces the tickets in your cart, so the visit " +
              (basket.count === 1 ? "date" : "dates") +
              " you picked" +
              (basket.discounted ? " and their off-peak rate" : "") +
              " come off — a membership admits you on any open day.",
          ),
        );
      }

      cardEl.appendChild(
        actionButton(
          cfg.buttonPrefix + " (" + money(p.price) + ")",
          function () {
            var offer = membershipOffer(readTicketBasket());
            if (!offer || offer.product.id !== membership.product.id) {
              refresh();
              return;
            }
            swapTicketsFor(offer.product.id, 1, null);
          },
        ),
      );
      return cardEl;
    }

    function buildSwapCard(basket, swap) {
      var cfg = CONFIG.swap;
      var cardEl = el("div", "scs-card scs-card--swap");
      cardEl.setAttribute("data-owlpark-feature", FEATURE_ID);

      cardEl.appendChild(eyebrow(cfg));
      cardEl.appendChild(
        figure("swap", money(swap.saving), cfg.savingCaption, cfg.savingIcon),
      );
      cardEl.appendChild(
        textLine(
          "scs-body",
          "You have " +
            basket.count +
            (basket.count === 1 ? " ticket" : " tickets") +
            " — " +
            money(basket.subtotal) +
            ". " +
            (swap.qty === 1 ? article(swap.product.name) : swap.qty + " × ") +
            swap.product.name +
            " covers " +
            coverageText(swap.product) +
            " for " +
            money(swap.cost) +
            ".",
        ),
      );
      cardEl.appendChild(
        textLine(
          "scs-fine",
          "That admits everyone your tickets admit." +
            (basket.carry.visit
              ? " Your chosen visit date carries over" +
                (basket.carry.discountRate !== null
                  ? ", off-peak rate included."
                  : ".")
              : ""),
        ),
      );

      cardEl.appendChild(
        actionButton(cfg.buttonPrefix + " " + money(swap.saving), function () {
          var fresh = readTicketBasket();
          var offer = swapOffer(fresh);
          if (
            !offer ||
            offer.product.id !== swap.product.id ||
            offer.qty !== swap.qty ||
            offer.saving < swap.saving - 0.005
          ) {
            refresh();
            return;
          }
          swapTicketsFor(offer.product.id, offer.qty, fresh.carry);
        }),
      );
      return cardEl;
    }

    function render() {
      if (!panelEl || !products) return;
      panelEl.innerHTML = "";

      if (!pricing()) {
        panelEl.hidden = true;
        return;
      }

      var basket = readTicketBasket();
      var membership = membershipOffer(basket);
      var swap = swapOffer(basket);

      if (membership) {
        panelEl.appendChild(buildMembershipCard(basket, membership));
      }
      if (swap) {
        panelEl.appendChild(buildSwapCard(basket, swap));
      }

      panelEl.hidden = !membership && !swap;
    }

    function refresh() {
      lastSerialized = localStorage.getItem(CONFIG.cartKey);
      render();
    }

    function sync() {
      if (localStorage.getItem(CONFIG.cartKey) === lastSerialized) return;
      refresh();
    }

    /**
     * The offers live in the scrolling #cart-items region, not the fixed footer, so the total and
     * the checkout button stay reachable on a phone. `renderCart()` replaces that region's innerHTML
     * on every cart change, so the panel is re-appended after each render.
     */
    function mount() {
      var items = document.getElementById("cart-items");
      if (!items || !panelEl) return;
      if (!items.contains(panelEl)) items.appendChild(panelEl);
    }

    function activate() {
      var items = document.getElementById("cart-items");
      if (!items) return;
      var gen = ++generation;

      panelEl = document.createElement("div");
      panelEl.className = "owlpark-feat-smart-cart-savings";
      panelEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      // The panel is the dynamic region: announce refreshed offers politely.
      panelEl.setAttribute("role", "status");
      panelEl.setAttribute("aria-live", "polite");
      panelEl.hidden = true;
      mount();

      itemsObserver = new MutationObserver(mount);
      itemsObserver.observe(items, { childList: true });

      // Every number this feature shows is derived from live catalog prices, so nothing renders
      // until they load — a wrong saving is worse than no saving.
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("products.json: " + res.status);
          return res.json();
        })
        .then(function (data) {
          if (gen !== generation) return;
          products = data;
          lastSerialized = null;
          sync();
        })
        .catch(function (err) {
          console.warn(
            "[" + FEATURE_ID + "] no catalog prices, staying silent.",
            err,
          );
        });

      pollId = setInterval(sync, CONFIG.pollMs);
      window.addEventListener("owl-park-cart-changed", sync);
    }

    function deactivate() {
      generation++;
      if (pollId) {
        clearInterval(pollId);
        pollId = null;
      }
      if (itemsObserver) {
        itemsObserver.disconnect();
        itemsObserver = null;
      }
      window.removeEventListener("owl-park-cart-changed", sync);
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
      panelEl = null;
      products = null;
      lastSerialized = null;
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
