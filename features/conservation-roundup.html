<script>
  (function () {
    /* =========================================================================
     * Conservation Round-Up  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A quiet donation callout inside the cart: offers to round the order
     *        up to the next whole $5 for the Owl Rehabilitation Fund, plus a few
     *        suggested giving tiers. Never pre-selected; opt-in only.
     * HOW    Mounts a panel in #cart-items (the SCROLLING region, so Total and
     *        Checkout stay reachable on a phone) and re-appends it via a
     *        MutationObserver after every renderCart(). Reads the cart from
     *        localStorage ("owl-park-cart") on a poll + the owl-park-cart-changed
     *        event, and prices the purchase with the core window.OwlPark.cartTotal
     *        API off data/products.json. Adding/removing writes a donation line
     *        (custom.source "roundup"|"tier", custom.price absolute) back to the
     *        cart key and dispatches owl-park-cart-changed. The round-up is
     *        recomputed from a FRESH cart read at click time and declined if the
     *        cart no longer supports the amount the button named.
     * HOSTS  Owl Park only — it needs window.OwlPark + data/products.json. On any
     *        host that publishes neither, the panel stays hidden (a clean no-op).
     * ===================================================================== */

    var FEATURE_ID = "conservation-roundup";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      // --- Cart plumbing (values the storefront relies on; keep the shape) ---
      cartKey: "owl-park-cart", // localStorage key the storefront cart lives under
      pollMs: 700, // ms between cart re-checks for changes made elsewhere
      donationLineId: "give-owl-rehab-fund", // id + key used for the gift cart line
      donationEmoji: "🦉", // emoji stored on the gift line (cart display)

      // --- The cause + the ask ---------------------------------------------
      fundName: "Owl Rehabilitation Fund", // cause name (shown + stored on the line)
      glyph: "🌿", // small conservation glyph in the callout (decorative)
      roundTo: 5, // round the order up to the next whole $ multiple

      // Suggested giving amounts, not prices — the shopper picks one, or none.
      tiers: [
        { amount: 5, label: "A day of fish & mice" },
        { amount: 10, label: "A week of feeding" },
        { amount: 25, label: "Adopt an owl for a month" },
      ],

      // --- Copy. {amount}/{target}/{gift}/{total}/{fund}/{label} fill at
      //     render time; {amount} marks the one emphasized number. -----------
      copy: {
        intro: "Every rescued owl we rehabilitate is funded by visitors like you.",
        thanks: "You're giving {amount} to the {fund}. Thank you.",
        cartChanged: "Your cart has changed since — your order now comes to {total}.",
        tierPrompt: "Or change the amount — every owl helps:",
        optional:
          "Entirely optional — nothing is added to your total until you choose an amount.",
        roundUpBtn: "Round up to {target} and give {gift}",
        removeBtn: "Remove donation",
        removeAria: "Remove your {amount} donation to the {fund}",
        tierAria: "Give {amount} — {label}",
      },
    };

    var products = null;
    var panelEl = null;
    var pollId = null;
    // Bumped on every activate and deactivate: an in-flight catalog fetch whose generation no longer
    // matches belongs to an activation that has since been torn down, and must touch nothing.
    var generation = 0;
    var itemsObserver = null;
    var lastSerialized = null;

    function readCart() {
      try {
        var raw = localStorage.getItem(CONFIG.cartKey);
        var lines = raw ? JSON.parse(raw) : [];
        return Array.isArray(lines) ? lines : [];
      } catch (err) {
        return [];
      }
    }

    function writeCart(lines) {
      localStorage.setItem(CONFIG.cartKey, JSON.stringify(lines));
      window.dispatchEvent(new CustomEvent("owl-park-cart-changed"));
    }

    function money(n) {
      return "$" + n.toFixed(2);
    }

    /** Fill {token} placeholders from `vars`; leave unknown tokens intact so
     *  {amount} can survive to mark the emphasis split point. */
    function fill(tpl, vars) {
      return String(tpl).replace(/\{(\w+)\}/g, function (m, k) {
        return vars && k in vars ? vars[k] : m;
      });
    }

    function isDonation(line) {
      return !!(line.custom && line.custom.kind === "donation");
    }

    function currentDonation() {
      var lines = readCart();
      for (var i = 0; i < lines.length; i++) {
        if (isDonation(lines[i])) return lines[i];
      }
      return null;
    }

    /**
     * What the shopper is actually paying for the park, before any giving — priced by core's own cart
     * arithmetic (window.OwlPark, js/products.js), so the round-up is computed off exactly the total
     * the drawer shows. Null on a page that does not publish that API: a round-up that cannot be
     * priced against the real total is not one worth asking for.
     */
    function purchaseSubtotal() {
      var api = window.OwlPark;
      if (!api || typeof api.cartTotal !== "function") return null;
      var lines = readCart().filter(function (line) {
        return !isDonation(line);
      });
      return api.cartTotal(lines, products);
    }

    function isRound(amount) {
      return Math.round(amount * 100) % (CONFIG.roundTo * 100) === 0;
    }

    /** The next whole $5 above `subtotal`, and the gift that gets an order there. */
    function nextRound(subtotal) {
      var target = (Math.floor(subtotal / CONFIG.roundTo) + 1) * CONFIG.roundTo;
      return { target: target, gift: target - subtotal };
    }

    /**
     * The opening offer — or null when what they're paying is already whole. Advancing a round total
     * to the next multiple is not a rounding correction, it is a flat $5 ask wearing rounding clothes;
     * the tiers below make that ask plainly.
     */
    function roundUp(subtotal) {
      if (isRound(subtotal)) return null;
      return nextRound(subtotal);
    }

    /**
     * The offer for a shopper who already rounded up and then changed their cart. It is the ORDER
     * total — what they'd actually pay — being off a whole $5 that breaks the promise they accepted,
     * so a subtotal that happens to have landed on a whole $5 suppresses nothing here: the pinned gift
     * is itself the remainder to round away. Null once the order total is whole again, however it got
     * there. The gift is never applied without a tap; this only offers.
     */
    function reRound(subtotal, donationAmount) {
      if (isRound(subtotal + donationAmount)) return null;
      return nextRound(subtotal);
    }

    /**
     * `source` records that a gift came from the round-up offer, so a later cart change can tell a
     * round-up (whose promise the new total may have broken) from a tier gift (which promised nothing
     * about the total). The amount itself is never recomputed behind the shopper's back.
     */
    function setDonation(amount, source) {
      var lines = readCart().filter(function (line) {
        return !isDonation(line);
      });
      var custom = {
        kind: "donation",
        fixed: true,
        name: CONFIG.fundName,
        emoji: CONFIG.donationEmoji,
        unit: "donation",
        price: Math.round(amount * 100) / 100,
      };
      if (source) custom.source = source;
      lines.push({
        id: CONFIG.donationLineId,
        key: CONFIG.donationLineId,
        qty: 1,
        custom: custom,
      });
      writeCart(lines);
    }

    /**
     * The cart can change between a round-up being offered and its button being tapped. The gift is
     * recomputed from the cart as it is at the tap and applied only if it is still the amount the
     * button named: a shopper consents to a number, not to whatever their cart later makes of it. If
     * it has moved, nothing is given and the panel redraws with the round-up that now applies.
     */
    function giveRoundUp(promised, recompute) {
      var subtotal = purchaseSubtotal();
      if (subtotal === null || subtotal <= 0) {
        refresh();
        return;
      }
      var up = recompute(subtotal);
      if (!up || Math.abs(up.gift - promised.gift) >= 0.005) {
        refresh();
        return;
      }
      setDonation(up.gift, "roundup");
    }

    function clearDonation() {
      writeCart(
        readCart().filter(function (line) {
          return !isDonation(line);
        }),
      );
    }

    function textLine(className, text) {
      var el = document.createElement("div");
      el.className = className;
      el.textContent = text;
      return el;
    }

    /** A line with exactly one emphasized amount: the template is split on the
     *  literal {amount} token and the middle is rendered as .cru-amount. */
    function amountLine(className, template, amountText, vars) {
      var el = document.createElement("div");
      el.className = className;
      var parts = fill(template, vars).split("{amount}");
      el.appendChild(document.createTextNode(parts[0] || ""));
      var strong = document.createElement("strong");
      strong.className = "cru-amount";
      strong.textContent = amountText;
      el.appendChild(strong);
      el.appendChild(
        document.createTextNode(parts.length > 1 ? parts.slice(1).join("{amount}") : ""),
      );
      return el;
    }

    function titleEl() {
      var title = document.createElement("div");
      title.className = "cru-title";
      var glyph = document.createElement("span");
      glyph.className = "cru-glyph";
      glyph.setAttribute("aria-hidden", "true");
      glyph.textContent = CONFIG.glyph;
      title.appendChild(glyph);
      title.appendChild(document.createTextNode(CONFIG.fundName));
      return title;
    }

    function tierRow() {
      var row = document.createElement("div");
      row.className = "cru-tiers";
      CONFIG.tiers.forEach(function (tier) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cru-tier-btn";
        btn.setAttribute(
          "aria-label",
          fill(CONFIG.copy.tierAria, { amount: money(tier.amount), label: tier.label }),
        );

        var amount = document.createElement("span");
        amount.className = "cru-tier-amount";
        amount.textContent = money(tier.amount);

        var label = document.createElement("span");
        label.className = "cru-tier-label";
        label.textContent = tier.label;

        btn.append(amount, label);
        btn.addEventListener("click", function () {
          setDonation(tier.amount, "tier");
        });
        row.appendChild(btn);
      });
      return row;
    }

    function render() {
      if (!panelEl || !products) return;
      panelEl.innerHTML = "";

      var subtotal = purchaseSubtotal();
      var donation = currentDonation();

      if (subtotal === null) {
        panelEl.hidden = true;
        return;
      }

      if (subtotal <= 0 && !donation) {
        panelEl.hidden = true;
        return;
      }
      panelEl.hidden = false;

      panelEl.appendChild(titleEl());

      if (donation) {
        var given = document.createElement("div");
        given.className = "cru-given";

        var thanks = amountLine(
          "cru-line",
          CONFIG.copy.thanks,
          money(donation.custom.price),
          { fund: CONFIG.fundName },
        );
        thanks.setAttribute("role", "status");
        thanks.setAttribute("aria-live", "polite");
        given.appendChild(thanks);

        var remove = document.createElement("button");
        remove.type = "button";
        remove.className = "cru-remove-btn";
        remove.textContent = CONFIG.copy.removeBtn;
        remove.setAttribute(
          "aria-label",
          fill(CONFIG.copy.removeAria, {
            amount: money(donation.custom.price),
            fund: CONFIG.fundName,
          }),
        );
        remove.addEventListener("click", clearDonation);
        given.appendChild(remove);
        panelEl.appendChild(given);

        // Their cart changed after they rounded up, so the total they were promised is no longer the
        // one they'd pay. The gift stays exactly as they left it; re-rounding is theirs to choose.
        var orderTotal = subtotal + donation.custom.price;
        var reUp =
          subtotal > 0 && donation.custom.source === "roundup"
            ? reRound(subtotal, donation.custom.price)
            : null;
        if (reUp) {
          panelEl.appendChild(
            textLine(
              "cru-fine",
              fill(CONFIG.copy.cartChanged, { total: money(orderTotal) }),
            ),
          );
          var reBtn = document.createElement("button");
          reBtn.type = "button";
          reBtn.className = "cru-roundup-btn";
          reBtn.textContent = fill(CONFIG.copy.roundUpBtn, {
            target: money(reUp.target),
            gift: money(reUp.gift),
          });
          reBtn.addEventListener("click", function () {
            giveRoundUp(reUp, function (now) {
              var pinned = currentDonation();
              return reRound(now, pinned ? pinned.custom.price : 0);
            });
          });
          panelEl.appendChild(reBtn);
        }

        panelEl.appendChild(textLine("cru-fine", CONFIG.copy.tierPrompt));
        panelEl.appendChild(tierRow());
        return;
      }

      panelEl.appendChild(textLine("cru-line", CONFIG.copy.intro));

      var up = subtotal > 0 ? roundUp(subtotal) : null;
      if (up) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cru-roundup-btn";
        btn.textContent = fill(CONFIG.copy.roundUpBtn, {
          target: money(up.target),
          gift: money(up.gift),
        });
        btn.addEventListener("click", function () {
          giveRoundUp(up, roundUp);
        });
        panelEl.appendChild(btn);
      }

      panelEl.appendChild(tierRow());
      panelEl.appendChild(textLine("cru-fine", CONFIG.copy.optional));
    }

    function refresh() {
      lastSerialized = localStorage.getItem(CONFIG.cartKey);
      render();
    }

    function sync() {
      if (localStorage.getItem(CONFIG.cartKey) === lastSerialized) return;
      refresh();
    }

    /**
     * The ask lives in the scrolling #cart-items region, not the fixed footer, so the total and the
     * checkout button stay reachable on a phone. `renderCart()` replaces that region's innerHTML on
     * every cart change, so the panel is re-appended after each render.
     */
    function mount() {
      var items = document.getElementById("cart-items");
      if (!items || !panelEl) return;
      if (!items.contains(panelEl)) items.appendChild(panelEl);
    }

    function activate() {
      var items = document.getElementById("cart-items");
      if (!items) return;
      var gen = ++generation;

      panelEl = document.createElement("div");
      panelEl.className = "owlpark-feat-conservation-roundup";
      panelEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      panelEl.hidden = true;
      mount();

      itemsObserver = new MutationObserver(mount);
      itemsObserver.observe(items, { childList: true });

      // The round-up is computed from live prices; without them there is no honest number to show.
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("products.json: " + res.status);
          return res.json();
        })
        .then(function (data) {
          if (gen !== generation) return;
          products = data;
          lastSerialized = null;
          sync();
        })
        .catch(function (err) {
          console.warn(
            "[" + FEATURE_ID + "] no catalog prices, staying hidden.",
            err,
          );
        });

      pollId = setInterval(sync, CONFIG.pollMs);
      window.addEventListener("owl-park-cart-changed", sync);
    }

    function deactivate() {
      generation++;
      if (pollId) {
        clearInterval(pollId);
        pollId = null;
      }
      if (itemsObserver) {
        itemsObserver.disconnect();
        itemsObserver = null;
      }
      window.removeEventListener("owl-park-cart-changed", sync);
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
      panelEl = null;
      products = null;
      lastSerialized = null;
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
