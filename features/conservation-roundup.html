<script type="application/json" data-owlpark-manifest>
  {
    "id": "conservation-roundup",
    "name": "Conservation Round-Up",
    "description": "Optional round-up donation and adopt-an-owl tiers for the Owl Rehabilitation Fund, attached at the cart. Never pre-selected.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-conservation-roundup[hidden] {
    display: none;
  }
  .owlpark-feat-conservation-roundup {
    flex-shrink: 0;
    border: 1px solid #e0d3bb;
    background: #fdf8ee;
    border-radius: 12px;
    padding: 0.7rem 0.75rem;
  }
  .owlpark-feat-conservation-roundup .cru-title {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #9a6a1a;
    margin-bottom: 0.35rem;
  }
  .owlpark-feat-conservation-roundup .cru-line {
    font-size: 0.86rem;
    line-height: 1.35;
    color: #2c2a26;
  }
  .owlpark-feat-conservation-roundup .cru-fine {
    margin-top: 0.3rem;
    font-size: 0.76rem;
    line-height: 1.35;
    color: #6d675c;
  }
  .owlpark-feat-conservation-roundup .cru-roundup-btn {
    margin-top: 0.55rem;
    width: 100%;
    min-height: 44px;
    border: none;
    border-radius: 10px;
    background: #9a6a1a;
    color: #fff;
    font-weight: 800;
    font-size: 0.88rem;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }
  .owlpark-feat-conservation-roundup .cru-tiers {
    margin-top: 0.55rem;
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0.2rem;
  }
  .owlpark-feat-conservation-roundup .cru-tier-btn {
    flex: 0 0 auto;
    min-height: 44px;
    min-width: 44px;
    border: 1px solid #e0d3bb;
    background: #fff;
    border-radius: 10px;
    padding: 0.35rem 0.7rem;
    text-align: left;
    cursor: pointer;
    line-height: 1.2;
  }
  .owlpark-feat-conservation-roundup .cru-tier-amount {
    display: block;
    font-weight: 800;
    font-size: 0.9rem;
    color: #9a6a1a;
  }
  .owlpark-feat-conservation-roundup .cru-tier-label {
    display: block;
    font-size: 0.72rem;
    color: #6d675c;
    white-space: nowrap;
  }
  .owlpark-feat-conservation-roundup .cru-given {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .owlpark-feat-conservation-roundup .cru-remove-btn {
    min-height: 44px;
    border: 1px solid #e0d3bb;
    background: #fff;
    border-radius: 10px;
    padding: 0.4rem 0.9rem;
    font-weight: 700;
    font-size: 0.82rem;
    color: #a8321f;
    cursor: pointer;
  }
  @media (hover: hover) {
    .owlpark-feat-conservation-roundup .cru-roundup-btn:hover {
      background: #82590f;
    }
    .owlpark-feat-conservation-roundup .cru-tier-btn:hover {
      border-color: #9a6a1a;
    }
  }
</style>

<script>
  (function () {
    var FEATURE_ID = "conservation-roundup";
    var CART_KEY = "owl-park-cart";
    var POLL_MS = 700;

    var DONATION_LINE_ID = "give-owl-rehab-fund";
    var FUND_NAME = "Owl Rehabilitation Fund";
    var ROUND_TO = 5; // round the order up to the next whole $5

    // Suggested giving amounts, not prices — the shopper chooses one, or none.
    var ADOPT_TIERS = [
      { amount: 5, label: "A day of fish & mice" },
      { amount: 10, label: "A week of feeding" },
      { amount: 25, label: "Adopt an owl for a month" },
    ];

    var products = null;
    var panelEl = null;
    var pollId = null;
    // Bumped on every activate and deactivate: an in-flight catalog fetch whose generation no longer
    // matches belongs to an activation that has since been torn down, and must touch nothing.
    var generation = 0;
    var itemsObserver = null;
    var lastSerialized = null;

    function readCart() {
      try {
        var raw = localStorage.getItem(CART_KEY);
        var lines = raw ? JSON.parse(raw) : [];
        return Array.isArray(lines) ? lines : [];
      } catch (err) {
        return [];
      }
    }

    function writeCart(lines) {
      localStorage.setItem(CART_KEY, JSON.stringify(lines));
      window.dispatchEvent(new CustomEvent("owl-park-cart-changed"));
    }

    function money(n) {
      return "$" + n.toFixed(2);
    }

    function isDonation(line) {
      return !!(line.custom && line.custom.kind === "donation");
    }

    function currentDonation() {
      var lines = readCart();
      for (var i = 0; i < lines.length; i++) {
        if (isDonation(lines[i])) return lines[i];
      }
      return null;
    }

    function hasPurchase() {
      return readCart().some(function (line) {
        return !isDonation(line);
      });
    }

    /**
     * A round-up belongs to the purchase it rounded: with nothing left in the cart to round, there is
     * no order to bring to a whole $5 and nothing the shopper agreed to pay for, so the gift goes with
     * it rather than sitting alone in an emptied cart and being charged. A tier gift promised nothing
     * about a total — it is a deliberate standalone donation and stays. Dropping is not recomputing:
     * a pinned amount is still never quietly changed.
     */
    function dropOrphanedRoundUp() {
      var donation = currentDonation();
      if (!donation || donation.custom.source !== "roundup") return false;
      if (hasPurchase()) return false;
      clearDonation();
      return true;
    }

    /**
     * What the shopper is actually paying for the park, before any giving — priced by core's own cart
     * arithmetic (window.OwlPark, js/products.js), so the round-up is computed off exactly the total
     * the drawer shows. Null on a page that does not publish that API: a round-up that cannot be
     * priced against the real total is not one worth asking for.
     */
    function purchaseSubtotal() {
      var api = window.OwlPark;
      if (!api || typeof api.cartTotal !== "function") return null;
      var lines = readCart().filter(function (line) {
        return !isDonation(line);
      });
      return api.cartTotal(lines, products);
    }

    function isRound(amount) {
      return Math.round(amount * 100) % (ROUND_TO * 100) === 0;
    }

    /** The next whole $5 above `subtotal`, and the gift that gets an order there. */
    function nextRound(subtotal) {
      var target = (Math.floor(subtotal / ROUND_TO) + 1) * ROUND_TO;
      return { target: target, gift: target - subtotal };
    }

    /**
     * The opening offer — or null when what they're paying is already whole. Advancing a round total
     * to the next multiple is not a rounding correction, it is a flat $5 ask wearing rounding clothes;
     * the tiers below make that ask plainly.
     */
    function roundUp(subtotal) {
      if (isRound(subtotal)) return null;
      return nextRound(subtotal);
    }

    /**
     * The offer for a shopper who already rounded up and then changed their cart. It is the ORDER
     * total — what they'd actually pay — being off a whole $5 that breaks the promise they accepted,
     * so a subtotal that happens to have landed on a whole $5 suppresses nothing here: the pinned gift
     * is itself the remainder to round away. Null once the order total is whole again, however it got
     * there. The gift is never applied without a tap; this only offers.
     */
    function reRound(subtotal, donationAmount) {
      if (isRound(subtotal + donationAmount)) return null;
      return nextRound(subtotal);
    }

    /**
     * `source` records that a gift came from the round-up offer, so a later cart change can tell a
     * round-up (whose promise the new total may have broken) from a tier gift (which promised nothing
     * about the total). The amount itself is never recomputed behind the shopper's back.
     */
    function setDonation(amount, source) {
      var lines = readCart().filter(function (line) {
        return !isDonation(line);
      });
      var custom = {
        kind: "donation",
        fixed: true,
        name: FUND_NAME,
        emoji: "🦉",
        unit: "donation",
        price: Math.round(amount * 100) / 100,
      };
      if (source) custom.source = source;
      lines.push({
        id: DONATION_LINE_ID,
        key: DONATION_LINE_ID,
        qty: 1,
        custom: custom,
      });
      writeCart(lines);
    }

    /**
     * The cart can change between a round-up being offered and its button being tapped. The gift is
     * recomputed from the cart as it is at the tap and applied only if it is still the amount the
     * button named: a shopper consents to a number, not to whatever their cart later makes of it. If
     * it has moved, nothing is given and the panel redraws with the round-up that now applies.
     */
    function giveRoundUp(promised, recompute) {
      var subtotal = purchaseSubtotal();
      if (subtotal === null || subtotal <= 0) {
        refresh();
        return;
      }
      var up = recompute(subtotal);
      if (!up || Math.abs(up.gift - promised.gift) >= 0.005) {
        refresh();
        return;
      }
      setDonation(up.gift, "roundup");
    }

    function clearDonation() {
      writeCart(
        readCart().filter(function (line) {
          return !isDonation(line);
        }),
      );
    }

    function textLine(className, text) {
      var el = document.createElement("div");
      el.className = className;
      el.textContent = text;
      return el;
    }

    function tierRow() {
      var row = document.createElement("div");
      row.className = "cru-tiers";
      ADOPT_TIERS.forEach(function (tier) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cru-tier-btn";

        var amount = document.createElement("span");
        amount.className = "cru-tier-amount";
        amount.textContent = money(tier.amount);

        var label = document.createElement("span");
        label.className = "cru-tier-label";
        label.textContent = tier.label;

        btn.append(amount, label);
        btn.addEventListener("click", function () {
          setDonation(tier.amount, "tier");
        });
        row.appendChild(btn);
      });
      return row;
    }

    function render() {
      if (!panelEl || !products) return;
      panelEl.innerHTML = "";

      var subtotal = purchaseSubtotal();
      var donation = currentDonation();

      if (subtotal === null) {
        panelEl.hidden = true;
        return;
      }

      if (subtotal <= 0 && !donation) {
        panelEl.hidden = true;
        return;
      }
      panelEl.hidden = false;

      var title = document.createElement("div");
      title.className = "cru-title";
      title.textContent = "🦉 " + FUND_NAME;
      panelEl.appendChild(title);

      if (donation) {
        var given = document.createElement("div");
        given.className = "cru-given";
        given.appendChild(
          textLine(
            "cru-line",
            "You're giving " +
              money(donation.custom.price) +
              " to the " +
              FUND_NAME +
              ". Thank you.",
          ),
        );
        var remove = document.createElement("button");
        remove.type = "button";
        remove.className = "cru-remove-btn";
        remove.textContent = "Remove donation";
        remove.addEventListener("click", clearDonation);
        given.appendChild(remove);
        panelEl.appendChild(given);

        // Their cart changed after they rounded up, so the total they were promised is no longer the
        // one they'd pay. The gift stays exactly as they left it; re-rounding is theirs to choose.
        var orderTotal = subtotal + donation.custom.price;
        var reUp =
          subtotal > 0 && donation.custom.source === "roundup"
            ? reRound(subtotal, donation.custom.price)
            : null;
        if (reUp) {
          panelEl.appendChild(
            textLine(
              "cru-fine",
              "Your cart has changed since — your order now comes to " +
                money(orderTotal) +
                ".",
            ),
          );
          var reBtn = document.createElement("button");
          reBtn.type = "button";
          reBtn.className = "cru-roundup-btn";
          reBtn.textContent =
            "Round up to " + money(reUp.target) + " and give " + money(reUp.gift);
          reBtn.addEventListener("click", function () {
            giveRoundUp(reUp, function (now) {
              var pinned = currentDonation();
              return reRound(now, pinned ? pinned.custom.price : 0);
            });
          });
          panelEl.appendChild(reBtn);
        }

        panelEl.appendChild(
          textLine("cru-fine", "Or change the amount — every owl helps:"),
        );
        panelEl.appendChild(tierRow());
        return;
      }

      panelEl.appendChild(
        textLine(
          "cru-line",
          "Every rescued owl we rehabilitate is funded by visitors like you.",
        ),
      );

      var up = subtotal > 0 ? roundUp(subtotal) : null;
      if (up) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cru-roundup-btn";
        btn.textContent =
          "Round up to " + money(up.target) + " and give " + money(up.gift);
        btn.addEventListener("click", function () {
          giveRoundUp(up, roundUp);
        });
        panelEl.appendChild(btn);
      }

      panelEl.appendChild(tierRow());
      panelEl.appendChild(
        textLine(
          "cru-fine",
          "Entirely optional — nothing is added to your total until you choose an amount.",
        ),
      );
    }

    function refresh() {
      lastSerialized = localStorage.getItem(CART_KEY);
      // The write announces itself and re-enters here with the gift already gone, which renders.
      if (dropOrphanedRoundUp()) return;
      render();
    }

    function sync() {
      if (localStorage.getItem(CART_KEY) === lastSerialized) return;
      refresh();
    }

    /**
     * The ask lives in the scrolling #cart-items region, not the fixed footer, so the total and the
     * checkout button stay reachable on a phone. `renderCart()` replaces that region's innerHTML on
     * every cart change, so the panel is re-appended after each render.
     */
    function mount() {
      var items = document.getElementById("cart-items");
      if (!items || !panelEl) return;
      if (!items.contains(panelEl)) items.appendChild(panelEl);
    }

    function activate() {
      var items = document.getElementById("cart-items");
      if (!items) return;
      var gen = ++generation;

      panelEl = document.createElement("div");
      panelEl.className = "owlpark-feat-conservation-roundup";
      panelEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      panelEl.hidden = true;
      mount();

      itemsObserver = new MutationObserver(mount);
      itemsObserver.observe(items, { childList: true });

      // The round-up is computed from live prices; without them there is no honest number to show.
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("products.json: " + res.status);
          return res.json();
        })
        .then(function (data) {
          if (gen !== generation) return;
          products = data;
          lastSerialized = null;
          sync();
        })
        .catch(function (err) {
          console.warn(
            "[" + FEATURE_ID + "] no catalog prices, staying hidden.",
            err,
          );
        });

      pollId = setInterval(sync, POLL_MS);
      window.addEventListener("owl-park-cart-changed", sync);
    }

    function deactivate() {
      generation++;
      if (pollId) {
        clearInterval(pollId);
        pollId = null;
      }
      if (itemsObserver) {
        itemsObserver.disconnect();
        itemsObserver = null;
      }
      window.removeEventListener("owl-park-cart-changed", sync);
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
      panelEl = null;
      products = null;
      lastSerialized = null;
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
