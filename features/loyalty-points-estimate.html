<script type="application/json" data-owlpark-manifest>
  {
    "id": "loyalty-points-estimate",
    "name": "Loyalty Points Estimate",
    "description": "Estimated loyalty points earned, shown at checkout.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-loyalty-points-estimate-style">
  .owlpark-feat-loyalty-points-estimate {
    box-sizing: border-box;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(17, 33, 31, 0.1);
    display: flex;
    flex-direction: column;
    align-items: flex-start;

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    color: #17211f;
    animation: owlpark-lpe-in 0.2s cubic-bezier(0.2, 0.6, 0.2, 1) both;
  }
  .owlpark-feat-loyalty-points-estimate .lp-chip {
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.4rem 0.7rem;
    background: rgba(15, 111, 122, 0.09);
    border: 1px solid rgba(17, 33, 31, 0.1);
    border-radius: 12px;

  }
  .owlpark-feat-loyalty-points-estimate .lp-icon {

  .owlpark-feat-loyalty-points-estimate .lp-points {
    font-weight: 700;
    color: #0f6f7a;

  }
  .owlpark-feat-loyalty-points-estimate .lp-unit {
    color: #67736f;
  }
  .owlpark-feat-loyalty-points-estimate .lp-note {
    padding-left: 0.15rem;

    color: #67736f;
  }
  @keyframes owlpark-lpe-in {
    from {
      opacity: 0;
      transform: translateY(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);

  }
  @media (prefers-color-scheme: dark) {
    .owlpark-feat-loyalty-points-estimate {
      color: #e9edec;
      border-top-color: rgba(255, 255, 255, 0.11);
    }
    .owlpark-feat-loyalty-points-estimate .lp-chip {
      background: rgba(91, 199, 207, 0.12);
      border-color: rgba(255, 255, 255, 0.11);
    }
    .owlpark-feat-loyalty-points-estimate .lp-copy,
    .owlpark-feat-loyalty-points-estimate .lp-unit,
    .owlpark-feat-loyalty-points-estimate .lp-note {

  @media (prefers-reduced-motion: reduce) {

      animation: none;

  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Loyalty Points Estimate  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A quiet accent-soft chip in the checkout order summary estimating
     *        the loyalty points this order would earn ("You'll earn ~180
     *        points"). SIMULATED — there is no real loyalty backend; the figure
     *        is derived from the order total, never fetched.
     * HOW    Watches #checkout-modal's open (class) state with a
     *        MutationObserver; when the modal is shown it reads the final total
     *        already rendered in #order-summary (the last $-amount is the grand
     *        Total, which main.js builds from resolveLine() output, so off-peak
     *        discounts and round-up donations are already reflected) and appends
     *        the estimate line. Re-runs on every reopen and never stacks
     *        duplicates. Everything it injects is tagged data-owlpark-feature.
     * HOSTS  Owl Park checkout only. The zoo ViewItems ticket page has no
     *        checkout modal / order summary, so this stays a no-op there.
     * ===================================================================== */

    var FEATURE_ID = "loyalty-points-estimate";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. This is a demo estimate — there is no real
    // loyalty program behind it; keep the numbers simulated.
    var CONFIG = {
      earnRate: 1, // simulated points earned per $1 of order total (1 pt / $1)
      glyph: "⭐", // decorative points glyph before the estimate (aria-hidden)
      lead: "You'll earn", // copy before the emphasized number
      approx: "~", // prefix marking the figure as an estimate
      unit: "points", // noun after the number
      // Optional muted sub-note (tier / redemption hint). Set to "" to hide.
      tierNote: "Estimate — join Owl Park Rewards to start earning.",
    };

    var observer = null;

    function parseTotal(summaryEl) {
      var matches = summaryEl.textContent.match(/\$[\d,]+\.\d{2}/g);
      if (!matches || matches.length === 0) return 0;
      var last = matches[matches.length - 1].replace(/[$,]/g, "");
      return parseFloat(last) || 0;
    }

    function injectPointsLine() {
      var summaryEl = document.getElementById("order-summary");
      if (!summaryEl) return;

      // Avoid stacking a duplicate line if this fires more than once per checkout.
      var existing = summaryEl.querySelector(
        '[data-owlpark-feature="' + FEATURE_ID + '"]',
      );
      if (existing) existing.remove();

      var total = parseTotal(summaryEl);
      if (total <= 0) return;

      // Simulated: CONFIG.earnRate points per $1 spent, rounded to whole points.
      var points = Math.round(total * CONFIG.earnRate);

      var note = CONFIG.tierNote
        ? '<span class="lp-note">' + CONFIG.tierNote + "</span>"
        : "";

      var line = document.createElement("div");
      line.className = "owlpark-feat-loyalty-points-estimate";
      line.setAttribute("data-owlpark-feature", FEATURE_ID);
      line.setAttribute("role", "status");
      line.setAttribute("aria-live", "polite");
      line.innerHTML =
        '<span class="lp-chip">' +
        '<span class="lp-icon" aria-hidden="true">' +
        CONFIG.glyph +
        "</span>" +
        '<span class="lp-copy">' +
        CONFIG.lead +
        " " +
        '<span class="lp-points">' +
        CONFIG.approx +
        points +
        "</span> " +
        '<span class="lp-unit">' +
        CONFIG.unit +
        "</span>" +
        "</span>" +
        "</span>" +
        note;
      summaryEl.appendChild(line);
    }

    function activate() {
      var modal = document.getElementById("checkout-modal");
      if (!modal) return;
      observer = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var m = mutations[i];
          if (
            m.attributeName === "class" &&
            !modal.classList.contains("hidden")
          ) {
            injectPointsLine();
          }
        }
      });
      observer.observe(modal, { attributes: true, attributeFilter: ["class"] });

      // Cover the case where the feature is toggled on while the modal is already open.
      if (!modal.classList.contains("hidden")) injectPointsLine();
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["loyalty-points-estimate"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
