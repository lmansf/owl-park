<script type="application/json" data-owlpark-manifest>
  {
    "id": "gift-mode",
    "name": "Gift Mode",
    "description": "Buy a membership as a gift: recipient, personal message and delivery date ride the cart line, with a printable certificate at checkout.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-gift-mode .gm-open-btn,
    .owlpark-feat-gift-mode .gm-add-btn,
    .owlpark-feat-gift-mode .gm-input,

</style>

<script>
  (function () {
    /* =========================================================================
     * Gift Mode  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   Adds a "Buying this as a gift?" disclosure to each membership row:
     *        capture a recipient, a personal message and a delivery date, and the
     *        membership rides the cart as a gift line. At checkout, a "Print gift
     *        certificate" button opens a printable keepsake for each recipient.
     * HOW    Reads data/products.json (Owl Park only) to learn which rows are
     *        memberships, decorates #catalog-grid .product-row, and re-applies via
     *        a MutationObserver after renderCatalog() rewrites the grid. Cart writes
     *        go through localStorage["owl-park-cart"] then an "owl-park-cart-changed"
     *        event, and every cart read is taken fresh at click time. A capture-phase
     *        click listener snapshots gift lines before checkout clears the cart; an
     *        observer on #order-id re-injects the certificate button per order.
     * HOSTS  Owl Park only. The zoo ViewItems page has no .product-row and 404s on
     *        products.json, so every path no-ops there (no rows decorated, no button).
     * ===================================================================== */

    var FEATURE_ID = "gift-mode";
    var CART_KEY = "owl-park-cart";

    // ----- Configuration --------------------------------------------------
    // Tunable copy + limits for the gift control. Behaviour is unchanged.
    var CONFIG = {
      openLabel: "🎁 Buying this as a gift?", // row disclosure toggle label (holds the 🎁 glyph)
      addLabel: "Add as a gift", // primary action inside the panel
      recipientLabel: "Recipient", // field label — who the gift is for
      messageLabel: "Personal message (optional)", // field label — the certificate note
      deliveryLabel: "Deliver on", // field label — delivery date
      recipientPlaceholder: "Who's it for?", // recipient input placeholder / help copy
      messagePlaceholder: "A line they'll read on the certificate", // message help copy
      missingRecipientError: "Who is the gift for? Add a name first.", // shown when the name is blank
      maxRecipient: 60, // max characters for the recipient name
      maxMessage: 240, // max characters for the personal message
      giftableCategory: "membership", // only rows in this catalog category get the gift control
      certButtonPrefix: "🎁 Print gift certificate for ", // checkout button copy; recipient name appended
    };

    var gridObserver = null;
    var orderObserver = null;
    var pendingGifts = [];
    var products = null;
    var panelSeq = 0;
    // Bumped on every activate and deactivate: an in-flight catalog fetch whose generation no longer
    // matches belongs to an activation that has since been torn down, and must touch nothing.
    var generation = 0;

    function readCart() {
      try {
        var raw = localStorage.getItem(CART_KEY);
        var lines = raw ? JSON.parse(raw) : [];
        return Array.isArray(lines) ? lines : [];
      } catch (err) {
        return [];
      }
    }

    function writeCart(lines) {
      localStorage.setItem(CART_KEY, JSON.stringify(lines));
      window.dispatchEvent(new CustomEvent("owl-park-cart-changed"));
    }

    function newLineKey(productId) {
      return (
        productId +
        "#gift-" +
        Date.now().toString(36) +
        Math.random().toString(36).slice(2, 7)
      );
    }

    function formatDay(iso) {
      // iso is yyyy-mm-dd; parse as local so the label can't slip a day across time zones.
      var parts = (iso || "").split("-");
      if (parts.length !== 3) return iso || "";
      var date = new Date(+parts[0], +parts[1] - 1, +parts[2]);
      if (isNaN(date.getTime())) return iso;
      return date.toLocaleDateString(undefined, {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: "numeric",
      });
    }

    function todayIso() {
      var now = new Date();
      var m = String(now.getMonth() + 1).padStart(2, "0");
      var d = String(now.getDate()).padStart(2, "0");
      return now.getFullYear() + "-" + m + "-" + d;
    }

    /**
     * A gift line is one membership for one named recipient, and it carries `custom.fixed` so the
     * drawer draws no quantity stepper on it: raising it to 2 would charge for two memberships and
     * still yield the one certificate this line's recipient gets. A second gift is a second line,
     * added from the panel again with its own recipient.
     */
    function addGiftLine(productId, gift) {
      var lines = readCart();
      lines.push({
        id: productId,
        key: newLineKey(productId),
        qty: 1,
        custom: { fixed: true },
        meta: {
          gift: {
            recipient: gift.recipient,
            message: gift.message,
            deliveryDate: gift.deliveryDate,
            note:
              "🎁 Gift for " +
              gift.recipient +
              " · delivers " +
              formatDay(gift.deliveryDate),
          },
        },
      });
      writeCart(lines);
    }

    function field(labelText, control) {
      var wrap = document.createElement("label");
      wrap.className = "gm-field";
      var label = document.createElement("span");
      label.className = "gm-label";
      label.textContent = labelText;
      wrap.append(label, control);
      return wrap;
    }

    function buildGiftBlock(row, productId) {
      var block = document.createElement("div");
      block.className = "owlpark-feat-gift-mode";
      block.setAttribute("data-owlpark-feature", FEATURE_ID);

      var panelId = "owlpark-gm-panel-" + ++panelSeq;

      var openBtn = document.createElement("button");
      openBtn.type = "button";
      openBtn.className = "gm-open-btn";
      openBtn.textContent = CONFIG.openLabel;
      openBtn.setAttribute("aria-expanded", "false");
      openBtn.setAttribute("aria-controls", panelId);
      block.appendChild(openBtn);

      var panel = document.createElement("div");
      panel.className = "gm-panel";
      panel.id = panelId;
      panel.hidden = true;

      var recipient = document.createElement("input");
      recipient.type = "text";
      recipient.className = "gm-input";
      recipient.maxLength = CONFIG.maxRecipient;
      recipient.placeholder = CONFIG.recipientPlaceholder;

      var message = document.createElement("textarea");
      message.className = "gm-textarea";
      message.maxLength = CONFIG.maxMessage;
      message.placeholder = CONFIG.messagePlaceholder;

      var deliveryDate = document.createElement("input");
      deliveryDate.type = "date";
      deliveryDate.className = "gm-input";
      deliveryDate.min = todayIso();
      deliveryDate.value = todayIso();

      var error = document.createElement("div");
      error.className = "gm-error";
      error.setAttribute("role", "alert");
      error.hidden = true;

      var addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "gm-add-btn";
      addBtn.textContent = CONFIG.addLabel;

      addBtn.addEventListener("click", function () {
        var name = recipient.value.trim();
        if (!name) {
          error.hidden = false;
          error.textContent = CONFIG.missingRecipientError;
          recipient.focus();
          return;
        }
        error.hidden = true;
        addGiftLine(productId, {
          recipient: name,
          message: message.value.trim(),
          deliveryDate: deliveryDate.value || todayIso(),
        });
        recipient.value = "";
        message.value = "";
        panel.hidden = true;
        openBtn.setAttribute("aria-expanded", "false");
      });

      panel.append(
        field(CONFIG.recipientLabel, recipient),
        field(CONFIG.messageLabel, message),
        field(CONFIG.deliveryLabel, deliveryDate),
        error,
        addBtn,
      );
      block.appendChild(panel);

      openBtn.addEventListener("click", function () {
        panel.hidden = !panel.hidden;
        openBtn.setAttribute("aria-expanded", String(!panel.hidden));
        if (!panel.hidden) recipient.focus();
      });

      row.appendChild(block);
    }

    /**
     * `renderCatalog()` replaces #catalog-grid's innerHTML on every tab switch, so the gift block is
     * re-applied after each render, guarded so a row that already has one is left alone.
     */
    function decorateRows() {
      if (!products) return;
      var rows = document.querySelectorAll(
        '#catalog-grid .product-row[data-product-id]',
      );
      rows.forEach(function (row) {
        if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]')) {
          return;
        }
        var id = row.getAttribute("data-product-id");
        var product = products.filter(function (p) {
          return p.id === id;
        })[0];
        if (!product || product.category !== CONFIG.giftableCategory) return;
        buildGiftBlock(row, id);
      });
    }

    function openCertificate(gift, productName) {
      var win = window.open("", "_blank", "width=640,height=760");
      if (!win) {
        console.warn("[" + FEATURE_ID + "] certificate window was blocked.");
        return;
      }
      var doc = win.document;
      doc.title = "Owl Park gift certificate";

      var style = doc.createElement("style");
      style.textContent =
        "body{font-family:Georgia,serif;margin:0;padding:32px;background:#f7f8f7;color:#17211f}" +
        ".cert{border:3px double #0f6f7a;border-radius:16px;background:#fff;padding:32px;text-align:center}" +
        ".mark{font-size:48px}h1{font-size:22px;letter-spacing:.08em;text-transform:uppercase;color:#0f6f7a}" +
        ".for{font-size:28px;margin:18px 0 6px}.what{font-size:17px;font-weight:bold}" +
        ".msg{margin:22px auto;max-width:34em;font-style:italic;white-space:pre-wrap}" +
        ".when{margin-top:18px;font-size:14px;color:#67736f}" +
        "@media print{body{background:#fff;padding:0}}";
      doc.head.appendChild(style);

      var cert = doc.createElement("div");
      cert.className = "cert";

      function part(className, text) {
        var el = doc.createElement("div");
        el.className = className;
        el.textContent = text;
        return el;
      }

      var heading = doc.createElement("h1");
      heading.textContent = "An Owl Park Gift Membership";

      cert.append(
        part("mark", "🦉"),
        heading,
        part("for", "For " + gift.recipient),
        part("what", productName),
      );
      if (gift.message) cert.appendChild(part("msg", "“" + gift.message + "”"));
      cert.appendChild(part("when", "Delivers " + formatDay(gift.deliveryDate)));

      doc.body.appendChild(cert);
      win.focus();
      win.print();
    }

    function injectCertificateButton() {
      var card = document.querySelector("#checkout-modal .modal-card");
      if (!card) return;

      // One button per gift went in, so every one of them has to come back out — a survivor would
      // offer a certificate for a previous order's recipient.
      card
        .querySelectorAll(".owlpark-feat-gift-mode-cert-btn")
        .forEach(function (btn) {
          btn.remove();
        });
      if (!pendingGifts.length) return;

      var closeBtn = document.getElementById("close-modal-btn");
      pendingGifts.forEach(function (entry) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "owlpark-feat-gift-mode-cert-btn";
        btn.setAttribute("data-owlpark-feature", FEATURE_ID);
        btn.textContent = CONFIG.certButtonPrefix + entry.gift.recipient;
        btn.addEventListener("click", function () {
          openCertificate(entry.gift, entry.productName);
        });
        if (closeBtn) {
          closeBtn.insertAdjacentElement("beforebegin", btn);
        } else {
          card.appendChild(btn);
        }
      });
    }

    /**
     * js/main.js clears the cart inside its own checkout handler, so the gift lines have to be
     * captured before it runs. A capture-phase listener on the document sees the click first.
     */
    function captureCheckout(event) {
      var target = event.target;
      if (!target || !target.closest) return;
      if (!target.closest("#checkout-btn")) return;

      var lines = readCart().filter(function (line) {
        return line.meta && line.meta.gift && line.meta.gift.recipient;
      });
      pendingGifts = lines.map(function (line) {
        var product = (products || []).filter(function (p) {
          return p.id === line.id;
        })[0];
        return {
          gift: line.meta.gift,
          productName: product ? product.name : "Owl Park membership",
        };
      });
      injectCertificateButton();
    }

    function activate() {
      var gen = ++generation;
      // A row is a membership because the catalog says so, not because of how the row is labelled.
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("products.json: " + res.status);
          return res.json();
        })
        .then(function (data) {
          if (gen !== generation) return;
          products = data;
          decorateRows();
        })
        .catch(function (err) {
          console.warn(
            "[" + FEATURE_ID + "] no catalog, gift mode stays off.",
            err,
          );
        });

      var grid = document.getElementById("catalog-grid");
      if (grid) {
        gridObserver = new MutationObserver(decorateRows);
        gridObserver.observe(grid, { childList: true });
      }

      var orderId = document.getElementById("order-id");
      if (orderId) {
        orderObserver = new MutationObserver(injectCertificateButton);
        orderObserver.observe(orderId, { childList: true, characterData: true });
      }

      document.addEventListener("click", captureCheckout, true);
    }

    function deactivate() {
      generation++;
      if (gridObserver) {
        gridObserver.disconnect();
        gridObserver = null;
      }
      if (orderObserver) {
        orderObserver.disconnect();
        orderObserver = null;
      }
      document.removeEventListener("click", captureCheckout, true);
      pendingGifts = [];
      products = null;
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
