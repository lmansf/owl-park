<script type="application/json" data-owlpark-manifest>
  {
    "id": "wishlist-favorites",
    "name": "Wishlist Favorites",
    "description": "Heart icon on product rows to save favorites, persisted across visits.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-wishlist-favorites {
    position: absolute;
    top: 0.7rem;
    right: 0.9rem;
    background: white;
    border: 1px solid var(--cove-border, #e4ddca);
    border-radius: 50%;
    width: 2.1rem;
    height: 2.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    line-height: 1;
    cursor: pointer;
    z-index: 3;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    color: #9aa5a4;
  }
  /* The painted heart stays 33.6px so the row looks exactly as it always has;
     the 44pt thumb target is a transparent centred expander instead. It still
     overhangs the heart by ~5px a side and hit-tests over whatever the heart is
     absolutely positioned over — inherent to a 44pt target on a small floating
     icon, and not fixed here. */
  .owlpark-feat-wishlist-favorites::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 44px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }
  .owlpark-feat-wishlist-favorites.is-favorited {
    color: #a8321f;
  }
  .owlpark-feat-wishlist-favorites:hover {
    transform: scale(1.08);
  }
  .owlpark-feat-wishlist-favorites.owlpark-wishlist-inline {
    position: static;
    display: inline-flex;
    margin-left: 0.5rem;
    box-shadow: none;
    width: 1.9rem;
    height: 1.9rem;
  }
</style>

<script>
  (function () {
    var FEATURE_ID = "wishlist-favorites";
    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        // Where header/utility buttons dock (zoo sub-header -> Owl Park header -> float).
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        // Product list container to observe for re-renders.
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        // Live product rows (skips Angular {{template}} rows on the zoo page).
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        // Inline anchor to hang a small decoration next to the product name.
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        // Block anchor under the product's descriptive text.
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();
    var STORAGE_KEY = "owl-park-wishlist";
    var observer = null;

    function readWishlist() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function writeWishlist(ids) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
    }

    function updateButton(btn, favorited) {
      btn.classList.toggle("is-favorited", favorited);
      btn.textContent = favorited ? "♥" : "♡";
      btn.setAttribute(
        "aria-label",
        favorited ? "Remove from favorites" : "Add to favorites",
      );
    }

    function toggle(productId, btn) {
      var ids = readWishlist();
      var idx = ids.indexOf(productId);
      if (idx === -1) {
        ids.push(productId);
      } else {
        ids.splice(idx, 1);
      }
      writeWishlist(ids);
      updateButton(btn, ids.indexOf(productId) !== -1);
    }

    function injectInto(row) {
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]'))
        return;
      var productId = H.rowId(row);
      if (!productId) return;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "owlpark-feat-wishlist-favorites";
      btn.setAttribute("data-owlpark-feature", FEATURE_ID);
      updateButton(btn, readWishlist().indexOf(productId) !== -1);
      btn.addEventListener("click", function () {
        toggle(productId, btn);
      });
      // Zoo <tr> rows can't host absolute children — dock the heart inline
      // beside the product name; Owl Park keeps the absolute top-right badge.
      if (H.isPlu(row)) {
        btn.classList.add("owlpark-wishlist-inline");
        (H.rowNameCell(row) || row).appendChild(btn);
      } else {
        row.appendChild(btn);
      }
    }

    function applyToRows() {
      H.rows().forEach(injectInto);
    }

    function activate() {
      applyToRows();
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
