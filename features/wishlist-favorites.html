<script type="application/json" data-owlpark-manifest>
  {
    "id": "wishlist-favorites",
    "name": "Wishlist Favorites",
    "description": "Heart icon on product rows to save favorites, persisted across visits.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-wishlist-favorites-style">
  /* Owl Park corner control: a quiet glass heart chip pinned to the row's
     top-right. Favorited reads as a restrained teal, never a loud red. */
  .owlpark-feat-wishlist-favorites {
    position: absolute;
    top: 0.7rem;
    right: 0.7rem;
    z-index: 3;
    box-sizing: border-box;
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: 0;
    border: 1px solid rgba(17, 33, 31, 0.1);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(10px) saturate(1.4);
    backdrop-filter: blur(10px) saturate(1.4);
    color: #8a938f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 1.05rem;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(20, 40, 40, 0.05);
    transition: all 0.16s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  /* Transparent expander lifts the tap target to 44px without enlarging the
     painted chip, so the row stays visually calm. */
  .owlpark-feat-wishlist-favorites::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 44px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }
  .owlpark-feat-wishlist-favorites:hover {
    color: #17211f;
    border-color: rgba(17, 33, 31, 0.18);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(20, 40, 40, 0.09);
  }
  .owlpark-feat-wishlist-favorites:active {
    transform: translateY(0);
  }
  .owlpark-feat-wishlist-favorites:focus-visible {
    outline: 2px solid #0f6f7a;
    outline-offset: 2px;
  }
  .owlpark-feat-wishlist-favorites.is-favorited {
    color: #0f6f7a;
    border-color: rgba(15, 111, 122, 0.28);
    background: rgba(15, 111, 122, 0.09);
  }
  .owlpark-feat-wishlist-favorites.is-favorited:hover {
    color: #0c5f69;
  }

  /* Zoo ViewItems <tr> rows can't host an absolute child — the heart docks
     inline beside the ticket name as a compact, transparent ghost. */
  .owlpark-feat-wishlist-favorites.owlpark-wishlist-inline {
    position: static;
    vertical-align: middle;
    width: 30px;
    height: 30px;
    margin-left: 0.4rem;
    border-color: transparent;
    background: transparent;
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
    box-shadow: none;
  }
  .owlpark-feat-wishlist-favorites.owlpark-wishlist-inline:hover {
    background: rgba(17, 33, 31, 0.05);
    border-color: transparent;
    transform: none;
    box-shadow: none;
  }

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-wishlist-favorites {
      background: rgba(18, 24, 26, 0.8);
      border-color: rgba(255, 255, 255, 0.11);
      color: #98a4a1;
    }
    .owlpark-feat-wishlist-favorites:hover {
      color: #e9edec;
      border-color: rgba(255, 255, 255, 0.2);
    }
    .owlpark-feat-wishlist-favorites.is-favorited {
      color: #5bc7cf;
      border-color: rgba(91, 199, 207, 0.35);
      background: rgba(91, 199, 207, 0.12);
    }
    .owlpark-feat-wishlist-favorites.is-favorited:hover {
      color: #7ad5db;
    }
    .owlpark-feat-wishlist-favorites.owlpark-wishlist-inline {
      background: transparent;
      border-color: transparent;
    }
    .owlpark-feat-wishlist-favorites.owlpark-wishlist-inline:hover {
      background: rgba(255, 255, 255, 0.08);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-wishlist-favorites {
      transition: none;
    }
    .owlpark-feat-wishlist-favorites:hover,
    .owlpark-feat-wishlist-favorites:active {
      transform: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Wishlist Favorites  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A quiet heart toggle on every product row. Tap to save a favorite;
     *        favorites persist across visits and re-appear after the store
     *        re-lists its products.
     * HOW    Injects one ghost <button> per row, keyed by the row's product id
     *        (H.rowId). State lives in localStorage under CONFIG.storageKey as a
     *        JSON array of ids. A MutationObserver on the product grid re-applies
     *        the heart after the host re-renders, guarded by a per-row
     *        idempotency check so a heart is never doubled.
     * HOSTS  Zoo ViewItems rows (tr.pluRow[data-plu]) get a compact inline heart
     *        beside the ticket name; Owl Park rows (.product-row) get a top-right
     *        corner control. Rows with no id / Angular {{template}} rows are
     *        skipped; a page with no product rows is a no-op.
     * ===================================================================== */

    var FEATURE_ID = "wishlist-favorites";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      storageKey: "owl-park-wishlist", // localStorage key: a JSON array of favorited row ids
      glyphOn: "♥", // heart shown when the row IS a favorite (♥)
      glyphOff: "♡", // heart shown when the row is NOT a favorite (♡)
      labelAdd: "Add to favorites", // aria-label + tooltip when not yet favorited
      labelRemove: "Remove from favorites", // aria-label + tooltip when favorited
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        // Where header/utility buttons dock (zoo sub-header -> Owl Park header -> float).
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        // Product list container to observe for re-renders.
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        // Live product rows (skips Angular {{template}} rows on the zoo page).
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        // Inline anchor to hang a small decoration next to the product name.
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        // Block anchor under the product's descriptive text.
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();
    var observer = null;

    function readWishlist() {
      try {
        var raw = localStorage.getItem(CONFIG.storageKey);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function writeWishlist(ids) {
      localStorage.setItem(CONFIG.storageKey, JSON.stringify(ids));
    }

    function updateButton(btn, favorited) {
      btn.classList.toggle("is-favorited", favorited);
      btn.textContent = favorited ? CONFIG.glyphOn : CONFIG.glyphOff;
      btn.setAttribute("aria-pressed", favorited ? "true" : "false");
      var label = favorited ? CONFIG.labelRemove : CONFIG.labelAdd;
      btn.setAttribute("aria-label", label);
      btn.setAttribute("title", label);
    }

    function toggle(productId, btn) {
      var ids = readWishlist();
      var idx = ids.indexOf(productId);
      if (idx === -1) {
        ids.push(productId);
      } else {
        ids.splice(idx, 1);
      }
      writeWishlist(ids);
      updateButton(btn, ids.indexOf(productId) !== -1);
    }

    function injectInto(row) {
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]'))
        return;
      var productId = H.rowId(row);
      if (!productId) return;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "owlpark-feat-wishlist-favorites";
      btn.setAttribute("data-owlpark-feature", FEATURE_ID);
      updateButton(btn, readWishlist().indexOf(productId) !== -1);
      btn.addEventListener("click", function () {
        toggle(productId, btn);
      });
      // Zoo <tr> rows can't host absolute children — dock the heart inline
      // beside the product name; Owl Park keeps the corner-anchored control.
      if (H.isPlu(row)) {
        btn.classList.add("owlpark-wishlist-inline");
        (H.rowNameCell(row) || row).appendChild(btn);
      } else {
        row.appendChild(btn);
      }
    }

    function applyToRows() {
      H.rows().forEach(injectInto);
    }

    function activate() {
      applyToRows();
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
