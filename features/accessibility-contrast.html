<script type="application/json" data-owlpark-manifest>
  {
    "id": "accessibility-contrast",
    "name": "High-Contrast Mode",
    "description": "High-contrast accessibility mode toggle for improved readability.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-accessibility-contrast {
    background: #0a4d55 !important;
    color: #ffffff !important;
    border: 1px solid rgba(255, 255, 255, 0.35) !important;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    min-height: 44px;
    box-sizing: border-box;
    text-decoration: none;
  }
  .owlpark-feat-accessibility-contrast:hover {
    background: #0c5b64 !important;
  }

  body.high-contrast-active {
    background: #ffffff !important;
    color: #000000 !important;
  }
  body.high-contrast-active .site-header {
    background: #000000 !important;
    color: #ffffff !important;
  }
  body.high-contrast-active .hero {
    background: none !important;
  }
  body.high-contrast-active .hero h1,
  body.high-contrast-active .hero p {
    color: #000000 !important;
  }
  body.high-contrast-active .product-row {
    background: #ffffff !important;
    border: 3px solid #000000 !important;
    box-shadow: none !important;
  }
  body.high-contrast-active .product-desc,
  body.high-contrast-active .product-tagline,
  body.high-contrast-active .product-plu,
  body.high-contrast-active .price-unit {
    color: #000000 !important;
  }
  body.high-contrast-active .price-amount {
    color: #000000 !important;
  }
  body.high-contrast-active .add-to-cart-btn {
    background: #000000 !important;
    color: #ffffff !important;
    border: 2px solid #000000 !important;
  }
  body.high-contrast-active .category-pill {
    background: #000000 !important;
    color: #ffffff !important;
    border: 1px solid #ffffff;
  }
  body.high-contrast-active .tab-btn {
    border: 2px solid #000000 !important;
    color: #000000 !important;
    background: #ffffff !important;
  }
  body.high-contrast-active .tab-btn.active {
    background: #000000 !important;
    color: #ffffff !important;
  }
  body.high-contrast-active .cart-drawer,
  body.high-contrast-active .modal-card {
    background: #ffffff !important;
    border-left: 3px solid #000000;
  }
  body.high-contrast-active .checkout-btn,
  body.high-contrast-active .modal-close-btn {
    background: #000000 !important;
    color: #ffffff !important;
  }
  body.high-contrast-active a,
  body.high-contrast-active .header-link {
    color: #ffff00 !important;
    text-decoration: underline !important;
  }

  /* --- ZooTampa web store surfaces (ASP.NET PLU layout) --- */
  body.high-contrast-active #page,
  body.high-contrast-active #MasterLayout,
  body.high-contrast-active #container,
  body.high-contrast-active #ContentWrapper,
  body.high-contrast-active .ContentCell {
    background: #ffffff !important;
    color: #000000 !important;
  }
  body.high-contrast-active #Header,
  body.high-contrast-active #sub-header {
    background: #000000 !important;
    color: #ffffff !important;
  }
  body.high-contrast-active #ContentHeading,
  body.high-contrast-active #ContentHeading span,
  body.high-contrast-active .categoryDescription,
  body.high-contrast-active .parentSCDName,
  body.high-contrast-active .pluName,
  body.high-contrast-active .pluShortName,
  body.high-contrast-active .pluDescription,
  body.high-contrast-active .pluInfoHeader,
  body.high-contrast-active [data-text="price"] {
    color: #000000 !important;
  }
  body.high-contrast-active .pluRow,
  body.high-contrast-active .pluTable,
  body.high-contrast-active .SalesChannelDetailPLURepeater {
    background: #ffffff !important;
    border: 2px solid #000000 !important;
  }
  body.high-contrast-active .parentSCDheader {
    background: #ffffff !important;
    border: 2px solid #000000 !important;
  }
  body.high-contrast-active .addToCart {
    background: #000000 !important;
    color: #ffffff !important;
    border: 2px solid #000000 !important;
  }
  body.high-contrast-active .PLUQtyTextBox {
    border: 2px solid #000000 !important;
    color: #000000 !important;
    background: #ffffff !important;
  }
  body.high-contrast-active #sub-header a,
  body.high-contrast-active .completeDetails {
    color: #ffff00 !important;
    text-decoration: underline !important;
  }
</style>

<script>
  (function () {
    var buttonEl = null;

    // Host-agnostic mount point. Prefer the storefront's own header, but fall
    // back to a shared floating bar on <body> so this snippet still shows its
    // control when pasted anywhere in ANY page's body (not just Owl Park's).
    function owlparkFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (bar) return bar;
      bar = document.createElement("div");
      bar.id = "owlpark-fallback-actions";
      bar.setAttribute("data-owlpark-fallback", "actions");
      bar.style.cssText =
        "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
        "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
        "top:calc(10px + env(safe-area-inset-top, 0px));" +
        "right:calc(10px + env(safe-area-inset-right, 0px));" +
        "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
        "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
      var barStyle = document.createElement("style");
      barStyle.id = "owlpark-fallback-actions-style";
      barStyle.setAttribute("data-owlpark-fallback", "actions");
      barStyle.textContent =
        "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
        "{min-height:44px;box-sizing:border-box;}";
      document.head.appendChild(barStyle);
      document.body.appendChild(bar);
      return bar;
    }
    function owlparkPruneFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (!bar || bar.children.length) return;
      bar.remove();
      var barStyle = document.getElementById("owlpark-fallback-actions-style");
      if (barStyle) barStyle.remove();
    }

    function updateLabel() {
      if (!buttonEl) return;
      var active = document.body.classList.contains("high-contrast-active");
      buttonEl.textContent = active ? "◐ Standard Contrast" : "◐ High Contrast";
    }

    function activate() {
      // Dock into the zoo web store's sub-header first, then Owl Park's header,
      // then a floating bar if pasted into any other page body.
      var actions =
        document.querySelector(".view-cart") ||
        document.querySelector("#sub-header") ||
        document.querySelector(".header-actions") ||
        owlparkFallbackBar();

      buttonEl = document.createElement("button");
      buttonEl.type = "button";
      buttonEl.className = "owlpark-feat-accessibility-contrast";
      buttonEl.setAttribute("data-owlpark-feature", "accessibility-contrast");
      actions.prepend(buttonEl);
      updateLabel();

      buttonEl.addEventListener("click", function () {
        document.body.classList.toggle("high-contrast-active");
        updateLabel();
      });
    }

    function deactivate() {
      document.body.classList.remove("high-contrast-active");
      if (buttonEl) {
        buttonEl.remove();
        buttonEl = null;
      }
      owlparkPruneFallbackBar();
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["accessibility-contrast"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
