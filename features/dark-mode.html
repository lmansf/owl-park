<script>
  (function () {
    var buttonEl = null;
    var watchdogId = null;

    // Host-agnostic mount point. Prefer the storefront's own header, but fall
    // back to a shared floating bar on <body> so this snippet still shows its
    // control when pasted anywhere in ANY page's body (not just Owl Park's).
    function owlparkFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (bar) return bar;
      bar = document.createElement("div");
      bar.id = "owlpark-fallback-actions";
      bar.setAttribute("data-owlpark-fallback", "actions");
      bar.style.cssText =
        "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
        "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
        "top:calc(10px + env(safe-area-inset-top, 0px));" +
        "right:calc(10px + env(safe-area-inset-right, 0px));" +
        "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
        "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
      var barStyle = document.createElement("style");
      barStyle.id = "owlpark-fallback-actions-style";
      barStyle.setAttribute("data-owlpark-fallback", "actions");
      barStyle.textContent =
        "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
        "{min-height:44px;box-sizing:border-box;}";
      document.head.appendChild(barStyle);
      document.body.appendChild(bar);
      return bar;
    }
    function owlparkPruneFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (!bar || bar.children.length) return;
      bar.remove();
      var barStyle = document.getElementById("owlpark-fallback-actions-style");
      if (barStyle) barStyle.remove();
    }

    function updateLabel() {
      if (!buttonEl) return;
      var active = document.body.classList.contains("owlpark-dark-mode-active");
      buttonEl.textContent = active ? "☀️ Light Mode" : "🌙 Dark Mode";
    }

    function onClick() {
      document.body.classList.toggle("owlpark-dark-mode-active");
      updateLabel();
    }

    // Owl Park's header is stable, so dock there. On any OTHER store the header
    // chrome may be hidden before the host reveals its body, re-rendered from a
    // template after load, or styled unpredictably — so use the self-owned
    // floating bar, which is a direct child of <body> (a sibling of the host's
    // own content wrapper) and therefore survives the host re-rendering itself.
    function resolveDock() {
      return document.querySelector(".header-actions") || owlparkFallbackBar();
    }

    function ensureButton() {
      if (buttonEl && buttonEl.isConnected) {
        updateLabel();
        return;
      }
      buttonEl = document.createElement("button");
      buttonEl.type = "button";
      buttonEl.className = "owlpark-feat-dark-mode-btn";
      buttonEl.setAttribute("data-owlpark-feature", "dark-mode");
      buttonEl.addEventListener("click", onClick);
      resolveDock().prepend(buttonEl);
      updateLabel();
    }

    function activate() {
      ensureButton();
      // Re-assert the control if the host removes or replaces it after load
      // (body reveal, template re-render); cheap isConnected check.
      watchdogId = setInterval(ensureButton, 1000);
    }

    function deactivate() {
      if (watchdogId) {
        clearInterval(watchdogId);
        watchdogId = null;
      }
      document.body.classList.remove("owlpark-dark-mode-active");
      if (buttonEl) {
        buttonEl.removeEventListener("click", onClick);
        buttonEl.remove();
        buttonEl = null;
      }
      owlparkPruneFallbackBar();
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["dark-mode"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
