<script type="application/json" data-owlpark-manifest>
  {
    "id": "product-info-tooltips",
    "name": "Product Info Tooltips",
    "description": "Info icons on product rows with detailed inclusion tooltips.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-product-info-tooltips-style">
  .owlpark-feat-product-info-tooltips.pit-info-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    margin-left: 0.3rem;
    vertical-align: middle;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
  }
  /* Ghost ⓘ trigger: transparent, muted ink, a faint hover wash — no fill, no
     border. The *visible* glyph stays 22px so the product title line still looks
     like a title line, and the 44pt thumb target is a transparent centred
     ::before expander. Horizontally the expander still overhangs the glyph by
     ~11px a side and hit-tests over the adjacent title text, which is therefore
     not selectable there — inherent to a 44pt target on an inline icon and not
     fixed here. What IS fixed is the vertical collision: the mobile panel below
     clears the expander's lower overhang (see its margin-top), so the target no
     longer reaches down over the panel it opens. */
  .owlpark-feat-product-info-tooltips .pit-info-icon {
    position: relative;
    width: 22px;
    height: 22px;
    padding: 0;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: #67736f;
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition:
      background 0.16s cubic-bezier(0.2, 0.6, 0.2, 1),
      color 0.16s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  .owlpark-feat-product-info-tooltips .pit-info-icon:hover {
    background: rgba(17, 33, 31, 0.05);
    color: #17211f;
  }
  .owlpark-feat-product-info-tooltips .pit-info-icon:active {
    transform: translateY(1px);
  }
  .owlpark-feat-product-info-tooltips .pit-info-icon:focus-visible {
    outline: 2px solid #0f6f7a;
    outline-offset: 2px;
  }
  .owlpark-feat-product-info-tooltips .pit-info-icon::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 44px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }
  /* Frosted near-white popover — hairline border, soft diffuse shadow, ink text. */
  .owlpark-feat-product-info-tooltips .pit-tooltip {
    visibility: hidden;
    opacity: 0;
    transform: translateY(-3px);
    position: absolute;
    /* 100% is the 22px icon wrapper, so anything under it must clear the glyph —
       a negative offset here would paint the panel over the bottom of the icon. */
    top: calc(100% + 8px);
    left: 0;
    width: 16rem;
    max-width: min(20rem, calc(100vw - 24px));
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(17, 33, 31, 0.1);
    color: #17211f;
    font-size: 0.82rem;
    font-weight: 500;
    line-height: 1.45;
    padding: 0.7rem 0.8rem;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(20, 40, 40, 0.09);
    transition:
      opacity 0.16s cubic-bezier(0.2, 0.6, 0.2, 1),
      transform 0.16s cubic-bezier(0.2, 0.6, 0.2, 1);
    pointer-events: none;
    z-index: 60;
  }
  /* Viewport-aware flips, toggled from JS at open time so the panel never runs
     off an edge: right-align when a left-aligned panel would overflow the right
     edge, and open upward when there's no room below but room above. */
  .owlpark-feat-product-info-tooltips .pit-tooltip.pit-flip-right {
    left: auto;
    right: 0;
  }
  .owlpark-feat-product-info-tooltips .pit-tooltip.pit-flip-up {
    top: auto;
    bottom: calc(100% + 8px);
  }
  /* `pit-open` is the ONE open-state, and nothing else may show the panel. Every
     opener — tap, Enter/Space on the focused icon, and the desktop pointer — is
     an *input* that sets this class (see the script); none of them displays the
     panel on its own. A CSS :hover or :focus rule that painted the panel
     independently would be a second, disagreeing open-state: the icon still
     holds the pointer or the focus right after a close, so the panel would stay
     on screen while `aria-expanded` said "collapsed" — a toggle that never
     closes. */
  .owlpark-feat-product-info-tooltips.pit-info-wrap.pit-open .pit-tooltip {
    visibility: visible;
    opacity: 1;
    transform: translateY(0);
    /* An open panel is a persistent disclosure, not a transient hover tooltip, so
       it has to take its own clicks: with pointer-events:none they fall through
       to the product row beneath, where the document listener's
       .closest('.pit-tooltip') dismiss guard can never match — so reading the
       fine print, or selecting it, would close the panel. The panel is a child of
       .pit-info-wrap, so this keeps the hover path intact. */
    pointer-events: auto;
  }

  @media (max-width: 560px) {
    /* The title line wraps, so the icon can sit anywhere along it and a floating
       panel anchored to the icon runs off one edge or the other. On a phone the
       panel stops floating altogether and becomes an in-flow disclosure inside
       the row: `display: contents` on the wrapper promotes the icon and the
       panel into flex items of .row-title-line, and a 100% flex-basis drops the
       panel onto its own line directly under the title, pushing the rest of the
       row down. Tapping reflows the row, which is honest and predictable —
       unlike a panel that floats over whatever happens to be beneath it. */
    .owlpark-feat-product-info-tooltips.pit-info-wrap {
      display: contents;
    }
    .owlpark-feat-product-info-tooltips .pit-tooltip {
      /* display:none, not visibility:hidden — an in-flow panel would otherwise
         reserve its full height in the row while closed. */
      display: none;
      position: static;
      flex: 0 0 100%;
      width: 100%;
      max-width: none;
      transform: none;
      /* The icon's ::before target hangs (44px - 22px) / 2 = 11px below the glyph
         and paints above this in-flow panel, so taps in the panel's first few
         pixels would land on the icon and toggle it shut. Clear that overhang
         with a real gap rather than shrinking the thumb target. */
      margin-top: 14px;
      box-shadow: none;
      pointer-events: auto;
      transition: none;
    }
    .owlpark-feat-product-info-tooltips.pit-info-wrap.pit-open .pit-tooltip {
      display: block;
    }
  }

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-product-info-tooltips .pit-info-icon {
      color: #98a4a1;
    }
    .owlpark-feat-product-info-tooltips .pit-info-icon:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e9edec;
    }
    .owlpark-feat-product-info-tooltips .pit-tooltip {
      background: rgba(18, 24, 26, 0.8);
      border-color: rgba(255, 255, 255, 0.11);
      color: #e9edec;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-product-info-tooltips .pit-info-icon,
    .owlpark-feat-product-info-tooltips .pit-tooltip {
      transition: none;
    }
    .owlpark-feat-product-info-tooltips .pit-info-icon:active {
      transform: none;
    }
    .owlpark-feat-product-info-tooltips .pit-tooltip {
      transform: translateY(0);
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Product Info Tooltips  ·  utility
     * -------------------------------------------------------------------------
     * WHAT   A quiet ⓘ affordance on each product row that reveals a small,
     *        frosted popover of fine print (ticket vs membership terms).
     * HOW    Appends a ghost icon-button + popover into each row's name cell via
     *        the shared owlHost() adapter; a MutationObserver on the grid
     *        re-applies after the host re-renders its rows (idempotency-guarded
     *        by the row's existing [data-owlpark-feature] node). Opens on click
     *        and (desktop) hover, positions itself to stay within the viewport,
     *        and dismisses on Esc / outside-click / blur.
     * HOSTS  Zoo ViewItems (tr.pluRow[data-plu]) and Owl Park (.product-row) both
     *        get icons. Owl Park enriches the copy from data/products.json but
     *        NEVER blocks on it — the ticket/membership split is derived from the
     *        row name otherwise. Below 561px the popover becomes an in-flow
     *        disclosure. No-ops on any page with no product rows.
     * ===================================================================== */

    // ----- Configuration --------------------------------------------------
    // Tunable copy + source. Fine print is chosen per row (membership vs ticket).
    var CONFIG = {
      icon: "ⓘ", // glyph shown inside the ghost trigger
      triggerLabel: "Product details", // aria-label for the icon button
      productsUrl: "data/products.json", // Owl Park enrichment only; never blocks
      // Shown in the popover for a standard admission / ticket row:
      ticketFinePrint:
        "Valid for one calendar day from date of purchase. Non-transferable. Rain-check policy applies for closures.",
      // Shown instead when the row is a membership:
      membershipFinePrint:
        "12-month term from purchase date. Includes 10% gift shop discount. Auto-renewal reminder sent 30 days prior.",
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();

    var observer = null;
    var byId = {};
    /* Where the panel floats beside the icon and a pointer can rest on it. Below
       561px the panel is an in-flow disclosure that reflows the row, so hover
       must not open it there; without (hover: hover), iOS Safari's sticky
       emulated hover would pin it open after a tap. */
    var desktopHover = window.matchMedia("(hover: hover) and (min-width: 561px)");
    /* The panel only *floats* (and so needs viewport-aware flipping) at >=561px;
       below that it is an in-flow block the CSS lays out, so skip positioning. */
    var floatingPanel = window.matchMedia("(min-width: 561px)");

    function applyToRows() {
      H.rows().forEach(function (row) {
        if (row.querySelector('[data-owlpark-feature="product-info-tooltips"]'))
          return;
        // Owl Park enriches from products.json; on any other store derive the
        // membership vs ticket split from the row's own name.
        var product = byId[H.rowId(row)];
        var isMembership = product
          ? product.category === "membership"
          : /member/i.test(H.rowName(row));
        var finePrint = isMembership
          ? CONFIG.membershipFinePrint
          : CONFIG.ticketFinePrint;

        var panelId = "pit-panel-" + H.rowId(row);

        var wrap = document.createElement("div");
        wrap.className = "owlpark-feat-product-info-tooltips pit-info-wrap";
        wrap.setAttribute("data-owlpark-feature", "product-info-tooltips");
        wrap.innerHTML =
          '<button type="button" class="pit-info-icon" data-owlpark-feature="product-info-tooltips"' +
          ' aria-label="' + CONFIG.triggerLabel + '" aria-expanded="false"' +
          ' aria-controls="' + panelId + '" aria-describedby="' + panelId + '">' +
          CONFIG.icon +
          "</button>" +
          '<div class="pit-tooltip" role="tooltip" data-owlpark-feature="product-info-tooltips" id="' +
          panelId +
          '">' +
          finePrint +
          "</div>";
        var icon = wrap.querySelector(".pit-info-icon");
        /* Both flags live per row, in this closure, so one icon's state cannot
           leak into another's and it dies with the row when renderCatalog()
           replaces the grid — a shared flag could be stranded by a row that is
           removed while the pointer is still over it, since boundary events
           are not reliably dispatched for a removed node. */
        var openedByHover = false;
        var hoverSuppressed = false;

        icon.addEventListener("click", function (ev) {
          ev.stopPropagation();
          var wasOpen = wrap.classList.contains("pit-open");
          closeAllTooltips();
          if (!wasOpen) setOpen(wrap, true);
          /* An explicit click (or Enter/Space, which fires click too) pins the
             panel: only another click, Escape, or a click outside may close it.
             The pointer is still resting on the icon after a click that closed
             the panel, so hover would immediately re-open it and the click
             would look inert. Stay closed until the pointer leaves. */
          openedByHover = false;
          hoverSuppressed = wasOpen;
        });
        wrap.addEventListener("mouseenter", function () {
          if (!desktopHover.matches || hoverSuppressed) return;
          if (wrap.classList.contains("pit-open")) return;
          closeAllTooltips();
          setOpen(wrap, true);
          openedByHover = true;
        });
        wrap.addEventListener("mouseleave", function () {
          hoverSuppressed = false;
          if (!desktopHover.matches) return;
          /* Hover only takes back what hover gave: a pinned panel must not be
             dismissed by the pointer drifting off the icon on its way to the
             panel's fine print. */
          if (!openedByHover) return;
          openedByHover = false;
          setOpen(wrap, false);
        });
        /* Blur dismissal for keyboard users: when focus moves to another control
           OUTSIDE this wrap, close. A null relatedTarget (a click on the panel's
           own text, which holds no focusable node) is left to the outside-click
           guard, so reading or selecting the fine print never dismisses it. */
        wrap.addEventListener("focusout", function (ev) {
          var to = ev.relatedTarget;
          if (to && !wrap.contains(to)) setOpen(wrap, false);
        });

        var mount = H.rowNameCell(row);
        if (mount) {
          mount.appendChild(wrap);
        } else {
          row.style.position = row.style.position || "relative";
          row.appendChild(wrap);
        }
      });
    }

    /* Keep a just-opened floating panel on screen: measure the anchor + panel and
       flip horizontally / vertically as needed. No-op below 561px, where the CSS
       lays the panel out in-flow. */
    function positionPanel(wrap) {
      var panel = wrap.querySelector(".pit-tooltip");
      if (!panel) return;
      panel.classList.remove("pit-flip-right", "pit-flip-up");
      if (!floatingPanel.matches) return;
      var anchor = wrap.getBoundingClientRect();
      var box = panel.getBoundingClientRect();
      var vw = document.documentElement.clientWidth;
      var vh = document.documentElement.clientHeight;
      if (anchor.left + box.width > vw - 8) panel.classList.add("pit-flip-right");
      if (
        anchor.bottom + box.height + 8 > vh &&
        anchor.top - box.height - 8 > 0
      ) {
        panel.classList.add("pit-flip-up");
      }
    }

    function setOpen(wrap, open) {
      wrap.classList.toggle("pit-open", open);
      var icon = wrap.querySelector(".pit-info-icon");
      if (icon) icon.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) {
        positionPanel(wrap);
      } else {
        var panel = wrap.querySelector(".pit-tooltip");
        if (panel) panel.classList.remove("pit-flip-right", "pit-flip-up");
      }
    }

    function closeAllTooltips() {
      document
        .querySelectorAll(".pit-info-wrap.pit-open")
        .forEach(function (el) {
          setOpen(el, false);
        });
    }

    function onDocumentClick(ev) {
      var target = ev.target;
      if (target && target.closest && target.closest(".pit-tooltip")) return;
      closeAllTooltips();
    }

    function onDocumentKeydown(ev) {
      if (ev.key !== "Escape" && ev.key !== "Esc") return;
      closeAllTooltips();
    }

    function start() {
      applyToRows();
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function activate() {
      document.addEventListener("click", onDocumentClick);
      document.addEventListener("keydown", onDocumentKeydown);
      // Owl Park enriches tooltips from products.json; the zoo store has no such
      // feed, so derive fine print from the row itself and never block on it.
      fetch(CONFIG.productsUrl)
        .then(function (res) {
          return res.json();
        })
        .then(function (products) {
          products.forEach(function (p) {
            byId[p.id] = p;
          });
          start();
        })
        .catch(function () {
          start();
        });
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document.removeEventListener("click", onDocumentClick);
      document.removeEventListener("keydown", onDocumentKeydown);
      document
        .querySelectorAll('[data-owlpark-feature="product-info-tooltips"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["product-info-tooltips"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
