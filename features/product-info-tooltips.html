<script type="application/json" data-owlpark-manifest>
  {
    "id": "product-info-tooltips",
    "name": "Product Info Tooltips",
    "description": "Info icons on product rows with detailed inclusion tooltips.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-product-info-tooltips.pit-info-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    margin-left: 0.3rem;
    vertical-align: middle;
  }
  /* The *visible* dot stays 21px so the product title line still looks like a
     title line, and the 44pt thumb target is a transparent centred ::before
     expander. Horizontally the expander still overhangs the dot by ~11.5px a
     side and hit-tests over the adjacent title text, which is therefore not
     selectable there — that is inherent to a 44pt target on an inline icon and
     is not fixed here. What IS fixed is the vertical collision: the mobile
     panel below clears the expander's lower overhang (see its margin-top), so
     the target no longer reaches down over the panel it opens. */
  .owlpark-feat-product-info-tooltips .pit-info-icon {
    position: relative;
    width: 21px;
    height: 21px;
    padding: 0;
    border-radius: 50%;
    background: var(--cove-teal-dark, #0a4d55);
    color: white;
    border: none;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .owlpark-feat-product-info-tooltips .pit-info-icon::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 44px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }
  .owlpark-feat-product-info-tooltips .pit-tooltip {
    visibility: hidden;
    opacity: 0;
    position: absolute;
    /* 100% is the 21px icon wrapper, so anything under it must clear the dot —
       a negative offset here paints the panel over the bottom of the icon. */
    top: calc(100% + 6px);
    left: 0;
    width: 15rem;
    max-width: 60vw;
    background: var(--cove-ink, #1e2a2b);
    color: white;
    font-size: 0.76rem;
    line-height: 1.4;
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
    transition: opacity 0.15s ease;
    pointer-events: none;
    z-index: 5;
  }
  /* `pit-open` is the single open-state, toggled by the icon's click handler —
     which is also what Enter/Space on the focused icon fires, so touch and
     keyboard share one path. Focus must NOT open the panel on its own: a second
     tap or keypress could not then close it, because the icon still holds focus.
     Hover is a desktop-only preview gated on (hover: hover), or iOS Safari's
     sticky emulated hover would likewise pin the panel open after a tap. */
  .owlpark-feat-product-info-tooltips.pit-info-wrap.pit-open .pit-tooltip {
    visibility: visible;
    opacity: 1;
  }
  @media (hover: hover) {
    .owlpark-feat-product-info-tooltips.pit-info-wrap:hover .pit-tooltip {
      visibility: visible;
      opacity: 1;
    }
  }

  @media (max-width: 560px) {
    /* The title line wraps, so the icon can sit anywhere along it and a floating
       panel anchored to the icon runs off one edge or the other. On a phone the
       panel stops floating altogether and becomes an in-flow disclosure inside
       the row: `display: contents` on the wrapper promotes the icon and the
       panel into flex items of .row-title-line, and a 100% flex-basis drops the
       panel onto its own line directly under the title, pushing the rest of the
       row down. Tapping reflows the row, which is honest and predictable —
       unlike a panel that floats over whatever happens to be beneath it. */
    .owlpark-feat-product-info-tooltips.pit-info-wrap {
      display: contents;
    }
    .owlpark-feat-product-info-tooltips .pit-tooltip {
      /* display:none, not visibility:hidden — an in-flow panel would otherwise
         reserve its full height in the row while closed. */
      display: none;
      position: static;
      flex: 0 0 100%;
      width: 100%;
      max-width: none;
      /* The icon's ::before target hangs (44px - 21px) / 2 = 11.5px below the
         dot and paints above this in-flow panel, so taps in the panel's first
         few pixels would land on the icon and toggle it shut. Clear that
         overhang with a real gap rather than shrinking the thumb target. */
      margin-top: 14px;
      box-shadow: none;
      pointer-events: auto;
      transition: none;
    }
    .owlpark-feat-product-info-tooltips.pit-info-wrap.pit-open .pit-tooltip {
      display: block;
    }
  }
  @media (max-width: 560px) and (hover: hover) {
    .owlpark-feat-product-info-tooltips.pit-info-wrap:hover .pit-tooltip {
      display: block;
    }
  }
</style>

<script>
  (function () {
    var TICKET_FINE_PRINT =
      "Valid for one calendar day from date of purchase. Non-transferable. Rain-check policy applies for closures.";
    var MEMBERSHIP_FINE_PRINT =
      "12-month term from purchase date. Includes 10% gift shop discount. Auto-renewal reminder sent 30 days prior.";

    var observer = null;
    var byId = {};

    function applyToRows() {
      document
        .querySelectorAll(".product-row[data-product-id]")
        .forEach(function (row) {
          if (
            row.querySelector('[data-owlpark-feature="product-info-tooltips"]')
          )
            return;
          var product = byId[row.getAttribute("data-product-id")];
          if (!product) return;

          var finePrint =
            product.category === "membership"
              ? MEMBERSHIP_FINE_PRINT
              : TICKET_FINE_PRINT;

          var panelId =
            "pit-panel-" + row.getAttribute("data-product-id");

          var wrap = document.createElement("div");
          wrap.className = "owlpark-feat-product-info-tooltips pit-info-wrap";
          wrap.setAttribute("data-owlpark-feature", "product-info-tooltips");
          wrap.innerHTML =
            '<button type="button" class="pit-info-icon" aria-label="Product details" aria-expanded="false" aria-controls="' +
            panelId +
            '">i</button>' +
            '<div class="pit-tooltip" id="' +
            panelId +
            '">' +
            finePrint +
            "</div>";
          var icon = wrap.querySelector(".pit-info-icon");
          icon.addEventListener("click", function (ev) {
            ev.stopPropagation();
            var wasOpen = wrap.classList.contains("pit-open");
            closeAllTooltips();
            if (!wasOpen) setOpen(wrap, true);
          });

          var titleLine = row.querySelector(".row-title-line");
          if (titleLine) {
            titleLine.appendChild(wrap);
          } else {
            row.style.position = row.style.position || "relative";
            row.appendChild(wrap);
          }
        });
    }

    function setOpen(wrap, open) {
      wrap.classList.toggle("pit-open", open);
      var icon = wrap.querySelector(".pit-info-icon");
      if (icon) icon.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function closeAllTooltips() {
      document
        .querySelectorAll(".pit-info-wrap.pit-open")
        .forEach(function (el) {
          setOpen(el, false);
        });
    }

    function onDocumentClick(ev) {
      var target = ev.target;
      if (target && target.closest && target.closest(".pit-tooltip")) return;
      closeAllTooltips();
    }

    function onDocumentKeydown(ev) {
      if (ev.key !== "Escape" && ev.key !== "Esc") return;
      closeAllTooltips();
    }

    function activate() {
      document.addEventListener("click", onDocumentClick);
      document.addEventListener("keydown", onDocumentKeydown);
      fetch("data/products.json")
        .then(function (res) {
          return res.json();
        })
        .then(function (products) {
          products.forEach(function (p) {
            byId[p.id] = p;
          });
          applyToRows();
          var grid = document.getElementById("catalog-grid");
          if (grid) {
            observer = new MutationObserver(function () {
              applyToRows();
            });
            observer.observe(grid, { childList: true });
          }
        });
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document.removeEventListener("click", onDocumentClick);
      document.removeEventListener("keydown", onDocumentKeydown);
      document
        .querySelectorAll('[data-owlpark-feature="product-info-tooltips"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["product-info-tooltips"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
