<script type="application/json" data-owlpark-manifest>
  {
    "id": "product-info-tooltips",
    "name": "Product Info Tooltips",
    "description": "Info icons on product rows with detailed inclusion tooltips.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-product-info-tooltips.pit-info-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    margin-left: 0.3rem;
    vertical-align: middle;
  }
  /* The *visible* dot stays 21px so the product title line still looks like a
     title line, and the 44pt thumb target is a transparent centred ::before
     expander. The expander still overhangs the 21px icon by ~11px a side, so the
     text it overlaps is part of this button's hit area and is not selectable —
     that is inherent to a 44pt target on an inline icon. Keeping the expander
     transparent and separate from the button box at least stops it painting over
     the neighbouring title and description text. */
  .owlpark-feat-product-info-tooltips .pit-info-icon {
    position: relative;
    width: 21px;
    height: 21px;
    padding: 0;
    border-radius: 50%;
    background: var(--cove-teal-dark, #0a4d55);
    color: white;
    border: none;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: help;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .owlpark-feat-product-info-tooltips .pit-info-icon::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 44px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
  }
  .owlpark-feat-product-info-tooltips .pit-tooltip {
    visibility: hidden;
    opacity: 0;
    position: absolute;
    top: calc(100% - 8px);
    left: 0;
    width: 15rem;
    max-width: 60vw;
    background: var(--cove-ink, #1e2a2b);
    color: white;
    font-size: 0.76rem;
    line-height: 1.4;
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
    transition: opacity 0.15s ease;
    pointer-events: none;
    z-index: 5;
  }
  /* `pit-open` is the touch path: a phone has no hover, and iOS Safari does not
     reliably focus a <button> on tap, so hover/focus alone left this tooltip
     completely unreachable on an iPhone. Tapping the icon toggles the class. */
  .owlpark-feat-product-info-tooltips.pit-info-wrap:hover .pit-tooltip,
  .owlpark-feat-product-info-tooltips.pit-info-wrap.pit-open .pit-tooltip,
  .owlpark-feat-product-info-tooltips .pit-info-icon:focus + .pit-tooltip {
    visibility: visible;
    opacity: 1;
  }

  @media (max-width: 560px) {
    /* The title line wraps, so the icon can sit anywhere along the row and any
       anchor relative to it runs off one edge or the other on a phone. Drop the
       wrapper out of the positioning chain so the tooltip resolves against the
       .product-row instead, gutter to gutter: its width no longer depends on
       where the icon landed. */
    .owlpark-feat-product-info-tooltips.pit-info-wrap {
      position: static;
    }
    .owlpark-feat-product-info-tooltips .pit-tooltip {
      top: calc(100% - 0.6rem);
      left: 1rem;
      right: 1rem;
      width: auto;
      max-width: none;
    }
  }
</style>

<script>
  (function () {
    var TICKET_FINE_PRINT =
      "Valid for one calendar day from date of purchase. Non-transferable. Rain-check policy applies for closures.";
    var MEMBERSHIP_FINE_PRINT =
      "12-month term from purchase date. Includes 10% gift shop discount. Auto-renewal reminder sent 30 days prior.";

    var observer = null;
    var byId = {};

    function applyToRows() {
      document
        .querySelectorAll(".product-row[data-product-id]")
        .forEach(function (row) {
          if (
            row.querySelector('[data-owlpark-feature="product-info-tooltips"]')
          )
            return;
          var product = byId[row.getAttribute("data-product-id")];
          if (!product) return;

          var finePrint =
            product.category === "membership"
              ? MEMBERSHIP_FINE_PRINT
              : TICKET_FINE_PRINT;

          var wrap = document.createElement("div");
          wrap.className = "owlpark-feat-product-info-tooltips pit-info-wrap";
          wrap.setAttribute("data-owlpark-feature", "product-info-tooltips");
          wrap.innerHTML =
            '<button type="button" class="pit-info-icon" aria-label="Product details">i</button>' +
            '<div class="pit-tooltip" role="tooltip">' +
            finePrint +
            "</div>";
          wrap
            .querySelector(".pit-info-icon")
            .addEventListener("click", function (ev) {
              ev.stopPropagation();
              var wasOpen = wrap.classList.contains("pit-open");
              closeAllTooltips();
              if (!wasOpen) wrap.classList.add("pit-open");
            });

          var titleLine = row.querySelector(".row-title-line");
          if (titleLine) {
            titleLine.appendChild(wrap);
          } else {
            row.style.position = row.style.position || "relative";
            row.appendChild(wrap);
          }
        });
    }

    function closeAllTooltips() {
      document
        .querySelectorAll(".pit-info-wrap.pit-open")
        .forEach(function (el) {
          el.classList.remove("pit-open");
        });
    }

    function activate() {
      document.addEventListener("click", closeAllTooltips);
      fetch("data/products.json")
        .then(function (res) {
          return res.json();
        })
        .then(function (products) {
          products.forEach(function (p) {
            byId[p.id] = p;
          });
          applyToRows();
          var grid = document.getElementById("catalog-grid");
          if (grid) {
            observer = new MutationObserver(function () {
              applyToRows();
            });
            observer.observe(grid, { childList: true });
          }
        });
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document.removeEventListener("click", closeAllTooltips);
      document
        .querySelectorAll('[data-owlpark-feature="product-info-tooltips"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["product-info-tooltips"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
