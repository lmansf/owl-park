<script>
  (function () {
    /* =========================================================================
     * Exit Intent Offer  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A one-time, dismissible offer that reveals a promo code when the
     *        visitor signals they're about to leave — presented as a clean,
     *        frosted modal dialog.
     * HOW    Watches for exit intent (the pointer leaving the top edge of the
     *        viewport) plus a fallback dwell timer; either reveals the offer at
     *        most once per browser session (sessionStorage guard, with an
     *        in-memory fallback for private mode). The dialog fades/scales in,
     *        traps focus, closes on Esc / scrim / × / an action, and restores
     *        focus to wherever it was.
     * HOSTS  Renders on every host (self-contained; needs no store data). The
     *        promo code is informational — it is revealed for the shopper to
     *        enter later; this feature never touches a cart.
     * ===================================================================== */

    var FEATURE_ID = "exit-intent-offer";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      icon: "🐾", // small emoji above the title ("" to hide it)
      title: "Wait — don't go!", // headline; also labels the dialog
      body: "Here's 10% off your first membership — enter this code at checkout.", // supporting copy
      promoCode: "COVE10", // revealed discount code shown in the chip ("" to hide the chip)
      ctaLabel: "Got it", // primary solid-teal pill; acknowledges and closes
      dismissLabel: "No thanks", // quiet secondary ghost link ("" to hide it)
      fallbackDelayMs: 25000, // reveal after this long if no exit intent is detected first
    };

    // sessionStorage key backing the once-per-session guard.
    var SHOWN_KEY = "owl-park-exit-intent-shown";
    var TITLE_ID = "owlpark-exit-intent-title";

    var leaveHandler = null;
    var fallbackTimerId = null;
    var overlayEl = null;
    var lastFocus = null;
    var keyHandler = null;
    var shownThisSession = false;

    // ----- Once-per-session guard -----------------------------------------
    function hasShown() {
      if (shownThisSession) return true;
      try {
        return sessionStorage.getItem(SHOWN_KEY) === "1";
      } catch (e) {
        return false;
      }
    }
    function markShown() {
      shownThisSession = true;
      try {
        sessionStorage.setItem(SHOWN_KEY, "1");
      } catch (e) {
        /* private mode — the in-memory flag still guards this session */
      }
    }

    // ----- Modal dialog ---------------------------------------------------
    function focusable() {
      if (!overlayEl) return [];
      return [].slice.call(
        overlayEl.querySelectorAll(
          'button, [href], input, [tabindex]:not([tabindex="-1"])',
        ),
      );
    }

    function onKey(e) {
      if (e.key === "Escape" || e.key === "Esc") {
        e.preventDefault();
        closeOffer();
        return;
      }
      if (e.key === "Tab") {
        var f = focusable();
        if (!f.length) return;
        var first = f[0];
        var last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function showOffer() {
      if (hasShown() || overlayEl) return;
      markShown();
      clearFallback();

      lastFocus = document.activeElement;
      overlayEl = document.createElement("div");
      overlayEl.className = "owlpark-feat-exit-intent-offer-overlay";
      overlayEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlayEl.setAttribute("role", "dialog");
      overlayEl.setAttribute("aria-modal", "true");
      overlayEl.setAttribute("aria-labelledby", TITLE_ID);

      var html =
        '<div class="owlpark-feat-exit-intent-offer-card">' +
        '<button type="button" class="owlpark-feat-exit-intent-offer-x" aria-label="Close">&times;</button>';
      if (CONFIG.icon) {
        html +=
          '<div class="owlpark-feat-exit-intent-offer-icon" aria-hidden="true">' +
          CONFIG.icon +
          "</div>";
      }
      html += '<h3 id="' + TITLE_ID + '">' + CONFIG.title + "</h3>";
      if (CONFIG.body) {
        html +=
          '<p class="owlpark-feat-exit-intent-offer-body">' +
          CONFIG.body +
          "</p>";
      }
      if (CONFIG.promoCode) {
        html +=
          '<div class="owlpark-feat-exit-intent-offer-code">' +
          CONFIG.promoCode +
          "</div>";
      }
      html +=
        '<div class="owlpark-feat-exit-intent-offer-actions">' +
        '<button type="button" class="owlpark-feat-exit-intent-offer-cta">' +
        CONFIG.ctaLabel +
        "</button>";
      if (CONFIG.dismissLabel) {
        html +=
          '<button type="button" class="owlpark-feat-exit-intent-offer-dismiss">' +
          CONFIG.dismissLabel +
          "</button>";
      }
      html += "</div></div>";
      overlayEl.innerHTML = html;
      document.body.appendChild(overlayEl);

      overlayEl
        .querySelector(".owlpark-feat-exit-intent-offer-cta")
        .addEventListener("click", closeOffer);
      var dismissBtn = overlayEl.querySelector(
        ".owlpark-feat-exit-intent-offer-dismiss",
      );
      if (dismissBtn) dismissBtn.addEventListener("click", closeOffer);
      overlayEl
        .querySelector(".owlpark-feat-exit-intent-offer-x")
        .addEventListener("click", closeOffer);
      overlayEl.addEventListener("click", function (e) {
        if (e.target === overlayEl) closeOffer();
      });
      keyHandler = onKey;
      document.addEventListener("keydown", keyHandler);

      requestAnimationFrame(function () {
        if (overlayEl) overlayEl.classList.add("is-open");
        var x =
          overlayEl &&
          overlayEl.querySelector(".owlpark-feat-exit-intent-offer-x");
        if (x) x.focus();
      });
    }

    function closeOffer() {
      if (!overlayEl) return;
      var el = overlayEl;
      overlayEl = null;
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      el.classList.remove("is-open");
      setTimeout(function () {
        el.remove();
      }, 180);
      if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      lastFocus = null;
    }

    // ----- Exit-intent triggers -------------------------------------------
    function clearFallback() {
      if (fallbackTimerId) {
        clearTimeout(fallbackTimerId);
        fallbackTimerId = null;
      }
    }

    function activate() {
      leaveHandler = function (event) {
        if (event.clientY <= 0) showOffer();
      };
      document.documentElement.addEventListener("mouseleave", leaveHandler);
      if (CONFIG.fallbackDelayMs > 0 && !hasShown()) {
        fallbackTimerId = setTimeout(showOffer, CONFIG.fallbackDelayMs);
      }
    }

    function deactivate() {
      if (leaveHandler) {
        document.documentElement.removeEventListener(
          "mouseleave",
          leaveHandler,
        );
        leaveHandler = null;
      }
      clearFallback();
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      overlayEl = null;
      lastFocus = null;
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["exit-intent-offer"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
