<div class="owlpark-feat-animal-spotlight" role="region" aria-label="Owl of the Day spotlight">

  <div class="as-body" role="status" aria-live="polite">
    <span class="as-emoji" aria-hidden="true">🦉</span>
    <div class="as-text">

      <div class="as-fact">
        Barn owls can locate prey in total darkness using hearing alone.
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    /* =========================================================================
     * Owl Spotlight  ·  visual
     * -------------------------------------------------------------------------
     * WHAT   A clean, frosted "Owl of the Day" card that spotlights one Owl Park
     *        resident — large emoji, name and fact — and crossfades to the next
     *        on a timer, with quiet ghost prev/next controls.
     * HOW    Renders its own static card (the loader appends it into #feature-root
     *        or <body>). A timer advances an index through CONFIG.owls; each step
     *        fades the body out, swaps emoji/name/fact, fades it back in. Hovering
     *        pauses rotation; prev/next step manually and re-base the timer. Touches
     *        no host DOM, so no adapter/watchdog is needed.
     * HOSTS  Self-contained; renders identically on every host (needs no store data).
     * ===================================================================== */

    var FEATURE_ID = "animal-spotlight";

    // ----- Configuration --------------------------------------------------
    var CONFIG = {
      rotateMs: 6000, // dwell time on each owl before auto-advancing
      swapMs: 200, // crossfade duration — keep in sync with the CSS transition
      pauseOnHover: true, // hold rotation while the pointer is over the card
      showControls: true, // show the ghost prev/next navigation
      kicker: "Owl of the Day", // small label shown above the owl's name
      // The roster of spotlighted owls. Edit / reorder freely.
      owls: [
        {
          emoji: "🦉",
          name: "Barn Owl",
          fact: "Barn owls can locate prey in total darkness using hearing alone.",
        },
        {
          emoji: "🦉",
          name: "Snowy Owl",
          fact: "Snowy owls are one of the few owl species that hunt during the day, not just at night.",
        },
        {
          emoji: "🦉",
          name: "Great Horned Owl",
          fact: "A great horned owl's grip strength is roughly 28 pounds per square inch.",
        },
        {
          emoji: "🦉",
          name: "Elf Owl",
          fact: "Elf owls are the smallest owl species in the world, weighing about as much as a handful of coins.",
        },
      ],
    };

    var rootEl = null;
    var emojiEl = null;
    var nameEl = null;
    var factEl = null;
    var index = 0;
    var timerId = null;
    var paused = false;

    function render(i) {
      var owl = CONFIG.owls[i];
      if (!owl) return;
      if (emojiEl) emojiEl.textContent = owl.emoji;
      if (nameEl) nameEl.textContent = owl.name;
      if (factEl) factEl.textContent = owl.fact;
    }

    function goTo(i, animate) {
      if (!CONFIG.owls.length) return;
      index = (i + CONFIG.owls.length) % CONFIG.owls.length;
      if (animate === false || !rootEl) {
        render(index);
        return;
      }
      rootEl.classList.add("as-swapping");
      setTimeout(function () {
        render(index);
        if (rootEl) rootEl.classList.remove("as-swapping");
      }, CONFIG.swapMs);
    }

    function tick() {
      if (!paused) goTo(index + 1, true);
    }

    function restartTimer() {
      if (timerId) clearInterval(timerId);
      timerId = setInterval(tick, CONFIG.rotateMs);
    }

    function onPrev() {
      goTo(index - 1, true);
      restartTimer();
    }
    function onNext() {
      goTo(index + 1, true);
      restartTimer();
    }
    function onEnter() {
      paused = true;
    }
    function onLeave() {
      paused = false;
    }

    function activate() {
      rootEl = document.querySelector(".owlpark-feat-animal-spotlight");
      if (!rootEl) return;
      emojiEl = rootEl.querySelector(".as-emoji");
      nameEl = rootEl.querySelector(".as-name");
      factEl = rootEl.querySelector(".as-fact");

      var kickerEl = rootEl.querySelector(".as-kicker");
      if (kickerEl) kickerEl.textContent = CONFIG.kicker;

      var navEl = rootEl.querySelector(".as-nav");
      var prevBtn = rootEl.querySelector(".as-prev");
      var nextBtn = rootEl.querySelector(".as-next");
      if (!CONFIG.showControls) {
        if (navEl) navEl.hidden = true;
      } else {
        if (prevBtn) prevBtn.addEventListener("click", onPrev);
        if (nextBtn) nextBtn.addEventListener("click", onNext);
      }

      if (CONFIG.pauseOnHover) {
        rootEl.addEventListener("mouseenter", onEnter);
        rootEl.addEventListener("mouseleave", onLeave);
      }

      index = 0;
      goTo(0, false);
      restartTimer();
    }

    function deactivate() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      paused = false;
      if (rootEl) {
        var prevBtn = rootEl.querySelector(".as-prev");
        var nextBtn = rootEl.querySelector(".as-next");
        if (prevBtn) prevBtn.removeEventListener("click", onPrev);
        if (nextBtn) nextBtn.removeEventListener("click", onNext);
        rootEl.removeEventListener("mouseenter", onEnter);
        rootEl.removeEventListener("mouseleave", onLeave);
        rootEl.classList.remove("as-swapping");
      }
      rootEl = emojiEl = nameEl = factEl = null;
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
