<script type="application/json" data-owlpark-manifest>
  {
    "id": "park-guide-tour",
    "name": "Park Guide Tour",
    "description": "Guided walkthrough tooltip tour of the storefront's key sections.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-park-guide-tour-style">

  .owlpark-feat-park-guide-tour-btn:hover {

    outline-offset: 2px;
  }

  /* Spotlight ring around the active target; the huge outset shadow dims the
     rest of the page (subtle scrim) while leaving the target bright. */
  .owlpark-feat-park-guide-tour-highlight {
    position: fixed;
    border-radius: 12px;
    box-shadow:
      0 0 0 2px rgba(15, 111, 122, 0.55),
      0 0 0 9999px rgba(16, 22, 24, 0.45);
    z-index: 2147483000;
    pointer-events: none;
    transition:
      top 0.25s cubic-bezier(0.2, 0.6, 0.2, 1),
      left 0.25s cubic-bezier(0.2, 0.6, 0.2, 1),

      height 0.25s cubic-bezier(0.2, 0.6, 0.2, 1);

  .owlpark-feat-park-guide-tour-highlight.pgt-instant {

  /* Frosted coach-mark popover. */
  .owlpark-feat-park-guide-tour-tooltip {
    position: fixed;
    z-index: 2147483001;
    box-sizing: border-box;
    width: min(300px, calc(100vw - 24px));
    padding: 1.15rem 1.25rem 1.1rem;
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(17, 33, 31, 0.1);
    border-radius: 20px;
    box-shadow: 0 18px 50px rgba(15, 30, 33, 0.18);
    color: #17211f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    opacity: 0;
    transform: translateY(6px);
    transition:
      opacity 0.2s ease,
      transform 0.2s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  .owlpark-feat-park-guide-tour-tooltip.pgt-in {
    opacity: 1;

  .owlpark-feat-park-guide-tour-tooltip .pgt-progress {
    display: flex;

    gap: 0.35rem;
    margin-bottom: 0.7rem;
  }
  .owlpark-feat-park-guide-tour-tooltip .pgt-dot {

  .owlpark-feat-park-guide-tour-tooltip .pgt-dot.is-active {

  .owlpark-feat-park-guide-tour-tooltip .pgt-title {

  .owlpark-feat-park-guide-tour-tooltip .pgt-body {

  .owlpark-feat-park-guide-tour-tooltip .pgt-actions {

  .owlpark-feat-park-guide-tour-tooltip .pgt-nav {

  .owlpark-feat-park-guide-tour-tooltip button {
    min-height: 44px;

    padding: 0 1rem;
    border-radius: 999px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition:
      background 0.16s ease,

  }
  .owlpark-feat-park-guide-tour-tooltip .pgt-next {
    background: #0f6f7a;
    color: #ffffff;

  }
  .owlpark-feat-park-guide-tour-tooltip .pgt-next:hover {

  .owlpark-feat-park-guide-tour-tooltip .pgt-next:active {

  .owlpark-feat-park-guide-tour-tooltip .pgt-back {
    background: transparent;

    border: 1px solid rgba(17, 33, 31, 0.1);
    padding: 0 0.9rem;
  }
  .owlpark-feat-park-guide-tour-tooltip .pgt-back:hover {

  }
  .owlpark-feat-park-guide-tour-tooltip .pgt-skip {

  }
  .owlpark-feat-park-guide-tour-tooltip .pgt-skip:hover {

  .owlpark-feat-park-guide-tour-tooltip :focus-visible {

  }

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-park-guide-tour-tooltip {
      background: rgba(18, 24, 26, 0.8);
      border-color: rgba(255, 255, 255, 0.11);

      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-title {

    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-body {

    .owlpark-feat-park-guide-tour-tooltip .pgt-dot {

    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-dot.is-active {

    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-back {
      color: #e9edec;
      border-color: rgba(255, 255, 255, 0.14);
    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-back:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-skip {
      color: #98a4a1;
    }
    .owlpark-feat-park-guide-tour-tooltip .pgt-skip:hover {
      color: #e9edec;
      background: rgba(255, 255, 255, 0.08);
    }
    .owlpark-feat-park-guide-tour-highlight {
      box-shadow:
        0 0 0 2px rgba(91, 199, 207, 0.6),
        0 0 0 9999px rgba(0, 0, 0, 0.6);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-park-guide-tour-btn,
    .owlpark-feat-park-guide-tour-highlight,
    .owlpark-feat-park-guide-tour-tooltip,
    .owlpark-feat-park-guide-tour-tooltip button,
    .owlpark-feat-park-guide-tour-tooltip .pgt-dot {
      transition: none;
    }
    .owlpark-feat-park-guide-tour-tooltip {
      transform: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Park Guide Tour  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A "Take a Tour" button in the header launches a guided coach-mark
     *        walkthrough: a sequence of frosted popovers that spotlight the
     *        catalog, cart and Enhancement Manager, with dot progress and quiet
     *        Back / Next / Skip controls.
     * HOW    Docks a trigger button into Owl Park's .header-actions. Each step
     *        spotlights CONFIG.steps[].selector with a dimming outset-shadow ring
     *        and anchors a role="dialog" popover beside it (below, flipping above
     *        when it would overflow), repositioning on scroll/resize via rAF.
     *        The dialog traps focus; Esc / Skip / Done end the tour and restore
     *        focus to the trigger. No auto-start — it runs only when clicked.
     * HOSTS  Owl Park only: mounts solely where .header-actions exists and its
     *        step selectors resolve. No-op on the zoo ViewItems page and generic
     *        hosts (no header-actions, no matching anchors).
     * ===================================================================== */

    var FEATURE_ID = "park-guide-tour";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      buttonLabel: "🧭 Take a Tour", // header trigger copy
      startDelayMs: 0, // delay before the first step appears (0 = immediate)
      skipLabel: "Skip tour", // ghost control — ends the tour
      backLabel: "Back", // ghost control — previous step (hidden on step 1)
      nextLabel: "Next", // solid teal control — advance a step
      doneLabel: "Done", // solid teal control — shown on the last step
      // Ordered walkthrough. Each step spotlights `selector` and shows a
      // `title` + `body` in the popover, in this sequence.
      steps: [
        {
          selector: ".catalog-heading",
          title: "Browse the catalog",
          body: "Browse tickets and memberships here, and use the tabs below to filter.",
        },
        {
          selector: "#open-cart-btn",
          title: "Your cart",
          body: "Your cart lives here. Add a ticket or membership, then check out when ready.",
        },
        {
          selector: '.header-link[href="features-manager.html"]',
          title: "Enhancement Manager",
          body: "Toggle enhancements like this tour from the Enhancement Manager.",
        },
      ],
    };

    var STEPS = CONFIG.steps;
    var TITLE_ID = "owlpark-pgt-title";

    var tourBtn = null;
    var highlightEl = null;
    var tooltipEl = null;
    var stepIndex = -1;
    var repositionFrame = 0;
    var anchoredGeometry = "";
    var keyHandler = null;
    var lastFocus = null;
    var startTimer = 0;

    function geometryKey(rect) {
      return [
        rect.top,
        rect.left,
        rect.width,
        rect.height,
        window.innerWidth,
        window.innerHeight,
      ].join("|");
    }

    function positionOn(el, target) {
      var rect = target.getBoundingClientRect();
      el.style.top = rect.top - 6 + "px";
      el.style.left = rect.left - 6 + "px";
      el.style.width = rect.width + 12 + "px";
      el.style.height = rect.height + 12 + "px";
      if (el === highlightEl) anchoredGeometry = geometryKey(rect);
    }

    function positionTooltip(target) {
      if (!tooltipEl) return;
      var rect = target.getBoundingClientRect();
      var margin = 12;
      var tipW = tooltipEl.offsetWidth || 300;
      var tipH = tooltipEl.offsetHeight || 170;
      var top = rect.bottom + margin;
      if (top + tipH > window.innerHeight - margin) {
        var above = rect.top - tipH - margin;
        top = above >= margin
          ? above
          : Math.max(margin, window.innerHeight - tipH - margin);
      }
      var maxLeft = Math.max(margin, window.innerWidth - tipW - margin);
      var left = Math.min(Math.max(rect.left, margin), maxLeft);
      tooltipEl.style.top = top + "px";
      tooltipEl.style.left = left + "px";
    }

    function applyReposition() {
      repositionFrame = 0;
      if (stepIndex < 0 || !highlightEl || !tooltipEl) return;
      var target = document.querySelector(STEPS[stepIndex].selector);
      if (!target) return;
      if (geometryKey(target.getBoundingClientRect()) === anchoredGeometry) return;
      highlightEl.classList.add("pgt-instant");
      positionOn(highlightEl, target);
      positionTooltip(target);
    }

    function repositionStep() {
      if (repositionFrame) return;
      repositionFrame = window.requestAnimationFrame(applyReposition);
    }

    // ----- Focus trap + Esc (role="dialog" aria-modal semantics) ----------
    function focusable() {
      if (!tooltipEl) return [];
      return [].slice.call(tooltipEl.querySelectorAll("button:not([disabled])"));
    }

    function onKey(e) {
      if (e.key === "Escape" || e.key === "Esc") {
        e.preventDefault();
        endTour();
        return;
      }
      if (e.key === "Tab") {
        var f = focusable();
        if (!f.length) return;
        var first = f[0];
        var last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        } else if (f.indexOf(document.activeElement) === -1) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function endTour() {
      stepIndex = -1;
      anchoredGeometry = "";
      if (startTimer) {
        window.clearTimeout(startTimer);
        startTimer = 0;
      }
      if (repositionFrame) {
        window.cancelAnimationFrame(repositionFrame);
        repositionFrame = 0;
      }
      window.removeEventListener("scroll", repositionStep);
      window.removeEventListener("resize", repositionStep);
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      if (highlightEl) {
        highlightEl.remove();
        highlightEl = null;
      }
      if (tooltipEl) {
        tooltipEl.remove();
        tooltipEl = null;
      }
      if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      lastFocus = null;
    }

    function renderTooltip(i) {
      var step = STEPS[i];
      var isLast = i === STEPS.length - 1;
      var isFirst = i === 0;

      var dots = "";
      for (var d = 0; d < STEPS.length; d++) {
        dots += '<span class="pgt-dot' + (d === i ? " is-active" : "") + '"></span>';
      }

      tooltipEl.setAttribute("aria-labelledby", TITLE_ID);
      tooltipEl.innerHTML =
        '<div class="pgt-progress" role="img" aria-label="Step ' +
        (i + 1) +
        " of " +
        STEPS.length +
        '">' +
        dots +
        "</div>" +
        '<div class="pgt-title" id="' +
        TITLE_ID +
        '">' +
        step.title +
        "</div>" +
        '<div class="pgt-body">' +
        step.body +
        "</div>" +
        '<div class="pgt-actions">' +
        '<button type="button" class="pgt-skip">' +
        CONFIG.skipLabel +
        "</button>" +
        '<div class="pgt-nav">' +
        (isFirst
          ? ""
          : '<button type="button" class="pgt-back">' + CONFIG.backLabel + "</button>") +
        '<button type="button" class="pgt-next">' +
        (isLast ? CONFIG.doneLabel : CONFIG.nextLabel) +
        "</button>" +
        "</div></div>";

      tooltipEl.querySelector(".pgt-skip").addEventListener("click", endTour);
      tooltipEl.querySelector(".pgt-next").addEventListener("click", function () {
        showStep(i + 1);
      });
      var backBtn = tooltipEl.querySelector(".pgt-back");
      if (backBtn) {
        backBtn.addEventListener("click", function () {
          showStep(i - 1);
        });
      }
    }

    function showStep(i) {
      if (i < 0) return;
      if (i >= STEPS.length) {
        endTour();
        return;
      }
      var step = STEPS[i];
      var target = document.querySelector(step.selector);
      if (!target) {
        showStep(i + 1);
        return;
      }
      stepIndex = i;

      var rect = target.getBoundingClientRect();
      if (rect.top < 0 || rect.bottom > window.innerHeight) {
        target.scrollIntoView({ block: "center" });
      }

      if (!highlightEl) {
        highlightEl = document.createElement("div");
        highlightEl.className = "owlpark-feat-park-guide-tour-highlight";
        highlightEl.setAttribute("data-owlpark-feature", FEATURE_ID);
        highlightEl.setAttribute("aria-hidden", "true");
        document.body.appendChild(highlightEl);
      }
      var fresh = false;
      if (!tooltipEl) {
        fresh = true;
        tooltipEl = document.createElement("div");
        tooltipEl.className = "owlpark-feat-park-guide-tour-tooltip";
        tooltipEl.setAttribute("data-owlpark-feature", FEATURE_ID);
        tooltipEl.setAttribute("role", "dialog");
        tooltipEl.setAttribute("aria-modal", "true");
        document.body.appendChild(tooltipEl);
      }

      highlightEl.classList.remove("pgt-instant");
      positionOn(highlightEl, target);
      renderTooltip(i);
      positionTooltip(target);

      var nextBtn = tooltipEl.querySelector(".pgt-next");
      if (nextBtn) nextBtn.focus();

      if (fresh) {
        window.requestAnimationFrame(function () {
          if (tooltipEl) tooltipEl.classList.add("pgt-in");
        });
      }
    }

    function startTour() {
      endTour();
      lastFocus = document.activeElement;
      window.addEventListener("scroll", repositionStep, { passive: true });
      window.addEventListener("resize", repositionStep);
      keyHandler = onKey;
      document.addEventListener("keydown", keyHandler);
      if (CONFIG.startDelayMs > 0) {
        startTimer = window.setTimeout(function () {
          startTimer = 0;
          showStep(0);
        }, CONFIG.startDelayMs);
      } else {
        showStep(0);
      }
    }

    function activate() {
      var actions = document.querySelector(".header-actions");
      if (!actions) return;

      tourBtn = document.createElement("button");
      tourBtn.type = "button";
      tourBtn.className = "owlpark-feat-park-guide-tour-btn";
      tourBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
      tourBtn.setAttribute("aria-haspopup", "dialog");
      tourBtn.textContent = CONFIG.buttonLabel;
      tourBtn.addEventListener("click", startTour);
      actions.prepend(tourBtn);
    }

    function deactivate() {
      endTour();
      if (tourBtn) {
        tourBtn.removeEventListener("click", startTour);
        tourBtn.remove();
        tourBtn = null;
      }
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
