    "id": "membership-upsell-modal",
    "name": "Membership Upsell Modal",
    "description": "Suggests a membership upgrade when a ticket-only cart builds up.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }

<script>
  (function () {
    /* =========================================================================
     * Membership Upsell Modal  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A calm, frosted dialog that invites a guest to consider an annual
     *        membership once their cart is ticket-only and holds enough tickets
     *        that a pass would start to pay off.
     * HOW    Polls localStorage("owl-park-cart") on an interval; when every line
     *        is a ticket and the ticket count meets CONFIG.minTicketQty, it opens
     *        once per session. Ticket categories are read from data/products.json.
     *        The dialog fades/scales in, traps focus, closes on Esc / scrim / × /
     *        primary action, and restores focus to whatever was focused before.
     * HOSTS  Owl Park storefront (its cart model + products.json). No-ops where
     *        that cart/data isn't present (e.g. the zoo ticket-selection page).
     * ===================================================================== */

    var FEATURE_ID = "membership-upsell-modal";
    var TITLE_ID = "owlpark-membership-upsell-modal-title";
    var CART_STORAGE_KEY = "owl-park-cart";

    // ----- Configuration --------------------------------------------------
    var CONFIG = {
      // Trigger: open once the cart holds ONLY tickets and at least this many.
      minTicketQty: 2,
      pollMs: 2000, // how often to re-check the cart for the trigger condition
      icon: "🦉", // small accent above the headline ("" to hide it)
      title: "Visiting more than once this year?",
      body:
        "A Family Membership pays for itself after just 2 visits — plus " +
        "unlimited return trips all year long.",
      ctaLabel: "Explore memberships", // the single teal primary pill
      dismissLabel: "Dismiss", // accessible name for the corner × control
    };

    var pollIntervalId = null;
    var overlayEl = null;
    var shownThisSession = false;
    var products = [];
    var lastCartSnapshot = "";
    var lastFocus = null;
    var keyHandler = null;

    function readCartLines() {
      try {
        var raw = localStorage.getItem(CART_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    // ----- Modal dialog ---------------------------------------------------
    function focusable() {
      if (!overlayEl) return [];
      return [].slice.call(
        overlayEl.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])'),
      );
    }

    function onKey(e) {
      if (e.key === "Escape" || e.key === "Esc") {
        e.preventDefault();
        closeModal();
        return;
      }
      if (e.key === "Tab") {
        var f = focusable();
        if (!f.length) return;
        var first = f[0];
        var last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function showModal() {
      if (overlayEl) return;
      shownThisSession = true;
      lastFocus = document.activeElement;

      overlayEl = document.createElement("div");
      overlayEl.className = "owlpark-feat-membership-upsell-modal-overlay";
      overlayEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlayEl.setAttribute("role", "dialog");
      overlayEl.setAttribute("aria-modal", "true");
      overlayEl.setAttribute("aria-labelledby", TITLE_ID);

      var iconHtml = CONFIG.icon
        ? '<div class="owlpark-feat-membership-upsell-modal-icon" aria-hidden="true">' +
          CONFIG.icon +
          "</div>"
        : "";
      overlayEl.innerHTML =
        '<div class="owlpark-feat-membership-upsell-modal-card">' +
        '<button type="button" class="owlpark-feat-membership-upsell-modal-x" aria-label="' +
        CONFIG.dismissLabel +
        '">&times;</button>' +
        iconHtml +
        '<h3 id="' +
        TITLE_ID +
        '">' +
        CONFIG.title +
        "</h3>" +
        "<p>" +
        CONFIG.body +
        "</p>" +
        '<div><button type="button" class="owlpark-feat-membership-upsell-modal-cta">' +
        CONFIG.ctaLabel +
        "</button></div>" +
        "</div>";
      document.body.appendChild(overlayEl);

      overlayEl
        .querySelector(".owlpark-feat-membership-upsell-modal-cta")
        .addEventListener("click", closeModal);
      overlayEl
        .querySelector(".owlpark-feat-membership-upsell-modal-x")
        .addEventListener("click", closeModal);
      overlayEl.addEventListener("click", function (e) {
        if (e.target === overlayEl) closeModal();
      });
      keyHandler = onKey;
      document.addEventListener("keydown", keyHandler);

      requestAnimationFrame(function () {
        if (overlayEl) overlayEl.classList.add("is-open");
        var x =
          overlayEl && overlayEl.querySelector(".owlpark-feat-membership-upsell-modal-x");
        if (x) x.focus();
      });
    }

    function closeModal() {
      if (!overlayEl) return;
      var el = overlayEl;
      overlayEl = null;
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      el.classList.remove("is-open");
      setTimeout(function () {
        el.remove();
      }, 180);
      if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      lastFocus = null;
    }

    // ----- Trigger --------------------------------------------------------
    function checkCart() {
      if (shownThisSession) return;
      var lines = readCartLines();
      if (lines.length === 0) return;

      var ticketLines = lines.filter(function (line) {
        var p = products.find(function (prod) {
          return prod.id === line.id;
        });
        return p && p.category === "ticket";
      });
      var allTickets = ticketLines.length === lines.length;
      var ticketQty = ticketLines.reduce(function (sum, l) {
        return sum + l.qty;
      }, 0);

      if (allTickets && ticketQty >= CONFIG.minTicketQty) {
        showModal();
      }
    }

    function pollCart() {
      var snapshot = localStorage.getItem(CART_STORAGE_KEY) || "";
      if (snapshot !== lastCartSnapshot) {
        lastCartSnapshot = snapshot;
        checkCart();
      }
    }

    function activate() {
      shownThisSession = false;
      lastCartSnapshot = localStorage.getItem(CART_STORAGE_KEY) || "";
      fetch("data/products.json")
        .then(function (res) {
          return res.json();
        })
        .then(function (data) {
          products = data;
          checkCart();
        });
      pollIntervalId = setInterval(pollCart, CONFIG.pollMs);
    }

    function deactivate() {
      if (pollIntervalId) {
        clearInterval(pollIntervalId);
        pollIntervalId = null;
      }
      closeModal();
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
