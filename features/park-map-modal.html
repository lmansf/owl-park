<script type="application/json" data-owlpark-manifest>
  {
    "id": "park-map-modal",
    "name": "Park Map Modal",
    "description": "Opens a simple illustrated park map in a modal.",
    "category": "visual",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-park-map-modal-link {
    background: transparent;
    border: none;
    color: white;
    text-decoration: underline;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.4rem 0.5rem;
  }
  .owlpark-feat-park-map-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 30, 32, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 65;
    padding: 1rem;
  }
  .owlpark-feat-park-map-modal-card {
    background: white;
    border-radius: var(--radius-lg, 14px);
    padding: 1.4rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    text-align: center;
  }
  .owlpark-feat-park-map-modal-card h3 {
    margin-top: 0;
    color: var(--cove-teal-dark, #0a4d55);
  }
  .owlpark-feat-park-map-modal-card svg {
    width: 100%;
    height: auto;
    background: #eef6ec;
    border-radius: 10px;
  }
  .owlpark-feat-park-map-modal-close {
    margin-top: 1rem;
    background: var(--cove-teal, #0f6f7a);
    color: white;
    border: none;
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
  }
</style>

<script>
  (function () {
    var FEATURE_ID = "park-map-modal";
    var linkBtn = null;
    var overlayEl = null;

    var MAP_SVG =
      '<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">' +
      '<rect width="300" height="200" fill="#eef6ec"/>' +
      '<circle cx="70" cy="60" r="28" fill="#cfe8c9"/><text x="70" y="64" font-size="10" text-anchor="middle">Canopy Walk</text>' +
      '<circle cx="220" cy="55" r="28" fill="#cfe8c9"/><text x="220" y="59" font-size="10" text-anchor="middle">Barn Owl Loft</text>' +
      '<circle cx="150" cy="130" r="32" fill="#f7dfc0"/><text x="150" y="126" font-size="10" text-anchor="middle">Aviary</text>' +
      '<text x="150" y="142" font-size="10" text-anchor="middle">Plaza</text>' +
      '<circle cx="50" cy="160" r="24" fill="#dce8f5"/><text x="50" y="164" font-size="9" text-anchor="middle">Entrance</text>' +
      '<circle cx="250" cy="160" r="24" fill="#dce8f5"/><text x="250" y="164" font-size="9" text-anchor="middle">Gift Shop</text>' +
      '<path d="M50,160 L150,130 L220,55" stroke="#0f6f7a" stroke-width="3" fill="none"/>' +
      '<path d="M150,130 L250,160" stroke="#0f6f7a" stroke-width="3" fill="none"/>' +
      '<path d="M150,130 L70,60" stroke="#0f6f7a" stroke-width="3" fill="none"/>' +
      "</svg>";

    function removeOverlay() {
      if (overlayEl) {
        overlayEl.remove();
        overlayEl = null;
      }
    }

    function openMap() {
      if (overlayEl) return;
      overlayEl = document.createElement("div");
      overlayEl.className = "owlpark-feat-park-map-modal-overlay";
      overlayEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlayEl.innerHTML =
        '<div class="owlpark-feat-park-map-modal-card">' +
        "<h3>🗺️ Owl Park Map</h3>" +
        MAP_SVG +
        '<button type="button" class="owlpark-feat-park-map-modal-close">Close</button>' +
        "</div>";
      document.body.appendChild(overlayEl);
      overlayEl
        .querySelector(".owlpark-feat-park-map-modal-close")
        .addEventListener("click", removeOverlay);
      overlayEl.addEventListener("click", function (e) {
        if (e.target === overlayEl) removeOverlay();
      });
    }

    function activate() {
      var actions = document.querySelector(".header-actions");
      if (!actions) return;

      linkBtn = document.createElement("button");
      linkBtn.type = "button";
      linkBtn.className = "owlpark-feat-park-map-modal-link";
      linkBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
      linkBtn.textContent = "🗺️ Park Map";
      linkBtn.addEventListener("click", openMap);
      actions.prepend(linkBtn);
    }

    function deactivate() {
      removeOverlay();
      if (linkBtn) {
        linkBtn.removeEventListener("click", openMap);
        linkBtn.remove();
        linkBtn = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
