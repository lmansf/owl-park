<script type="application/json" data-owlpark-manifest>
  {
    "id": "park-map-modal",
    "name": "Park Map Modal",
    "description": "Opens a simple illustrated park map in a modal.",
    "category": "visual",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-park-map-modal-link {
    background: #0a4d55 !important;
    border: 1px solid rgba(255, 255, 255, 0.35) !important;
    color: #ffffff !important;
    text-decoration: none;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    min-height: 44px;
    box-sizing: border-box;
  }
  .owlpark-feat-park-map-modal-link:hover {
    background: #0c5b64 !important;
  }
  .owlpark-feat-park-map-modal-overlay {
    position: fixed;
    inset: 0;
    /* inset: 0 sizes this against the *large* viewport on iOS Safari, so 100% of
       it is taller than what you can see. 100dvh pins it to the visible one. */
    height: 100dvh;
    box-sizing: border-box;
    background: rgba(10, 30, 32, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 65;
    padding: calc(1rem + env(safe-area-inset-top, 0px))
      calc(1rem + env(safe-area-inset-right, 0px))
      calc(1rem + env(safe-area-inset-bottom, 0px))
      calc(1rem + env(safe-area-inset-left, 0px));
  }
  .owlpark-feat-park-map-modal-card {
    background: white;
    border-radius: var(--radius-lg, 14px);
    padding: 1.4rem;
    max-width: 480px;
    width: 100%;
    box-sizing: border-box;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    text-align: center;
    /* Cap to the overlay box — the visible viewport, minus its safe-area
       padding — so a short landscape screen can still reach Close. */
    max-height: 100%;
    overflow-y: auto;
  }
  .owlpark-feat-park-map-modal-card h3 {
    margin-top: 0;
    color: var(--cove-teal-dark, #0a4d55);
  }
  .owlpark-feat-park-map-modal-card svg {
    width: 100%;
    height: auto;
    background: #eef6ec;
    border-radius: 10px;
  }
  .owlpark-feat-park-map-modal-close {
    margin-top: 1rem;
    background: var(--cove-teal, #0f6f7a);
    color: white;
    border: none;
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    min-height: 44px;
  }
</style>

<script>
  (function () {
    var FEATURE_ID = "park-map-modal";
    var linkBtn = null;
    var overlayEl = null;

    // Host-agnostic mount point. Prefer the storefront's own header, but fall
    // back to a shared floating bar on <body> so this snippet still shows its
    // control when pasted anywhere in ANY page's body (not just Owl Park's).
    function owlparkFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (bar) return bar;
      bar = document.createElement("div");
      bar.id = "owlpark-fallback-actions";
      bar.setAttribute("data-owlpark-fallback", "actions");
      bar.style.cssText =
        "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
        "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
        "top:calc(10px + env(safe-area-inset-top, 0px));" +
        "right:calc(10px + env(safe-area-inset-right, 0px));" +
        "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
        "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
      var barStyle = document.createElement("style");
      barStyle.id = "owlpark-fallback-actions-style";
      barStyle.setAttribute("data-owlpark-fallback", "actions");
      barStyle.textContent =
        "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
        "{min-height:44px;box-sizing:border-box;}";
      document.head.appendChild(barStyle);
      document.body.appendChild(bar);
      return bar;
    }
    function owlparkPruneFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (!bar || bar.children.length) return;
      bar.remove();
      var barStyle = document.getElementById("owlpark-fallback-actions-style");
      if (barStyle) barStyle.remove();
    }

    var MAP_SVG =
      '<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">' +
      '<rect width="300" height="200" fill="#eef6ec"/>' +
      '<circle cx="70" cy="60" r="28" fill="#cfe8c9"/><text x="70" y="64" font-size="10" text-anchor="middle">Canopy Walk</text>' +
      '<circle cx="220" cy="55" r="28" fill="#cfe8c9"/><text x="220" y="59" font-size="10" text-anchor="middle">Barn Owl Loft</text>' +
      '<circle cx="150" cy="130" r="32" fill="#f7dfc0"/><text x="150" y="126" font-size="10" text-anchor="middle">Aviary</text>' +
      '<text x="150" y="142" font-size="10" text-anchor="middle">Plaza</text>' +
      '<circle cx="50" cy="160" r="24" fill="#dce8f5"/><text x="50" y="164" font-size="9" text-anchor="middle">Entrance</text>' +
      '<circle cx="250" cy="160" r="24" fill="#dce8f5"/><text x="250" y="164" font-size="9" text-anchor="middle">Gift Shop</text>' +
      '<path d="M50,160 L150,130 L220,55" stroke="#0f6f7a" stroke-width="3" fill="none"/>' +
      '<path d="M150,130 L250,160" stroke="#0f6f7a" stroke-width="3" fill="none"/>' +
      '<path d="M150,130 L70,60" stroke="#0f6f7a" stroke-width="3" fill="none"/>' +
      "</svg>";

    function removeOverlay() {
      if (overlayEl) {
        overlayEl.remove();
        overlayEl = null;
      }
    }

    function openMap() {
      if (overlayEl) return;
      overlayEl = document.createElement("div");
      overlayEl.className = "owlpark-feat-park-map-modal-overlay";
      overlayEl.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlayEl.innerHTML =
        '<div class="owlpark-feat-park-map-modal-card">' +
        "<h3>🗺️ Owl Park Map</h3>" +
        MAP_SVG +
        '<button type="button" class="owlpark-feat-park-map-modal-close">Close</button>' +
        "</div>";
      document.body.appendChild(overlayEl);
      overlayEl
        .querySelector(".owlpark-feat-park-map-modal-close")
        .addEventListener("click", removeOverlay);
      overlayEl.addEventListener("click", function (e) {
        if (e.target === overlayEl) removeOverlay();
      });
    }

    function activate() {
      // Dock into the zoo web store's sub-header first, then Owl Park's header,
      // then a floating bar if pasted into any other page body.
      var actions =
        document.querySelector(".view-cart") ||
        document.querySelector("#sub-header") ||
        document.querySelector(".header-actions") ||
        owlparkFallbackBar();

      linkBtn = document.createElement("button");
      linkBtn.type = "button";
      linkBtn.className = "owlpark-feat-park-map-modal-link";
      linkBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
      linkBtn.textContent = "🗺️ Park Map";
      linkBtn.addEventListener("click", openMap);
      actions.prepend(linkBtn);
    }

    function deactivate() {
      removeOverlay();
      if (linkBtn) {
        linkBtn.removeEventListener("click", openMap);
        linkBtn.remove();
        linkBtn = null;
      }
      owlparkPruneFallbackBar();
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
