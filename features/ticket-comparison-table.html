  {
    "id": "ticket-comparison-table",
    "name": "Ticket Comparison Table",
    "description": "Side-by-side comparison table of every ticket and membership.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false

  .owlpark-feat-ticket-comparison-table-overlay {
    position: fixed;
    inset: 0;
    /* inset:0 sizes against iOS Safari's *large* viewport, dropping the bottom
       edge (and its safe-area padding) below what you can see; 100dvh pins it to

    box-sizing: border-box;

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;

      transform 0.2s cubic-bezier(0.2, 0.6, 0.2, 1),
      opacity 0.2s ease;
  }
  .owlpark-feat-ticket-comparison-table-overlay.is-open
    .owlpark-feat-ticket-comparison-table-card {
    transform: scale(1);

  .owlpark-feat-ticket-comparison-table-title {
    flex: 0 0 auto;
    margin: 0 2rem 1.25rem 0;

  }
  /* Wide table pans inside its own scroller, so the title and the Close pill
     stay put and the page body never scrolls sideways. */

    flex: 1 1 auto;
    min-height: 0;
    overflow-x: auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;

  .owlpark-feat-ticket-comparison-table-card table {

    /* Five columns can't be read at 340px; keep a legible width and pan. */

  }
  .owlpark-feat-ticket-comparison-table-card th,
  .owlpark-feat-ticket-comparison-table-card td {

  .owlpark-feat-ticket-comparison-table-card thead th {
    position: sticky;

  .owlpark-feat-ticket-comparison-table-card tbody td {

  .owlpark-feat-ticket-comparison-table-card tbody tr:last-child td {
    border-bottom: none;
  }
  /* The one restrained accent: the ticket name reads in ink, and the price — the
     value you actually compare — in quiet teal. */
  .owlpark-feat-ticket-comparison-table-card
    tbody
    td.owlpark-feat-ticket-comparison-table-col-name {
    color: #17211f;
    font-weight: 600;

  .owlpark-feat-ticket-comparison-table-card
    tbody

  .owlpark-feat-ticket-comparison-table-x {

    top: 0.9rem;

    display: flex;

  .owlpark-feat-ticket-comparison-table-x:hover {

  .owlpark-feat-ticket-comparison-table-close {

    display: inline-flex;

    background: #0f6f7a;

    background: #0c5f69;
    transform: translateY(-1px);

  @media (prefers-color-scheme: dark) {
    .owlpark-feat-ticket-comparison-table-card {
      background: #12181a;
      border-color: rgba(255, 255, 255, 0.1);

    }
    .owlpark-feat-ticket-comparison-table-title {

    }
    .owlpark-feat-ticket-comparison-table-card th,
    .owlpark-feat-ticket-comparison-table-card td {

    .owlpark-feat-ticket-comparison-table-card thead th {

    }
    .owlpark-feat-ticket-comparison-table-card tbody td {

    }
    .owlpark-feat-ticket-comparison-table-card
      tbody
      td.owlpark-feat-ticket-comparison-table-col-name {
      color: #e9edec;
    }
    .owlpark-feat-ticket-comparison-table-card
      tbody
      td.owlpark-feat-ticket-comparison-table-col-price {
      color: #5bc7cf;
    }
    .owlpark-feat-ticket-comparison-table-x {
      color: #98a4a1;
    }
    .owlpark-feat-ticket-comparison-table-x:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e9edec;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-ticket-comparison-table-overlay,
    .owlpark-feat-ticket-comparison-table-card,
    .owlpark-feat-ticket-comparison-table-btn,
    .owlpark-feat-ticket-comparison-table-close,
    .owlpark-feat-ticket-comparison-table-x {
      transition: none;
    }
    .owlpark-feat-ticket-comparison-table-card {
      transform: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Ticket Comparison Table  ·  utility
     * -------------------------------------------------------------------------
     * WHAT   A docked "⚖️ Compare" button that opens an accessible modal holding
     *        a side-by-side table of every ticket / membership the store sells.
     * HOW    Derives its rows from the store's LIVE rows via owlHost() (the zoo
     *        web store ships no products.json); on Owl Park it fetches
     *        data/products.json but never blocks on it (.catch → live rows).
     *        Docks into Owl Park's stable .catalog-heading, else a self-owned
     *        floating bar that survives host re-renders via a 1s watchdog. The
     *        dialog fades/scales in, traps focus, closes on Esc / scrim / × /
     *        Close, and restores focus to the opener.
     * HOSTS  Zoo ViewItems + Owl Park + generic. Only categories that have a
     *        storefront tab are compared; with no tabs, nothing is filtered. If
     *        no data source resolves at all, the button shows "Compare
     *        unavailable" and disables itself.
     * ===================================================================== */

    var FEATURE_ID = "ticket-comparison-table";

    // ----- Configuration --------------------------------------------------
    var CONFIG = {
      buttonLabel: "⚖️ Compare", // docked control text
      unavailableLabel: "⚖️ Compare unavailable", // button text if no data source resolves
      titleIcon: "⚖️", // decorative icon prefixed to the modal title
      title: "Compare Tickets & Memberships", // modal heading + dialog aria-label
      // Columns rendered left→right. `key` selects the field on each derived row
      // object (built from the live store rows); `label` is the column header.
      // Editing labels / order / which columns appear is safe — the values still
      // come from the live rows. "name" renders emoji+name; "price" is formatted
      // and carries the single teal accent.
      columns: [
        { key: "name", label: "Name" },
        { key: "category", label: "Category" },
        { key: "price", label: "Price" },
        { key: "unit", label: "Unit" },
        { key: "plu", label: "PLU" },
      ],
    };

    var compareBtn = null;
    var overlayEl = null;
    var products = null;
    var watchdogId = null;
    var lastFocus = null;
    var keyHandler = null;

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();

    // Build the comparison list from the live rows of whatever store we're on —
    // the zoo web store has no products.json feed, so read its PLU rows directly.
    function rowsToList() {
      return H.rows().map(function (r) {
        var name = H.rowName(r);
        return {
          name: name,
          category: /member/i.test(name) ? "membership" : "ticket",
          price: H.rowPrice(r),
          unit: "",
          plu: H.rowId(r),
          emoji: "🎟️",
        };
      });
    }

    function formatPrice(price) {
      return typeof price === "number" && isFinite(price)
        ? "$" + price.toFixed(2)
        : "—";
    }

    // Displayed text for one cell — preserves the exact per-column formatting:
    // name is emoji+name, price is formatted, everything else is the raw field.
    function cellText(p, key) {
      if (key === "name") return (p.emoji || "") + " " + (p.name || "");
      if (key === "price") return formatPrice(p.price);
      var v = p[key];
      return v == null ? "" : v;
    }

    function buildRow(p) {
      var tr = document.createElement("tr");
      CONFIG.columns.forEach(function (col) {
        var td = document.createElement("td");
        td.className = "owlpark-feat-ticket-comparison-table-col-" + col.key;
        td.textContent = cellText(p, col.key);
        tr.appendChild(td);
      });
      return tr;
    }

    /**
     * The categories the storefront actually sells from its tabs — the same list `renderCatalog()`
     * derives, so a catalog category with no tab (the add-ons a feature attaches from the cart) is not
     * offered for comparison in a table headed "Compare Tickets & Memberships", where it cannot be
     * bought. With no tabs on the page, nothing is filtered out.
     */
    function shoppableCategories() {
      var tabs = document.querySelectorAll(".tab-btn[data-filter]");
      if (!tabs.length) return null;
      var categories = [];
      tabs.forEach(function (tab) {
        var filter = tab.getAttribute("data-filter");
        if (filter && filter !== "all") categories.push(filter);
      });
      return categories.length ? categories : null;
    }

    function comparable(list) {
      var categories = shoppableCategories();
      var products = Array.isArray(list) ? list : [];
      if (!categories) return products;
      return products.filter(function (p) {
        return p && categories.indexOf(p.category) !== -1;
      });
    }

    // ----- Modal dialog ---------------------------------------------------
    function focusable() {
      if (!overlayEl) return [];
      return [].slice.call(
        overlayEl.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])'),
      );
    }

    function onKey(e) {
      if (e.key === "Escape" || e.key === "Esc") {
        e.preventDefault();
        closeOverlay();
        return;
      }
      if (e.key === "Tab") {
        var f = focusable();
        if (!f.length) return;
        var first = f[0];
        var last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function showOverlay(list) {
      lastFocus = document.activeElement;
      var overlay = document.createElement("div");
      overlay.className = "owlpark-feat-ticket-comparison-table-overlay";
      overlay.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlay.setAttribute("role", "dialog");
      overlay.setAttribute("aria-modal", "true");
      overlay.setAttribute("aria-label", CONFIG.title);
      overlay.innerHTML =
        '<div class="owlpark-feat-ticket-comparison-table-card">' +
        '<button type="button" class="owlpark-feat-ticket-comparison-table-x" aria-label="Close">&times;</button>' +
        '<h3 class="owlpark-feat-ticket-comparison-table-title"></h3>' +
        '<div class="owlpark-feat-ticket-comparison-table-scroll">' +
        "<table><thead><tr></tr></thead><tbody></tbody></table>" +
        "</div>" +
        '<div class="owlpark-feat-ticket-comparison-table-actions">' +
        '<button type="button" class="owlpark-feat-ticket-comparison-table-close">Close</button>' +
        "</div>" +
        "</div>";
      overlay.querySelector(".owlpark-feat-ticket-comparison-table-title").textContent =
        (CONFIG.titleIcon ? CONFIG.titleIcon + " " : "") + CONFIG.title;
      var headRow = overlay.querySelector("thead tr");
      CONFIG.columns.forEach(function (col) {
        var th = document.createElement("th");
        th.className = "owlpark-feat-ticket-comparison-table-col-" + col.key;
        th.textContent = col.label;
        headRow.appendChild(th);
      });
      var tbody = overlay.querySelector("tbody");
      comparable(list).forEach(function (p) {
        if (p && typeof p === "object") tbody.appendChild(buildRow(p));
      });
      document.body.appendChild(overlay);

      overlay
        .querySelector(".owlpark-feat-ticket-comparison-table-close")
        .addEventListener("click", closeOverlay);
      overlay
        .querySelector(".owlpark-feat-ticket-comparison-table-x")
        .addEventListener("click", closeOverlay);
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) closeOverlay();
      });
      keyHandler = onKey;
      document.addEventListener("keydown", keyHandler);
      overlayEl = overlay;

      requestAnimationFrame(function () {
        if (overlayEl) overlayEl.classList.add("is-open");
        var x = overlayEl && overlayEl.querySelector(".owlpark-feat-ticket-comparison-table-x");
        if (x) x.focus();
      });
    }

    function closeOverlay() {
      if (!overlayEl) return;
      var el = overlayEl;
      overlayEl = null;
      if (keyHandler) {
        document.removeEventListener("keydown", keyHandler);
        keyHandler = null;
      }
      el.classList.remove("is-open");
      setTimeout(function () {
        el.remove();
      }, 180);
      if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
      lastFocus = null;
    }

    function openCompare() {
      if (overlayEl) return;
      if (products) {
        showOverlay(products);
        return;
      }
      // The zoo web store has no products.json — compare its live PLU rows.
      if (H.isZoo()) {
        showOverlay(rowsToList());
        return;
      }
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (data) {
          products = data;
          showOverlay(products);
        })
        .catch(function (err) {
          console.error("[" + FEATURE_ID + "] failed to load products", err);
          var list = rowsToList();
          if (list.length) {
            showOverlay(list);
          } else if (compareBtn) {
            compareBtn.textContent = CONFIG.unavailableLabel;
            compareBtn.disabled = true;
          }
        });
    }

    // ----- Docked button (host-agnostic mount + watchdog) -----------------
    // Owl Park's catalog heading is stable, so dock there. On any OTHER store the
    // heading is a re-rendered template region, so use the self-owned floating
    // bar (a direct child of <body>) which survives the host re-rendering itself.
    function resolveDock() {
      return document.querySelector(".catalog-heading") || H.fallbackBar();
    }

    function ensureButton() {
      if (compareBtn && compareBtn.isConnected) return;
      compareBtn = document.createElement("button");
      compareBtn.type = "button";
      compareBtn.className = "owlpark-feat-ticket-comparison-table-btn";
      compareBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
      compareBtn.setAttribute("aria-haspopup", "dialog");
      compareBtn.textContent = CONFIG.buttonLabel;
      compareBtn.addEventListener("click", openCompare);
      resolveDock().appendChild(compareBtn);
    }

    // Relocate the <style> to <head> so it survives a host wiping the body region
    // where a standalone-pasted snippet would otherwise sit.
    function ensureStyleInHead() {
      var st = document.getElementById("owlpark-ticket-comparison-table-style");
      if (st && st.parentElement !== document.head) document.head.appendChild(st);
    }

    function activate() {
      ensureStyleInHead();
      ensureButton();
      // Re-assert the control if the host removes or replaces it after load
      // (body reveal, template re-render); cheap isConnected check.
      watchdogId = setInterval(ensureButton, 1000);
    }

    function deactivate() {
      if (watchdogId) {
        clearInterval(watchdogId);
        watchdogId = null;
      }
      closeOverlay();
      if (compareBtn) {
        compareBtn.removeEventListener("click", openCompare);
        compareBtn.remove();
        compareBtn = null;
      }
      H.pruneBar();
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
