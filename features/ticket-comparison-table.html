<script type="application/json" data-owlpark-manifest>
  {
    "id": "ticket-comparison-table",
    "name": "Ticket Comparison Table",
    "description": "Side-by-side comparison table of every ticket and membership.",
    "category": "utility",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-ticket-comparison-table-btn {
    background: white;
    border: 1px solid var(--cove-border, #e4ddca);
    color: var(--cove-teal-dark, #0a4d55);
    border-radius: 999px;
    padding: 0.4rem 0.9rem;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    margin-left: auto;
    min-height: 44px;
  }
  .owlpark-feat-ticket-comparison-table-btn:hover {
    background: var(--cove-sand, #faf3e6);
  }
  .owlpark-feat-ticket-comparison-table-overlay {
    position: fixed;
    inset: 0;
    /* inset: 0 sizes this against the *large* viewport on iOS Safari, so its
       bottom edge — and the safe-area padding on it — lands below what you can
       see. 100dvh pins it to the visible viewport. */
    height: 100dvh;
    box-sizing: border-box;
    background: rgba(10, 30, 32, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 65;
    padding: calc(1rem + env(safe-area-inset-top, 0px))
      calc(1rem + env(safe-area-inset-right, 0px))
      calc(1rem + env(safe-area-inset-bottom, 0px))
      calc(1rem + env(safe-area-inset-left, 0px));
  }
  .owlpark-feat-ticket-comparison-table-card {
    background: white;
    border-radius: var(--radius-lg, 14px);
    padding: 1.4rem;
    max-width: 720px;
    width: 100%;
    box-sizing: border-box;
    max-height: 80vh;
    max-height: 80dvh;
    overflow-x: hidden;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
  }
  .owlpark-feat-ticket-comparison-table-card h3 {
    margin-top: 0;
    color: var(--cove-teal-dark, #0a4d55);
  }
  /* Wide content scrolls inside its own container: the table pans here while the
     card keeps the heading and the Close button fixed on screen. */
  .owlpark-feat-ticket-comparison-table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .owlpark-feat-ticket-comparison-table-card table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    /* Five columns cannot be read in 340px, so let the table keep a legible
       width and pan rather than crushing every column to unreadable slivers. */
    min-width: 460px;
  }
  .owlpark-feat-ticket-comparison-table-card th,
  .owlpark-feat-ticket-comparison-table-card td {
    text-align: left;
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--cove-border, #e4ddca);
    vertical-align: top;
  }
  .owlpark-feat-ticket-comparison-table-card th {
    color: var(--cove-teal-dark, #0a4d55);
  }
  .owlpark-feat-ticket-comparison-table-close {
    margin-top: 1rem;
    background: var(--cove-teal, #0f6f7a);
    color: white;
    border: none;
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    min-height: 44px;
  }
</style>

<script>
  (function () {
    var FEATURE_ID = "ticket-comparison-table";
    var compareBtn = null;
    var overlayEl = null;
    var products = null;

    // Host-agnostic mount point. Prefer the storefront's own catalog heading,
    // but fall back to a shared floating bar on <body> so this snippet still
    // shows its control when pasted anywhere in ANY page's body.
    function owlparkFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (bar) return bar;
      bar = document.createElement("div");
      bar.id = "owlpark-fallback-actions";
      bar.setAttribute("data-owlpark-fallback", "actions");
      bar.style.cssText =
        "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
        "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
        "top:calc(10px + env(safe-area-inset-top, 0px));" +
        "right:calc(10px + env(safe-area-inset-right, 0px));" +
        "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
        "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
      var barStyle = document.createElement("style");
      barStyle.id = "owlpark-fallback-actions-style";
      barStyle.setAttribute("data-owlpark-fallback", "actions");
      barStyle.textContent =
        "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
        "{min-height:44px;box-sizing:border-box;}";
      document.head.appendChild(barStyle);
      document.body.appendChild(bar);
      return bar;
    }
    function owlparkPruneFallbackBar() {
      var bar = document.getElementById("owlpark-fallback-actions");
      if (!bar || bar.children.length) return;
      bar.remove();
      var barStyle = document.getElementById("owlpark-fallback-actions-style");
      if (barStyle) barStyle.remove();
    }

    function removeOverlay() {
      if (overlayEl) {
        overlayEl.remove();
        overlayEl = null;
      }
    }

    function formatPrice(price) {
      return typeof price === "number" && isFinite(price)
        ? "$" + price.toFixed(2)
        : "—";
    }

    function buildRow(p) {
      var tr = document.createElement("tr");
      [
        (p.emoji || "") + " " + (p.name || ""),
        p.category,
        formatPrice(p.price),
        p.unit,
        p.plu,
      ].forEach(function (value) {
        var td = document.createElement("td");
        td.textContent = value == null ? "" : value;
        tr.appendChild(td);
      });
      return tr;
    }

    function showOverlay(list) {
      var overlay = document.createElement("div");
      overlay.className = "owlpark-feat-ticket-comparison-table-overlay";
      overlay.setAttribute("data-owlpark-feature", FEATURE_ID);
      overlay.innerHTML =
        '<div class="owlpark-feat-ticket-comparison-table-card">' +
        "<h3>⚖️ Compare Tickets &amp; Memberships</h3>" +
        '<div class="owlpark-feat-ticket-comparison-table-scroll">' +
        "<table><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Unit</th><th>PLU</th></tr></thead>" +
        "<tbody></tbody></table>" +
        "</div>" +
        '<button type="button" class="owlpark-feat-ticket-comparison-table-close">Close</button>' +
        "</div>";
      var tbody = overlay.querySelector("tbody");
      (Array.isArray(list) ? list : []).forEach(function (p) {
        if (p && typeof p === "object") tbody.appendChild(buildRow(p));
      });
      document.body.appendChild(overlay);
      overlay
        .querySelector(".owlpark-feat-ticket-comparison-table-close")
        .addEventListener("click", removeOverlay);
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) removeOverlay();
      });
      overlayEl = overlay;
    }

    function openCompare() {
      if (overlayEl) return;
      if (products) {
        showOverlay(products);
        return;
      }
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (data) {
          products = data;
          showOverlay(products);
        })
        .catch(function (err) {
          console.error("[" + FEATURE_ID + "] failed to load products", err);
          if (compareBtn) {
            compareBtn.textContent = "⚖️ Compare unavailable";
            compareBtn.disabled = true;
          }
        });
    }

    function activate() {
      var heading =
        document.querySelector(".catalog-heading") || owlparkFallbackBar();

      compareBtn = document.createElement("button");
      compareBtn.type = "button";
      compareBtn.className = "owlpark-feat-ticket-comparison-table-btn";
      compareBtn.setAttribute("data-owlpark-feature", FEATURE_ID);
      compareBtn.textContent = "⚖️ Compare";
      compareBtn.addEventListener("click", openCompare);
      heading.appendChild(compareBtn);
    }

    function deactivate() {
      removeOverlay();
      if (compareBtn) {
        compareBtn.removeEventListener("click", openCompare);
        compareBtn.remove();
        compareBtn = null;
      }
      owlparkPruneFallbackBar();
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
