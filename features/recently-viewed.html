<div class="owlpark-feat-recently-viewed" id="recently-viewed-strip" hidden>
  <span class="rv-label">
    <span class="rv-icon" aria-hidden="true">👁</span>
    <span class="rv-title">Recently viewed</span>
  </span>
  <div class="rv-track" id="rv-chips" role="list" aria-label="Recently viewed products"></div>
</div>

<script>
  (function () {
    /* =========================================================================
     * Recently Viewed  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A slim, frosted strip that shows the shopper's recently viewed
     *        products as small thumbnail cards in a single horizontal row that
     *        scrolls inside its own container (the page body never scrolls).
     * HOW    Renders its own static markup (the loader mounts it). A capturing
     *        "mouseenter" listener on document records a product id whenever the
     *        pointer enters an Owl Park product row (CONFIG.rowSelector); the
     *        ordered id list persists in sessionStorage (CONFIG.storageKey,
     *        capped at CONFIG.maxItems). Each id resolves to an emoji + name from
     *        the cached CONFIG.productsUrl catalog and renders as a focusable card.
     * HOSTS  Owl Park storefront — its ".product-row" grid is the only view
     *        source. On the zoo ViewItems page (rows are "tr.pluRow", not
     *        ".product-row") and generic hosts nothing is recorded, so the strip
     *        stays empty and hidden.
     * ===================================================================== */

    var FEATURE_ID = "recently-viewed";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      heading: "Recently viewed", // quiet section heading shown at the strip's left
      maxItems: 5, // how many recently-viewed products to keep + show
      storageKey: "owl-park-recently-viewed", // sessionStorage key holding the ordered id list
      productsUrl: "data/products.json", // catalog source for a viewed product's emoji + name
      rowSelector: ".product-row[data-product-id]", // host product rows whose hover records a view
      idAttribute: "data-product-id", // attribute on a row that holds the product id
    };

    var productsCache = null;
    var mouseEnterHandler = null;

    function readViewed() {
      try {
        var raw = sessionStorage.getItem(CONFIG.storageKey);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function recordView(productId) {
      var ids = readViewed();
      ids = ids.filter(function (id) {
        return id !== productId;
      });
      ids.unshift(productId);
      ids = ids.slice(0, CONFIG.maxItems);
      sessionStorage.setItem(CONFIG.storageKey, JSON.stringify(ids));
      renderStrip();
    }

    function getProducts() {
      if (productsCache) return Promise.resolve(productsCache);
      return fetch(CONFIG.productsUrl)
        .then(function (res) {
          return res.json();
        })
        .then(function (data) {
          productsCache = data;
          return productsCache;
        });
    }

    function buildChip(p) {
      var item = document.createElement("span");
      item.className = "rv-item";
      item.setAttribute("role", "listitem");
      item.setAttribute("tabindex", "0");
      item.setAttribute("data-owlpark-feature", FEATURE_ID);
      item.setAttribute("aria-label", "Recently viewed: " + p.name);

      var thumb = document.createElement("span");
      thumb.className = "rv-thumb";
      thumb.setAttribute("aria-hidden", "true");
      thumb.textContent = p.emoji;

      var name = document.createElement("span");
      name.className = "rv-name";
      name.textContent = p.name;

      item.appendChild(thumb);
      item.appendChild(name);
      return item;
    }

    function renderStrip() {
      var strip = document.getElementById("recently-viewed-strip");
      var chipsEl = document.getElementById("rv-chips");
      if (!strip || !chipsEl) return Promise.resolve();

      var ids = readViewed();
      if (ids.length === 0) {
        strip.hidden = true;
        return Promise.resolve();
      }

      return getProducts().then(function (products) {
        chipsEl.textContent = "";
        ids.forEach(function (id) {
          var p = products.find(function (prod) {
            return prod.id === id;
          });
          if (!p) return;
          chipsEl.appendChild(buildChip(p));
        });
        strip.hidden = false;
      });
    }

    function activate() {
      var titleEl = document.querySelector("#recently-viewed-strip .rv-title");
      if (titleEl) titleEl.textContent = CONFIG.heading;

      renderStrip();
      // mouseenter doesn't bubble, but a capturing listener on document still
      // observes it as the event travels down to the actual target.
      mouseEnterHandler = function (event) {
        var row =
          event.target.closest &&
          event.target.closest(CONFIG.rowSelector);
        if (row) recordView(row.getAttribute(CONFIG.idAttribute));
      };
      document.addEventListener("mouseenter", mouseEnterHandler, true);
    }

    function deactivate() {
      if (mouseEnterHandler) {
        document.removeEventListener("mouseenter", mouseEnterHandler, true);
        mouseEnterHandler = null;
      }
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
