<script type="application/json" data-owlpark-manifest>
  {
    "id": "sticky-mini-cart-bar",
    "name": "Sticky Mini Cart Bar",
    "description": "Persistent floating mini-cart bar showing live item count and total.",
    "category": "visual",
    "enabledByDefault": true,
    "requiresReload": false
  }
</script>

<style id="owlpark-sticky-mini-cart-bar-style">
  .owlpark-feat-sticky-mini-cart-bar {
    position: fixed;
    /* Centred via auto margins rather than left:50% + translate(-50%): with
       left:50% the shrink-to-fit width is capped at *half* the viewport, which
       on a phone squeezed the running total out of the bar entirely.
       The 1rem here is the screen-edge gutter, and it is on the offsets rather
       than on a max-width so that it survives the widget rules below, which push
       ONE side further in: whichever side they do not touch keeps this gutter
       instead of falling back to the bare edge. The insets keep it off the notch
       when landscape safe areas are non-zero. */
    left: calc(1rem + env(safe-area-inset-left, 0px));
    right: calc(1rem + env(safe-area-inset-right, 0px));
    margin-inline: auto;
    width: fit-content;
    /* Lift clear of the iPhone home indicator, which would otherwise sit on
       top of this bar and swallow taps on "View Cart". */
    bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
    /* Sleek/minimal frosted skin: a near-white glass pill with ink text, a
       hairline border and a soft diffuse shadow. No host CSS vars — it must
       hold up pasted standalone into any store. */
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    backdrop-filter: blur(16px) saturate(1.4);
    color: #17211f;
    border: 1px solid rgba(17, 33, 31, 0.1);
    border-radius: 999px;
    padding: 0.6rem 0.6rem 0.6rem 1.1rem;
    box-shadow:
      0 6px 24px rgba(20, 40, 40, 0.09),
      0 14px 40px rgba(15, 30, 33, 0.12);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.86rem;
    font-weight: 600;
    letter-spacing: -0.005em;
    z-index: 40;
    box-sizing: border-box;
  }
  /* font-size-adjuster (bottom-right, ~158px wide) and keyboard-shortcuts-helper
     (bottom-left, 44px) pin controls into this same bottom band at the same
     1.2rem offset with a higher z-index, so on a narrow screen this bar runs
     underneath them and "View Cart" — at the bar's right end — lands under the
     adjuster, which silently absorbs the tap. So end the bar short of whichever
     of them is on the page and let the three share the band side by side. Moving
     the bar up is not an option: every offset above this one lands in some other
     module's band (the shortcuts panel opens at 4.9rem). Raising z-index is not
     one either — it would just move the dead zone onto them.
     At 375px with BOTH widgets enabled the two footprints leave ~135px between
     them, which is about the width of the "View Cart" button alone, so the
     running total ellipsizes down to nothing there. That is the trade: a
     tappable primary action over a legible total, and the item count is still on
     the header cart button. Only the widths where the footprints actually
     collide are touched — desktop is untouched, where the centred fit-content
     bar never reaches the corners anyway.
     Note these rules match the other two features by class name, so renaming
     either of their root elements silently brings the dead zone back. */
  @media (max-width: 560px) {
    body:has(.owlpark-feat-keyboard-shortcuts-helper-btn)
      .owlpark-feat-sticky-mini-cart-bar {
      left: calc(1.2rem + 44px + 0.5rem + env(safe-area-inset-left, 0px));
    }
    body:has(.owlpark-feat-font-size-adjuster)
      .owlpark-feat-sticky-mini-cart-bar {
      right: calc(1.2rem + 158px + 0.5rem + env(safe-area-inset-right, 0px));
    }
    /* Either widget alone already narrows the band past the bar's *min-content*
       width, and `fit-content` floors there rather than at the band — the bar
       would overflow and slide right back under the widget. Stretching to the
       band gives the flex layout a definite width, and only then does the
       summary's min-width: 0 let it shrink and ellipsize, which is what keeps
       the button inside the band. */
    body:has(.owlpark-feat-keyboard-shortcuts-helper-btn)
      .owlpark-feat-sticky-mini-cart-bar,
    body:has(.owlpark-feat-font-size-adjuster)
      .owlpark-feat-sticky-mini-cart-bar {
      width: auto;
    }
    /* Trim the bar's own horizontal padding in that same squeezed two-widget
       case so the button still fits inside the rounded background instead of
       spilling out of it. One widget alone leaves room to spare, so it keeps the
       roomier default padding. */
    body:has(.owlpark-feat-keyboard-shortcuts-helper-btn):has(
        .owlpark-feat-font-size-adjuster
      )
      .owlpark-feat-sticky-mini-cart-bar {
      padding-left: 0.6rem;
      padding-right: 0.4rem;
    }
    body:has(.owlpark-feat-keyboard-shortcuts-helper-btn):has(
        .owlpark-feat-font-size-adjuster
      )
      .owlpark-feat-sticky-mini-cart-bar
      .smcb-view-btn {
      padding-left: 0.6rem;
      padding-right: 0.6rem;
    }
  }
  .owlpark-feat-sticky-mini-cart-bar[hidden] {
    display: none;
  }
  .owlpark-feat-sticky-mini-cart-bar #smcb-summary {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    /* A flex item's default min-width:auto is the min-content width of nowrap
       text, so without this the item refuses to shrink and the ellipsis above
       never renders — a long total overflows the bar's rounded background. */
    min-width: 0;
    color: #17211f;
  }
  .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #0f6f7a;
    color: #ffffff;
    border: none;
    border-radius: 999px;
    padding: 0 1rem;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.1px;
    cursor: pointer;
    min-height: 44px;
    flex-shrink: 0;
    transition:
      background 0.16s ease,
      transform 0.16s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn:hover {
    background: #0c5f69;
    transform: translateY(-1px);
  }
  .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn:active {
    transform: translateY(1px);
  }
  .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn:focus-visible {
    outline: 2px solid #0f6f7a;
    outline-offset: 2px;
  }
  @media (prefers-color-scheme: dark) {
    .owlpark-feat-sticky-mini-cart-bar {
      background: rgba(18, 24, 26, 0.8);
      border-color: rgba(255, 255, 255, 0.11);
      color: #e9edec;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }
    .owlpark-feat-sticky-mini-cart-bar #smcb-summary {
      color: #e9edec;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn {
      transition: none;
    }
    .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn:hover,
    .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn:active {
      transform: none;
    }
  }
</style>

<div class="owlpark-feat-sticky-mini-cart-bar" id="smcb-bar" hidden>
  <span id="smcb-summary" role="status" aria-live="polite">0 items · $0.00</span>
  <button type="button" class="smcb-view-btn" id="smcb-view-btn">View Cart</button>
</div>

<script>
  (function () {
    /* =========================================================================
     * Sticky Mini Cart Bar  ·  visual
     * -------------------------------------------------------------------------
     * WHAT   A persistent frosted pill fixed at the bottom of the screen showing
     *        the live item count and running total, with a "View Cart" action.
     * HOW    Lifts its <style> to <head> and its fixed bar to a direct <body>
     *        child on activate, so a host that re-renders its content wrapper
     *        can't take either down. Re-reads every CONFIG.pollMs. On Owl Park it
     *        prices the localStorage cart through the shared window.OwlPark API
     *        (itemCount / cartTotal / isGiftOnly) so the bar can never disagree
     *        with the drawer; on the zoo store (no in-page cart) it sums the
     *        per-ticket PLU quantity boxes × price into a live "selection" total.
     * HOSTS  Zoo ViewItems: PLU qty boxes → View follows #ctl00_ViewCartHyperLink.
     *        Owl Park: localStorage cart → View opens the in-page drawer. Hidden
     *        when the cart/selection is empty, or on Owl Park until window.OwlPark
     *        and the product catalog have loaded (it never guesses a total).
     * ===================================================================== */

    var FEATURE_ID = "sticky-mini-cart-bar";

    // ----- Configuration --------------------------------------------------
    // Copy, cadence and storage key — safe to edit. Summary strings are kept as
    // fragments so the count/total interpolate exactly as before.
    var CONFIG = {
      pollMs: 800, // re-read + re-render interval (ms); the zoo store isn't event-driven
      cartStorageKey: "owl-park-cart", // Owl Park in-page cart key (read-only here)
      viewLabel: "View Cart", // primary action button label
      copy: {
        itemSingular: " item · $", // Owl Park: "<n> item · $<total>"
        itemPlural: " items · $", // Owl Park: "<n> items · $<total>"
        donation: "Donation · $", // Owl Park gift-only cart (money, no items)
        ticketSingular: " ticket · $", // zoo: "<n> ticket · $<total> selected"
        ticketPlural: " tickets · $", // zoo: "<n> tickets · $<total> selected"
        ticketSuffix: " selected", // zoo selection suffix
      },
    };

    var pollIntervalId = null;
    var viewClickHandler = null;
    var products = [];
    var productsLoaded = false;
    var lastSnapshot = null;

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();

    // On the zoo store there is no in-page cart on the ticket-selection page, but
    // there ARE per-ticket quantity boxes — sum qty × price into a live running
    // "selection" total so the bar still reflects what the guest is choosing.
    function zooSelection() {
      var count = 0;
      var total = 0;
      H.rows().forEach(function (r) {
        var input = H.rowQty(r);
        var qty = input ? parseInt(input.value, 10) || 0 : 0;
        if (qty > 0) {
          count += qty;
          total += qty * H.rowPrice(r);
        }
      });
      return { count: count, total: total };
    }

    function cartSnapshot() {
      if (H.isZoo()) {
        var s = "";
        H.qtyInputs().forEach(function (i) {
          s += (i.value || "") + ",";
        });
        return s;
      }
      return localStorage.getItem(CONFIG.cartStorageKey) || "";
    }

    function readCartLines() {
      try {
        var raw = localStorage.getItem(CONFIG.cartStorageKey);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function render() {
      var bar = document.getElementById("smcb-bar");
      var summary = document.getElementById("smcb-summary");
      if (!bar || !summary) return;

      if (H.isZoo()) {
        var sel = zooSelection();
        if (sel.count === 0) {
          bar.hidden = true;
          return;
        }
        summary.textContent =
          sel.count +
          (sel.count === 1 ? CONFIG.copy.ticketSingular : CONFIG.copy.ticketPlural) +
          sel.total.toFixed(2) +
          CONFIG.copy.ticketSuffix;
        bar.hidden = false;
        return;
      }

      var lines = readCartLines();
      var api = window.OwlPark;
      var canPrice = !!api && typeof api.cartTotal === "function";
      if (!productsLoaded || !canPrice || lines.length === 0) {
        bar.hidden = true;
        return;
      }

      // Counted by core's own rule (window.OwlPark, js/products.js), so a charitable gift attached to
      // the order is not tallied as one of the items the shopper is buying.
      var count =
        typeof api.itemCount === "function"
          ? api.itemCount(lines)
          : lines.reduce(function (sum, line) {
              return sum + line.qty;
            }, 0);

      // Priced by core's own cart arithmetic (window.OwlPark, js/products.js), so this bar can never
      // show a different total from the cart drawer: it honours a line's off-peak discount, and
      // counts a line with no catalog product behind it at all, such as a donation. A page that does
      // not publish that API cannot be priced honestly, so the bar stays hidden rather than guessing.
      var total = api.cartTotal(lines, products);

      // A cart holding only a gift carries money but no items, so name it rather than announce
      // "0 items" beside a real total.
      var giftOnly =
        typeof api.isGiftOnly === "function" ? api.isGiftOnly(lines) : false;

      summary.textContent = giftOnly
        ? CONFIG.copy.donation + total.toFixed(2)
        : count +
          (count === 1 ? CONFIG.copy.itemSingular : CONFIG.copy.itemPlural) +
          total.toFixed(2);
      bar.hidden = false;
    }

    function pollCart() {
      var snapshot = cartSnapshot();
      if (snapshot !== lastSnapshot) {
        lastSnapshot = snapshot;
        render();
      }
    }

    function openCart() {
      // Zoo store: its "View Cart" link navigates to the cart page; Owl Park
      // opens its in-page drawer.
      var cartBtn =
        document.getElementById("ctl00_ViewCartHyperLink") ||
        document.getElementById("open-cart-btn") ||
        document.querySelector(".view-cart a");
      if (cartBtn) cartBtn.click();
    }

    function activate() {
      lastSnapshot = null;
      // Lift the <style> to <head> and the fixed bar to a direct child of
      // <body> so a host that re-renders its own content wrapper (e.g. the zoo
      // store's #page) can't take either down. Both moves are invisible: the
      // style is global and the bar is position:fixed.
      var styleEl = document.getElementById("owlpark-sticky-mini-cart-bar-style");
      if (styleEl && styleEl.parentElement !== document.head) {
        document.head.appendChild(styleEl);
      }
      var barEl = document.getElementById("smcb-bar");
      if (barEl && barEl.parentElement !== document.body) {
        document.body.appendChild(barEl);
      }
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (data) {
          products = data;
          productsLoaded = true;
          render();
        })
        .catch(function (err) {
          console.error("[" + FEATURE_ID + "] failed to load products", err);
        });

      var viewBtn = document.getElementById("smcb-view-btn");
      if (viewBtn) {
        viewBtn.textContent = CONFIG.viewLabel;
        viewClickHandler = openCart;
        viewBtn.addEventListener("click", viewClickHandler);
      }

      pollIntervalId = setInterval(pollCart, CONFIG.pollMs);
      render(); // reflect any pre-filled quantities right away on the zoo store
    }

    function deactivate() {
      if (pollIntervalId) {
        clearInterval(pollIntervalId);
        pollIntervalId = null;
      }
      var viewBtn = document.getElementById("smcb-view-btn");
      if (viewBtn && viewClickHandler) {
        viewBtn.removeEventListener("click", viewClickHandler);
      }
      viewClickHandler = null;
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
