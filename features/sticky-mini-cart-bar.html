<script type="application/json" data-owlpark-manifest>
  {
    "id": "sticky-mini-cart-bar",
    "name": "Sticky Mini Cart Bar",
    "description": "Persistent floating mini-cart bar showing live item count and total.",
    "category": "visual",
    "enabledByDefault": true,
    "requiresReload": false
  }
</script>

<style>
  .owlpark-feat-sticky-mini-cart-bar {
    position: fixed;
    /* Centred via auto margins rather than left:50% + translate(-50%): with
       left:50% the shrink-to-fit width is capped at *half* the viewport, which
       on a phone squeezed the running total out of the bar entirely. */
    left: env(safe-area-inset-left, 0px);
    right: env(safe-area-inset-right, 0px);
    margin-inline: auto;
    width: fit-content;
    /* Lift clear of the iPhone home indicator, which would otherwise sit on
       top of this bar and swallow taps on "View Cart". */
    bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
    background: var(--cove-ink, #1e2a2b);
    color: white;
    border-radius: 999px;
    padding: 0.6rem 0.6rem 0.6rem 1.1rem;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.86rem;
    font-weight: 600;
    z-index: 40;
    /* Never let a long total push the bar past the screen edges on a phone, or
       under the notch when landscape insets are non-zero. */
    max-width: calc(
      100vw - 2rem - env(safe-area-inset-left, 0px) -
        env(safe-area-inset-right, 0px)
    );
    box-sizing: border-box;
  }
  .owlpark-feat-sticky-mini-cart-bar[hidden] {
    display: none;
  }
  .owlpark-feat-sticky-mini-cart-bar #smcb-summary {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .owlpark-feat-sticky-mini-cart-bar .smcb-view-btn {
    background: white;
    color: var(--cove-teal-dark, #0a4d55);
    border: none;
    border-radius: 999px;
    padding: 0.4rem 0.9rem;
    font-weight: 700;
    cursor: pointer;
    min-height: 44px;
    flex-shrink: 0;
  }
</style>

<div class="owlpark-feat-sticky-mini-cart-bar" id="smcb-bar" hidden>
  <span id="smcb-summary">0 items · $0.00</span>
  <button type="button" class="smcb-view-btn" id="smcb-view-btn">View Cart</button>
</div>

<script>
  (function () {
    var FEATURE_ID = "sticky-mini-cart-bar";
    var CART_STORAGE_KEY = "owl-park-cart";
    var POLL_MS = 800;

    var pollIntervalId = null;
    var viewClickHandler = null;
    var products = [];
    var productsLoaded = false;
    var lastSnapshot = null;

    function readCartLines() {
      try {
        var raw = localStorage.getItem(CART_STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function render() {
      var bar = document.getElementById("smcb-bar");
      var summary = document.getElementById("smcb-summary");
      if (!bar || !summary) return;

      var lines = readCartLines();
      if (!productsLoaded || lines.length === 0) {
        bar.hidden = true;
        return;
      }

      var count = 0;
      var total = 0;
      lines.forEach(function (line) {
        var p = products.find(function (prod) {
          return prod.id === line.id;
        });
        count += line.qty;
        if (p) total += p.price * line.qty;
      });

      summary.textContent = count + (count === 1 ? " item · $" : " items · $") + total.toFixed(2);
      bar.hidden = false;
    }

    function pollCart() {
      var snapshot = localStorage.getItem(CART_STORAGE_KEY) || "";
      if (snapshot !== lastSnapshot) {
        lastSnapshot = snapshot;
        render();
      }
    }

    function openCart() {
      var cartBtn = document.getElementById("open-cart-btn");
      if (cartBtn) cartBtn.click();
    }

    function activate() {
      lastSnapshot = null;
      fetch("data/products.json")
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (data) {
          products = data;
          productsLoaded = true;
          render();
        })
        .catch(function (err) {
          console.error("[" + FEATURE_ID + "] failed to load products", err);
        });

      var viewBtn = document.getElementById("smcb-view-btn");
      if (viewBtn) {
        viewClickHandler = openCart;
        viewBtn.addEventListener("click", viewClickHandler);
      }

      pollIntervalId = setInterval(pollCart, POLL_MS);
    }

    function deactivate() {
      if (pollIntervalId) {
        clearInterval(pollIntervalId);
        pollIntervalId = null;
      }
      var viewBtn = document.getElementById("smcb-view-btn");
      if (viewBtn && viewClickHandler) {
        viewBtn.removeEventListener("click", viewClickHandler);
      }
      viewClickHandler = null;
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
