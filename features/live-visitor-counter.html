<script type="application/json" data-owlpark-manifest>
  {
    "id": "live-visitor-counter",
    "name": "Live Visitor Counter",
    "description": "Simulated \"N people are looking at this\" counter on product cards.",
    "category": "behavioral",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-live-visitor-counter-style">
  .owlpark-feat-live-visitor-counter {
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    width: -webkit-fit-content;
    width: fit-content;
    max-width: 100%;
    margin-top: 0.45rem;
    padding: 0.16rem 0.5rem;
    border: 1px solid rgba(17, 33, 31, 0.1);
    border-radius: 10px;
    background: rgba(247, 248, 247, 0.6);
    color: #67736f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 0.74rem;
    font-weight: 500;
    line-height: 1.35;
    letter-spacing: -0.005em;
  }
  .owlpark-feat-live-visitor-counter .lv-dot {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: #0f6f7a;
    box-shadow: 0 0 0 3px rgba(15, 111, 122, 0.12);
    animation: owlpark-lvc-pulse 2.4s ease-in-out infinite;
  }
  .owlpark-feat-live-visitor-counter .lv-count {
    font-weight: 600;
    color: #17211f;
    font-variant-numeric: tabular-nums;
  }
  @keyframes owlpark-lvc-pulse {
    0%,
    100% {
      transform: scale(1);
      opacity: 1;
    }
    50% {
      transform: scale(0.86);
      opacity: 0.6;
    }
  }
  @media (prefers-color-scheme: dark) {
    .owlpark-feat-live-visitor-counter {
      border-color: rgba(255, 255, 255, 0.11);
      background: rgba(26, 34, 36, 0.55);
      color: #98a4a1;
    }
    .owlpark-feat-live-visitor-counter .lv-count {
      color: #e9edec;
    }
    .owlpark-feat-live-visitor-counter .lv-dot {
      background: #5bc7cf;
      box-shadow: 0 0 0 3px rgba(91, 199, 207, 0.16);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-live-visitor-counter .lv-dot {
      animation: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Live Visitor Counter  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A small, quiet chip beneath each product — a soft "live" dot plus
     *        an "N viewing now" count — hinting at real-time interest.
     * HOW    Injects one chip into each product row's info cell (idempotent),
     *        then drifts a SIMULATED count by +/-1 on a timer. A MutationObserver
     *        on the product grid re-applies chips after the host re-renders its
     *        list. The count is simulated on purpose: a pasted client snippet has
     *        no real concurrent-viewer feed (see CONFIG).
     * HOSTS  Zoo ViewItems PLU rows (tr.pluRow[data-plu]) and Owl Park
     *        .product-row alike, resolved through the shared owlHost() adapter.
     *        No-ops on any row without a resolvable product id.
     * ===================================================================== */

    var FEATURE_ID = "live-visitor-counter";

    // ----- Configuration --------------------------------------------------
    // The viewer count is SIMULATED — there is no real analytics source in a
    // pasted client snippet. These knobs only shape the illusion.
    var CONFIG = {
      minStart: 3, // lowest initial viewer count for a product
      maxStart: 15, // highest initial viewer count for a product
      drift: 1, // +/- amount the count wanders each tick
      floor: 1, // never display fewer than this many viewers
      tickMs: 3500, // how often the count drifts
      label: "viewing now", // copy shown after the number
      // Static screen-reader name for the chip. The volatile number is
      // aria-hidden, so this reads once and never machine-guns per tick.
      ariaLabel: "Several people are viewing this item right now",
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        // Where header/utility buttons dock (zoo sub-header -> Owl Park header -> float).
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        // Product list container to observe for re-renders.
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        // Live product rows (skips Angular {{template}} rows on the zoo page).
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        // Inline anchor to hang a small decoration next to the product name.
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        // Block anchor under the product's descriptive text.
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();
    var counts = new Map(); // rowId -> current count

    var intervalId = null;
    var observer = null;

    function randomStart() {
      // Random integer in [CONFIG.minStart, CONFIG.maxStart].
      return (
        Math.floor(Math.random() * (CONFIG.maxStart - CONFIG.minStart + 1)) +
        CONFIG.minStart
      );
    }

    function injectInto(row) {
      var productId = H.rowId(row);
      if (
        !productId ||
        row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]')
      )
        return;

      if (!counts.has(productId)) counts.set(productId, randomStart());

      var line = document.createElement("div");
      line.className = "owlpark-feat-live-visitor-counter";
      line.setAttribute("data-owlpark-feature", FEATURE_ID);
      line.setAttribute("data-owlpark-id", productId);
      // Status region, but the ticking number is aria-hidden so screen readers
      // get one calm label (CONFIG.ariaLabel) instead of a per-tick readout.
      line.setAttribute("role", "status");
      line.setAttribute("aria-live", "polite");
      line.setAttribute("aria-label", CONFIG.ariaLabel);
      line.innerHTML =
        '<span class="lv-dot" aria-hidden="true"></span>' +
        '<span class="lv-text" aria-hidden="true"><span class="lv-count">' +
        counts.get(productId) +
        "</span> " +
        CONFIG.label +
        "</span>";

      H.rowInfoCell(row).appendChild(line);
    }

    function applyToRows() {
      H.rows().forEach(injectInto);
    }

    function tick() {
      document
        .querySelectorAll(
          '.owlpark-feat-live-visitor-counter[data-owlpark-feature="' +
            FEATURE_ID +
            '"]',
        )
        .forEach(function (line) {
          var productId = line.getAttribute("data-owlpark-id");
          var count = counts.get(productId) || randomStart();
          var delta = Math.random() < 0.5 ? -CONFIG.drift : CONFIG.drift;
          count = Math.max(CONFIG.floor, count + delta);
          counts.set(productId, count);
          var countEl = line.querySelector(".lv-count");
          if (countEl) countEl.textContent = String(count);
        });
    }

    function activate() {
      applyToRows();
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
      intervalId = setInterval(tick, CONFIG.tickMs);
    }

    function deactivate() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      counts.clear();
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    activate();

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures["live-visitor-counter"] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
