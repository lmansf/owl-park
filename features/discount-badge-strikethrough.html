<script type="application/json" data-owlpark-manifest>
  {
    "id": "discount-badge-strikethrough",
    "name": "Discount Badge Strikethrough",
    "description": "\"Was $X\" strikethrough pricing with a sale-percent badge on select rows.",
    "category": "visual",
    "enabledByDefault": false,
    "requiresReload": false
  }
</script>

<style id="owlpark-discount-badge-strikethrough-style">
  /* Sleek/minimal price-drop treatment. Sits just before the host's live
     price: a muted strikethrough "was" figure and a quiet caution chip. The
     host's own price stays the ink "now" figure, so nothing is duplicated. */
  .owlpark-feat-discount-badge-strikethrough {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-right: 0.4rem;
    vertical-align: middle;
    color: #17211f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    animation: owlpark-dbs-in 0.18s cubic-bezier(0.2, 0.6, 0.2, 1);
  }
  .owlpark-feat-discount-badge-strikethrough .dbs-was {
    color: #67736f;
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    font-size: 0.82rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .owlpark-feat-discount-badge-strikethrough .dbs-pct {
    display: inline-flex;
    align-items: center;
    gap: 0.22rem;
    padding: 0.12rem 0.42rem;
    border: 1px solid rgba(184, 121, 31, 0.22);
    border-radius: 10px;
    background: rgba(184, 121, 31, 0.1);
    color: #b8791f;
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .owlpark-feat-discount-badge-strikethrough .dbs-pct svg {
    width: 0.78em;
    height: 0.78em;
    display: block;
    flex: none;
  }
  @keyframes owlpark-dbs-in {
    from {
      opacity: 0;
      transform: translateY(2px);
    }
    to {
      opacity: 1;
      transform: none;
    }
  }
  @media (prefers-color-scheme: dark) {
    .owlpark-feat-discount-badge-strikethrough {
      color: #e9edec;
    }
    .owlpark-feat-discount-badge-strikethrough .dbs-was {
      color: #98a4a1;
    }
    .owlpark-feat-discount-badge-strikethrough .dbs-pct {
      border-color: rgba(224, 176, 112, 0.3);
      background: rgba(224, 176, 112, 0.14);
      color: #e0b070;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .owlpark-feat-discount-badge-strikethrough {
      animation: none;
    }
  }
</style>

<script>
  (function () {
    /* =========================================================================
     * Discount Badge Strikethrough  ·  visual
     * -------------------------------------------------------------------------
     * WHAT   A muted "was $X" strikethrough plus a small "-N%" discount chip
     *        rendered just before a select row's live price, so the host's own
     *        price reads as the ink "now" figure.
     * HOW    Inserts a tagged <span> before each qualifying row's price element
     *        (zoo [data-text="price"] / Owl Park .price-amount) via owlHost().
     *        The "was" price is SIMULATED — there is no real promotions feed —
     *        derived from the live current price: was = now / (1 - pct/100).
     *        A MutationObserver on the product grid re-applies after the host
     *        re-renders its rows; an idempotency guard prevents double-injection.
     * HOSTS  Owl Park + zoo rows matching a CONFIG rule (per-id, "member", or the
     *        single top-priced row). No-ops on a row with no discount, no price
     *        element, or a zero price.
     * ===================================================================== */

    var FEATURE_ID = "discount-badge-strikethrough";

    // ----- Configuration --------------------------------------------------
    // The "was" price is a SIMULATED demo value (no real promotions source);
    // it is derived from the live current price via was = now / (1 - pct/100).
    // These rules only pick which rows get a badge and at what percent.
    var CONFIG = {
      // Per-product demo discounts, matched on the row's stable id (Owl Park PLU).
      discountsById: {
        "prod-ga-ticket": 15,
        "prod-individual-membership": 10,
      },
      memberPct: 10, // any row whose name mentions "member" gets 10% off …
      topPricedPct: 15, // … else the single highest-priced row on the page gets 15%.
      // Chip copy: a leading minus + the whole-number percent, e.g. "-15%".
      chipLabel: function (pct) {
        return "-" + pct + "%";
      },
    };

    // --- Host adapter -------------------------------------------------------
    // Resolves whichever storefront this snippet was pasted into, preferring the
    // ZooTampa web store (ASP.NET PLU rows), then the Owl Park storefront, then a
    // generic fallback. Shared defensively on window so features pasted together
    // reuse one instance. Keeps every feature speaking one host vocabulary.
    function owlHost() {
      if (window.__owlHost) return window.__owlHost;
      var d = document;
      function q(s, r) { return (r || d).querySelector(s); }
      function num(t) { return parseFloat(String(t).replace(/[^0-9.]/g, "")) || 0; }
      function bar() {
        var b = d.getElementById("owlpark-fallback-actions");
        if (b) return b;
        b = d.createElement("div");
        b.id = "owlpark-fallback-actions";
        b.setAttribute("data-owlpark-fallback", "actions");
        b.style.cssText =
          "position:fixed;z-index:2147483000;display:flex;flex-wrap:wrap;gap:8px;" +
          "align-items:center;justify-content:flex-end;max-width:calc(100vw - 20px);" +
          "top:calc(10px + env(safe-area-inset-top, 0px));" +
          "right:calc(10px + env(safe-area-inset-right, 0px));" +
          "padding:8px 10px;background:rgba(10,77,85,0.96);border-radius:12px;" +
          "box-shadow:0 8px 24px rgba(0,0,0,0.28);";
        var st = d.createElement("style");
        st.id = "owlpark-fallback-actions-style";
        st.setAttribute("data-owlpark-fallback", "actions");
        st.textContent =
          "#owlpark-fallback-actions>button,#owlpark-fallback-actions>a" +
          "{min-height:44px;box-sizing:border-box;}";
        d.head.appendChild(st);
        d.body.appendChild(b);
        return b;
      }
      var H = {
        isZoo: function () { return !!d.getElementById("SalesChannelDetailRepeater"); },
        // Where header/utility buttons dock (zoo sub-header -> Owl Park header -> float).
        dock: function () { return q(".view-cart") || q("#sub-header") || q(".header-actions") || bar(); },
        fallbackBar: bar,
        pruneBar: function () {
          var b = d.getElementById("owlpark-fallback-actions");
          if (!b || b.children.length) return;
          b.remove();
          var st = d.getElementById("owlpark-fallback-actions-style");
          if (st) st.remove();
        },
        heading: function () { return q("#ContentHeading") || q(".catalog-heading"); },
        // Product list container to observe for re-renders.
        grid: function () { return d.getElementById("SalesChannelDetailRepeater") || d.getElementById("catalog-grid"); },
        // Live product rows (skips Angular {{template}} rows on the zoo page).
        rows: function () {
          var out = [];
          d.querySelectorAll("tr.pluRow[data-plu], .product-row[data-product-id]").forEach(function (r) {
            var id = H.rowId(r);
            if (id && id.indexOf("{{") === -1) out.push(r);
          });
          return out;
        },
        isPlu: function (r) { return !!(r.matches && r.matches("tr.pluRow")); },
        rowId: function (r) { return r.getAttribute("data-plu") || r.getAttribute("data-product-id") || ""; },
        rowName: function (r) { var e = q(".pluName, h3", r); return e ? e.textContent.trim() : ""; },
        rowPriceEl: function (r) { return q('.pluPrice [data-text="price"], [data-text="price"], .price-amount', r); },
        rowPrice: function (r) {
          var h = q('input[id$="PLUPriceHiddenField"]', r);
          if (h && h.value) return num(h.value);
          var e = H.rowPriceEl(r);
          return e ? num(e.textContent) : 0;
        },
        // Inline anchor to hang a small decoration next to the product name.
        rowNameCell: function (r) { return q(".pluNameShortName, .row-title-line, .pluName, h3", r); },
        // Block anchor under the product's descriptive text.
        rowInfoCell: function (r) { return q(".pluInfo, .row-body", r) || r; },
        rowQty: function (r) { return q("input.PLUQtyTextBox, [data-add-id]", r); },
        qtyInputs: function () { return d.querySelectorAll("input.PLUQtyTextBox"); },
        num: num,
        q: q
      };
      window.__owlHost = H;
      return H;
    }
    // ------------------------------------------------------------------------
    var H = owlHost();

    var observer = null;

    // Small down-arrow glyph (currentColor) that precedes the "-N%" chip text.
    var ARROW_SVG =
      '<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">' +
      '<path d="M8 3v8m0 0 3-3m-3 3-3-3" fill="none" stroke="currentColor" ' +
      'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    // Store-agnostic fallback: the single highest-priced row across H.rows().
    function topPricedRow(rows) {
      var best = null;
      var bestPrice = -Infinity;
      rows.forEach(function (row) {
        var p = H.rowPrice(row);
        if (p > bestPrice) {
          bestPrice = p;
          best = row;
        }
      });
      return best;
    }

    // Owl Park ids first; then the general rule (member 10% wins over top-price 15%).
    function pctFor(row, topRow) {
      var byId = CONFIG.discountsById[H.rowId(row)];
      if (byId) return byId;
      if (/member/i.test(H.rowName(row))) return CONFIG.memberPct;
      if (row === topRow) return CONFIG.topPricedPct;
      return 0;
    }

    function injectInto(row, topRow) {
      if (row.querySelector('[data-owlpark-feature="' + FEATURE_ID + '"]'))
        return;
      var pct = pctFor(row, topRow);
      if (!pct) return;

      var priceAmountEl = H.rowPriceEl(row);
      if (!priceAmountEl) return;
      var currentPrice = H.rowPrice(row);
      if (!currentPrice) return;
      var wasPrice = currentPrice / (1 - pct / 100);

      var wrap = document.createElement("span");
      wrap.className = "owlpark-feat-discount-badge-strikethrough";
      wrap.setAttribute("data-owlpark-feature", FEATURE_ID);
      wrap.setAttribute("aria-label", "Was $" + wasPrice.toFixed(2) + ", " + pct + "% off");
      wrap.innerHTML =
        '<span class="dbs-was">$' +
        wasPrice.toFixed(2) +
        '</span><span class="dbs-pct">' +
        ARROW_SVG +
        "<span>" +
        CONFIG.chipLabel(pct) +
        "</span></span>";
      priceAmountEl.insertAdjacentElement("beforebegin", wrap);
    }

    function applyToRows() {
      var rows = H.rows();
      var topRow = topPricedRow(rows);
      rows.forEach(function (row) {
        injectInto(row, topRow);
      });
    }

    function activate() {
      applyToRows();
      var grid = H.grid();
      if (grid) {
        observer = new MutationObserver(function () {
          applyToRows();
        });
        observer.observe(grid, { childList: true, subtree: true });
      }
    }

    function deactivate() {
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      document
        .querySelectorAll('[data-owlpark-feature="' + FEATURE_ID + '"]')
        .forEach(function (el) {
          el.remove();
        });
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
