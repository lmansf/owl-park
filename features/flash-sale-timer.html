  <span class="fst-copy"><b class="fst-label">Flash Sale</b><span class="fst-sep" aria-hidden="true">·</span><span class="fst-offer">15% off memberships</span></span>

    <span class="fst-ends">ends in</span>
    <span class="fst-time">--:--</span>
  </span>
</div>

<script>
  (function () {
    /* =========================================================================
     * Flash Sale Timer  ·  behavioral
     * -------------------------------------------------------------------------
     * WHAT   A slim frosted strip announcing a limited-time flash sale: a clock
     *        glyph, the offer copy, and a monospace MM:SS countdown chip that
     *        ticks down and quietly restarts. A SIMULATED demo timer — there is
     *        no real promotion backend; it invents nothing beyond a countdown.
     * HOW    Renders the static strip the loader injects. activate() fills the
     *        copy from CONFIG, then ticks the countdown once a second off a
     *        sessionStorage-persisted end time (per browser session), formatting
     *        the remainder as MM:SS. At zero it rolls a fresh CONFIG.durationMs
     *        window and keeps going.
     * HOSTS  Renders on every host; reads no store/cart data. Purely a
     *        presentational urgency cue, identical on zoo / Owl Park / generic.
     * ===================================================================== */

    var FEATURE_ID = "flash-sale-timer";

    // ----- Configuration --------------------------------------------------
    // Tunable values, safe to edit. Each explained inline.
    var CONFIG = {
      saleLabel: "Flash Sale", // bold lead-in on the strip
      offerText: "15% off memberships", // what the (mock) flash sale discounts
      endsCopy: "ends in", // connective shown just before the countdown chip
      durationMs: 15 * 60 * 1000, // length of each simulated sale window; drives the MM:SS countdown
    };

    // Internal: sessionStorage namespace for the simulated sale end time.
    var STORAGE_KEY = "owl-park-flash-sale-end";

    var intervalId = null;

    function readStoredEnd() {
      try {
        var stored = sessionStorage.getItem(STORAGE_KEY);
        return stored ? parseInt(stored, 10) : NaN;
      } catch (e) {
        return NaN;
      }
    }

    function getEndTime() {
      var end = readStoredEnd();
      var now = Date.now();
      // (Re)start the window when there is no valid end, it has already passed,
      // or a stale value would run longer than the configured duration.
      if (!end || end <= now || end - now > CONFIG.durationMs) {
        end = now + CONFIG.durationMs;
        try {
          sessionStorage.setItem(STORAGE_KEY, String(end));
        } catch (e) {
          /* private mode — run for this activation only */
        }
      }
      return end;
    }

    function formatRemaining(ms) {
      var totalSeconds = Math.max(0, Math.floor(ms / 1000));
      var mm = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      var ss = String(totalSeconds % 60).padStart(2, "0");
      return mm + ":" + ss;
    }

    function activate() {
      var root = document.querySelector(".owlpark-feat-flash-sale-timer");
      if (!root) return;
      var timeEl = root.querySelector(".fst-time");
      if (!timeEl) return;

      // Drive the visible copy from CONFIG so editing CONFIG updates the strip.
      var labelEl = root.querySelector(".fst-label");
      var offerEl = root.querySelector(".fst-offer");
      var endsEl = root.querySelector(".fst-ends");
      if (labelEl) labelEl.textContent = CONFIG.saleLabel;
      if (offerEl) offerEl.textContent = CONFIG.offerText;
      if (endsEl) endsEl.textContent = CONFIG.endsCopy;

      var end = getEndTime();

      function tick() {
        var remaining = end - Date.now();
        if (remaining <= 0) {
          try {
            sessionStorage.removeItem(STORAGE_KEY);
          } catch (e) {
            /* ignore */
          }
          end = getEndTime();
          remaining = end - Date.now();
        }
        timeEl.textContent = formatRemaining(remaining);
      }

      tick();
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(tick, 1000);
    }

    function deactivate() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    // Defer the first mount until the DOM is parsed, so this snippet
    // renders correctly even when pasted at the top of a page <body>
    // (host header / grid / cart below it do not exist yet at parse time).
    // The loader injects after parse, so activate() still runs at once there.
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", activate, { once: true });
    } else {
      activate();
    }

    window.__owlParkFeatures = window.__owlParkFeatures || {};
    window.__owlParkFeatures[FEATURE_ID] = {
      activate: activate,
      deactivate: deactivate,
    };
  })();
</script>
